<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- background -->
  <rect width="400" height="400" fill="#F7EFE5"/>

  <!-- tail -->
  <path d="M290 300 Q 350 300 350 250 Q 350 220 325 220" stroke="#4A4A58" stroke-width="20" fill="none" stroke-linecap="round"/>

  <!-- body -->
  <path d="M120 320 Q 120 230 200 230 Q 280 230 280 320 Z" fill="#4A4A58"/>

  <!-- ears -->
  <polygon points="130,120 150,60 180,110" fill="#4A4A58"/>
  <polygon points="270,120 250,60 220,110" fill="#4A4A58"/>
  <polygon points="141,110 152,79 168,105" fill="#F2A6B3"/>
  <polygon points="259,110 248,79 232,105" fill="#F2A6B3"/>

  <!-- head -->
  <circle cx="200" cy="160" r="75" fill="#4A4A58"/>

  <!-- eyes -->
  <circle cx="172" cy="152" r="9" fill="#F7EFE5"/>
  <circle cx="228" cy="152" r="9" fill="#F7EFE5"/>

  <!-- nose -->
  <polygon points="192,178 208,178 200,190" fill="#F2A6B3"/>

  <!-- mouth -->
  <path d="M200 190 Q 200 200 190 202 M200 190 Q 200 200 210 202" stroke="#F7EFE5" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- whiskers -->
  <g stroke="#F7EFE5" stroke-width="3" stroke-linecap="round">
    <line x1="140" y1="175" x2="105" y2="168"/>
    <line x1="140" y1="188" x2="105" y2="192"/>
    <line x1="260" y1="175" x2="295" y2="168"/>
    <line x1="260" y1="188" x2="295" y2="192"/>
  </g>

  <!-- paws -->
  <circle cx="165" cy="318" r="14" fill="#3B3B47"/>
  <circle cx="235" cy="318" r="14" fill="#3B3B47"/>

  <!-- ground line -->
  <rect x="60" y="330" width="280" height="6" rx="3" fill="#E4D5C0"/>
</svg>