<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 720" width="600" height="720">
  <defs>
    <radialGradient id="bodyGrad" cx="45%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#a8917a"/>
      <stop offset="45%" stop-color="#8a7360"/>
      <stop offset="80%" stop-color="#6b5643"/>
      <stop offset="100%" stop-color="#4e3d2e"/>
    </radialGradient>
    <radialGradient id="headGrad" cx="45%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#b39b83"/>
      <stop offset="55%" stop-color="#8f7863"/>
      <stop offset="100%" stop-color="#63503e"/>
    </radialGradient>
    <radialGradient id="chestGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#e8ddcd"/>
      <stop offset="60%" stop-color="#cbbba4"/>
      <stop offset="100%" stop-color="#a08a71"/>
    </radialGradient>
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#75604c"/>
      <stop offset="50%" stop-color="#8f7863"/>
      <stop offset="100%" stop-color="#54432f"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d8e07a"/>
      <stop offset="55%" stop-color="#a8b23c"/>
      <stop offset="100%" stop-color="#5f6b1c"/>
    </radialGradient>
    <radialGradient id="earInner" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#d6a08f"/>
      <stop offset="100%" stop-color="#8a5a4a"/>
    </radialGradient>
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="legGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9c866f"/>
      <stop offset="50%" stop-color="#8a7360"/>
      <stop offset="100%" stop-color="#5f4c39"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="600" height="720" fill="#e9e2d6"/>
  <ellipse cx="300" cy="640" rx="230" ry="45" fill="url(#shadowGrad)"/>

  <!-- tail wrapping around front -->
  <path d="M420 570 Q505 560 505 490 Q505 430 460 440 Q485 455 480 490 Q472 540 400 555 Q330 570 250 610 Q200 632 175 618 Q160 608 172 596 Q195 605 240 588 Q320 558 420 570 Z"
        fill="url(#tailGrad)" stroke="#4a3a2a" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- tail stripes -->
  <g fill="#4e3d2b" opacity="0.55">
    <path d="M470 445 q14 8 14 30 q0 12 -4 22 q-3 -30 -14 -44 z"/>
    <path d="M448 545 q22 -14 28 -38 q4 22 -10 36 q-10 9 -18 2 z"/>
    <path d="M372 566 q18 -6 30 -14 q-4 18 -18 22 q-12 3 -12 -8 z"/>
    <path d="M290 588 q18 -8 30 -12 q-6 16 -18 20 q-12 4 -12 -8 z"/>
    <path d="M212 616 q16 -10 26 -14 q-4 16 -14 20 q-12 4 -12 -6 z"/>
  </g>

  <!-- body -->
  <path d="M300 240
           C 380 250 430 320 448 400
           C 462 465 470 540 462 590
           C 456 626 420 640 300 640
           C 180 640 144 626 138 590
           C 130 540 138 465 152 400
           C 170 320 220 250 300 240 Z"
        fill="url(#bodyGrad)"/>

  <!-- body side stripes -->
  <g fill="#4a3a29" opacity="0.45">
    <path d="M420 350 q30 20 38 60 q-30 -22 -50 -46 q-6 -14 12 -14 z"/>
    <path d="M432 420 q22 20 26 58 q-26 -20 -42 -44 q-6 -16 16 -14 z"/>
    <path d="M438 500 q16 18 18 48 q-22 -16 -34 -38 q-4 -14 16 -10 z"/>
    <path d="M180 350 q-30 20 -38 60 q30 -22 50 -46 q6 -14 -12 -14 z"/>
    <path d="M168 420 q-22 20 -26 58 q26 -20 42 -44 q6 -16 -16 -14 z"/>
    <path d="M162 500 q-16 18 -18 48 q22 -16 34 -38 q4 -14 -16 -10 z"/>
  </g>

  <!-- chest / front -->
  <path d="M300 300
           C 345 310 362 360 362 430
           C 362 510 350 580 340 620
           L 260 620
           C 250 580 238 510 238 430
           C 238 360 255 310 300 300 Z"
        fill="url(#chestGrad)"/>

  <!-- front legs -->
  <path d="M262 440 C 250 500 246 560 248 615 L 292 618 C 292 560 292 500 296 450 Z" fill="url(#legGrad)"/>
  <path d="M338 440 C 350 500 354 560 352 615 L 308 618 C 308 560 308 500 304 450 Z" fill="url(#legGrad)"/>
  <!-- leg shading -->
  <path d="M296 450 C 293 505 292 565 292 615 l -10 1 c -1 -55 1 -115 6 -168 z" fill="#5c4a38" opacity="0.35"/>
  <path d="M304 450 C 307 505 308 565 308 615 l 10 1 c 1 -55 -1 -115 -6 -168 z" fill="#5c4a38" opacity="0.35"/>

  <!-- paws -->
  <g>
    <ellipse cx="268" cy="622" rx="40" ry="20" fill="#c8b8a1"/>
    <ellipse cx="332" cy="622" rx="40" ry="20" fill="#c8b8a1"/>
    <g stroke="#8a745c" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8">
      <path d="M254 616 q2 10 2 18"/>
      <path d="M270 615 q1 11 1 20"/>
      <path d="M286 617 q0 10 -1 17"/>
      <path d="M318 617 q0 10 1 17"/>
      <path d="M334 615 q-1 11 -1 20"/>
      <path d="M350 616 q-2 10 -2 18"/>
    </g>
  </g>

  <!-- head -->
  <g>
    <!-- ears -->
    <path d="M226 148 L 202 60 L 288 108 Q 250 118 226 148 Z" fill="url(#headGrad)" stroke="#5a4735" stroke-width="2"/>
    <path d="M374 148 L 398 60 L 312 108 Q 350 118 374 148 Z" fill="url(#headGrad)" stroke="#5a4735" stroke-width="2"/>
    <path d="M232 133 L 216 78 L 272 110 Q 248 116 232 133 Z" fill="url(#earInner)"/>
    <path d="M368 133 L 384 78 L 328 110 Q 352 116 368 133 Z" fill="url(#earInner)"/>
    <!-- ear tufts -->
    <g stroke="#e8ddcd" stroke-width="1.6" stroke-linecap="round" opacity="0.8">
      <path d="M236 128 q-6 -14 -8 -26"/>
      <path d="M244 122 q-4 -14 -4 -24"/>
      <path d="M364 128 q6 -14 8 -26"/>
      <path d="M356 122 q4 -14 4 -24"/>
    </g>

    <!-- face -->
    <path d="M300 110
             C 358 110 396 148 400 202
             C 403 246 385 280 348 296
             C 332 303 316 306 300 306
             C 284 306 268 303 252 296
             C 215 280 197 246 200 202
             C 204 148 242 110 300 110 Z"
          fill="url(#headGrad)"/>

    <!-- forehead stripes -->
    <g fill="#4a3a29" opacity="0.5">
      <path d="M300 116 q4 24 0 46 q-4 -22 0 -46 z" stroke="#4a3a29" stroke-width="4" stroke-linecap="round"/>
      <path d="M278 120 q0 20 4 38 q-10 -16 -12 -34 q4 -6 8 -4 z"/>
      <path d="M322 120 q0 20 -4 38 q10 -16 12 -34 q-4 -6 -8 -4 z"/>
      <path d="M256 132 q-2 16 4 30 q-12 -12 -14 -26 q4 -6 10 -4 z"/>
      <path d="M344 132 q2 16 -4 30 q12 -12 14 -26 q-4 -6 -10 -4 z"/>
    </g>
    <!-- cheek stripes -->
    <g fill="#4a3a29" opacity="0.4">
      <path d="M206 210 q18 4 32 12 q-16 4 -32 -2 z"/>
      <path d="M208 232 q16 4 28 12 q-16 3 -30 -3 z"/>
      <path d="M394 210 q-18 4 -32 12 q16 4 32 -2 z"/>
      <path d="M392 232 q-16 4 -28 12 q16 3 30 -3 z"/>
    </g>

    <!-- eyes -->
    <g>
      <path d="M236 202 q22 -18 44 0 q-20 22 -44 0 z" fill="#2a2118"/>
      <ellipse cx="258" cy="201" rx="20" ry="13" fill="url(#eyeGrad)"/>
      <ellipse cx="258" cy="201" rx="6.5" ry="12" fill="#141210"/>
      <circle cx="253" cy="196" r="3.4" fill="#ffffff" opacity="0.9"/>
      <path d="M236 202 q22 -18 44 0" fill="none" stroke="#2a2118" stroke-width="3" stroke-linecap="round"/>

      <path d="M320 202 q22 -18 44 0 q-20 22 -44 0 z" fill="#2a2118"/>
      <ellipse cx="342" cy="201" rx="20" ry="13" fill="url(#eyeGrad)"/>
      <ellipse cx="342" cy="201" rx="6.5" ry="12" fill="#141210"/>
      <circle cx="337" cy="196" r="3.4" fill="#ffffff" opacity="0.9"/>
      <path d="M320 202 q22 -18 44 0" fill="none" stroke="#2a2118" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- muzzle -->
    <ellipse cx="300" cy="262" rx="52" ry="34" fill="#d9cbb4" opacity="0.9"/>
    <path d="M300 242 l-14 12 q6 8 14 8 q8 0 14 -8 z" fill="#c47a6a" stroke="#8a5348" stroke-width="1.5"/>
    <path d="M300 262 L 300 274" stroke="#5a4432" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M300 274 q-14 12 -28 4 M300 274 q14 12 28 4" fill="none" stroke="#5a4432" stroke-width="2.5" stroke-linecap="round"/>
    <!-- chin -->
    <ellipse cx="300" cy="292" rx="16" ry="9" fill="#e6dbc8" opacity="0.85"/>

    <!-- whisker dots -->
    <g fill="#6a563f">
      <circle cx="268" cy="258" r="1.6"/><circle cx="260" cy="266" r="1.6"/><circle cx="270" cy="272" r="1.6"/>
      <circle cx="332" cy="258" r="1.6"/><circle cx="340" cy="266" r="1.6"/><circle cx="330" cy="272" r="1.6"/>
    </g>
    <!-- whiskers -->
    <g stroke="#f4efe2" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.95">
      <path d="M268 256 Q 200 240 152 244"/>
      <path d="M264 266 Q 198 262 148 274"/>
      <path d="M268 274 Q 206 284 162 302"/>
      <path d="M332 256 Q 400 240 448 244"/>
      <path d="M336 266 Q 402 262 452 274"/>
      <path d="M332 274 Q 394 284 438 302"/>
    </g>
    <!-- eyebrow whiskers -->
    <g stroke="#f4efe2" stroke-width="1.4" stroke-linecap="round" fill="none" opacity="0.8">
      <path d="M252 178 q-8 -18 -22 -28"/>
      <path d="M262 174 q-4 -18 -12 -30"/>
      <path d="M348 178 q8 -18 22 -28"/>
      <path d="M338 174 q4 -18 12 -30"/>
    </g>
  </g>

  <!-- fur texture: short strokes over body -->
  <g stroke="#3f3122" stroke-width="1.3" stroke-linecap="round" fill="none" opacity="0.28">
    <path d="M200 330 q-4 12 -3 20"/><path d="M220 315 q-4 12 -3 20"/><path d="M185 370 q-4 12 -3 20"/>
    <path d="M170 420 q-3 12 -2 20"/><path d="M162 470 q-3 12 -2 20"/><path d="M158 525 q-2 12 -1 20"/>
    <path d="M400 330 q4 12 3 20"/><path d="M380 315 q4 12 3 20"/><path d="M415 370 q4 12 3 20"/>
    <path d="M430 420 q3 12 2 20"/><path d="M438 470 q3 12 2 20"/><path d="M442 525 q2 12 1 20"/>
    <path d="M210 400 q-3 12 -2 20"/><path d="M392 400 q3 12 2 20"/>
    <path d="M198 460 q-3 12 -2 20"/><path d="M404 460 q3 12 2 20"/>
    <path d="M192 530 q-2 12 -1 20"/><path d="M410 530 q2 12 1 20"/>
    <path d="M230 570 q-2 12 -1 18"/><path d="M372 570 q2 12 1 18"/>
  </g>
  <g stroke="#f0e6d4" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.4">
    <path d="M282 340 q-2 12 -1 20"/><path d="M300 332 q0 12 0 20"/><path d="M318 340 q2 12 1 20"/>
    <path d="M272 390 q-2 12 -1 20"/><path d="M300 384 q0 12 0 20"/><path d="M328 390 q2 12 1 20"/>
    <path d="M266 445 q-2 12 -1 20"/><path d="M300 440 q0 12 0 20"/><path d="M334 445 q2 12 1 20"/>
    <path d="M262 505 q-2 12 -1 18"/><path d="M300 500 q0 12 0 18"/><path d="M338 505 q2 12 1 18"/>
    <path d="M262 555 q-1 10 -1 16"/><path d="M300 552 q0 10 0 16"/><path d="M338 555 q1 10 1 16"/>
  </g>
  <!-- fur on head edges -->
  <g stroke="#3f3122" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.3">
    <path d="M212 236 q-8 6 -12 12"/><path d="M216 254 q-8 5 -13 10"/>
    <path d="M388 236 q8 6 12 12"/><path d="M384 254 q8 5 13 10"/>
    <path d="M250 298 q-3 8 -2 14"/><path d="M350 298 q3 8 2 14"/>
    <path d="M300 306 q0 8 0 14"/><path d="M276 304 q-1 8 0 14"/><path d="M324 304 q1 8 0 14"/>
  </g>

  <!-- soft rim light on left -->
  <path d="M300 240 C 220 250 170 320 152 400 C 140 458 132 520 137 572 C 128 520 134 458 148 398 C 166 316 218 246 300 236 Z"
        fill="#f2e8d6" opacity="0.35"/>
</svg>