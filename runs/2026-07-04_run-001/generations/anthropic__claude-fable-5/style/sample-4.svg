<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#3a4a58"/>
      <stop offset="100%" stop-color="#1f2a33"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGlow)"/>
  <circle cx="400" cy="400" r="300" fill="#42535f" opacity="0.35"/>
  <circle cx="400" cy="400" r="300" fill="none" stroke="#7d8f9c" stroke-width="2" opacity="0.25"/>

  <!-- Ground shadow -->
  <ellipse cx="420" cy="690" rx="230" ry="24" fill="#000000" opacity="0.35"/>

  <!-- ===== TAIL (behind body) ===== -->
  <g stroke="#1f2a33" stroke-width="2" stroke-linejoin="round">
    <polygon points="530,590 660,650 560,657" fill="#d96528"/>
    <polygon points="660,650 710,540 615,617" fill="#e97f3d"/>
    <polygon points="710,540 680,440 662,556" fill="#d96528"/>
    <polygon points="680,440 710,540 733,468" fill="#f4995c"/>
    <polygon points="680,440 733,468 712,415" fill="#f7b267"/>
  </g>

  <!-- ===== BODY ===== -->
  <g stroke="#1f2a33" stroke-width="2" stroke-linejoin="round">
    <!-- shoulders / flanks -->
    <polygon points="352,380 400,505 292,470" fill="#e97f3d"/>
    <polygon points="448,380 400,505 508,470" fill="#d96528"/>
    <polygon points="292,470 400,505 255,650" fill="#d96528"/>
    <polygon points="508,470 400,505 545,650" fill="#b54e1c"/>
    <!-- chest -->
    <polygon points="352,380 448,380 400,505" fill="#fbd9ae"/>
    <!-- lower body / legs -->
    <polygon points="400,505 255,650 350,672" fill="#e97f3d"/>
    <polygon points="400,505 350,672 400,672" fill="#f3c88f"/>
    <polygon points="400,505 400,672 450,672" fill="#e9b477"/>
    <polygon points="400,505 450,672 545,650" fill="#d96528"/>
    <!-- paw facets -->
    <polygon points="350,672 400,672 375,690 340,686" fill="#f7b267"/>
    <polygon points="400,672 450,672 462,686 425,690" fill="#f4995c"/>
  </g>

  <!-- ===== EARS ===== -->
  <g stroke="#1f2a33" stroke-width="2" stroke-linejoin="round">
    <polygon points="295,105 360,215 262,228" fill="#e97f3d"/>
    <polygon points="304,142 346,210 286,217" fill="#8f3c14"/>
    <polygon points="505,105 538,228 440,215" fill="#d96528"/>
    <polygon points="498,142 516,217 454,210" fill="#8f3c14"/>
  </g>

  <!-- ===== HEAD ===== -->
  <g stroke="#1f2a33" stroke-width="2" stroke-linejoin="round">
    <polygon points="300,205 500,205 400,290" fill="#f4995c"/>
    <polygon points="300,205 400,290 268,300" fill="#e97f3d"/>
    <polygon points="500,205 400,290 532,300" fill="#d96528"/>
    <polygon points="268,300 400,290 348,372" fill="#d96528"/>
    <polygon points="532,300 400,290 452,372" fill="#b54e1c"/>
    <polygon points="400,290 348,372 400,395" fill="#fbd9ae"/>
    <polygon points="400,290 452,372 400,395" fill="#f3c88f"/>
  </g>

  <!-- Fold highlight creases -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.18" stroke-linecap="round">
    <line x1="400" y1="205" x2="400" y2="290"/>
    <line x1="400" y1="395" x2="400" y2="505"/>
    <line x1="400" y1="505" x2="400" y2="672"/>
    <line x1="292" y1="470" x2="255" y2="650"/>
    <line x1="508" y1="470" x2="545" y2="650"/>
  </g>

  <!-- ===== FACE ===== -->
  <!-- eyes -->
  <polygon points="330,268 374,256 362,290" fill="#26343f"/>
  <polygon points="470,268 426,256 438,290" fill="#26343f"/>
  <polygon points="352,265 366,261 361,275" fill="#8fd6c9"/>
  <polygon points="448,265 434,261 439,275" fill="#8fd6c9"/>

  <!-- nose -->
  <polygon points="386,318 414,318 400,340" fill="#7a3010" stroke="#1f2a33" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- mouth -->
  <path d="M400,340 L400,356 L383,364 M400,356 L417,364" fill="none" stroke="#7a3010" stroke-width="2.5" stroke-linecap="round"/>

  <!-- whiskers -->
  <g stroke="#fde8cf" stroke-width="2" opacity="0.75" stroke-linecap="round">
    <line x1="362" y1="342" x2="284" y2="328"/>
    <line x1="362" y1="352" x2="278" y2="352"/>
    <line x1="362" y1="362" x2="288" y2="376"/>
    <line x1="438" y1="342" x2="516" y2="328"/>
    <line x1="438" y1="352" x2="522" y2="352"/>
    <line x1="438" y1="362" x2="512" y2="376"/>
  </g>
</svg>