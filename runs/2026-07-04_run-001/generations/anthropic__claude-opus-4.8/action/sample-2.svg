<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Ground -->
  <line x1="0" y1="260" x2="400" y2="260" stroke="#888" stroke-width="2"/>

  <!-- Bicycle -->
  <g stroke="#333" stroke-width="4" fill="none">
    <!-- Rear wheel -->
    <circle cx="100" cy="220" r="40"/>
    <!-- Front wheel -->
    <circle cx="290" cy="220" r="40"/>
    <!-- Frame -->
    <line x1="100" y1="220" x2="190" y2="220"/>
    <line x1="190" y1="220" x2="150" y2="160"/>
    <line x1="150" y1="160" x2="100" y2="220"/>
    <line x1="190" y1="220" x2="230" y2="160"/>
    <line x1="150" y1="160" x2="230" y2="160"/>
    <!-- Seat post -->
    <line x1="150" y1="160" x2="150" y2="140"/>
    <!-- Handlebar post -->
    <line x1="230" y1="160" x2="290" y2="220"/>
    <line x1="230" y1="160" x2="250" y2="140"/>
  </g>

  <!-- Wheel spokes -->
  <g stroke="#aaa" stroke-width="1.5">
    <line x1="100" y1="180" x2="100" y2="260"/>
    <line x1="60" y1="220" x2="140" y2="220"/>
    <line x1="72" y1="192" x2="128" y2="248"/>
    <line x1="128" y1="192" x2="72" y2="248"/>
    <line x1="290" y1="180" x2="290" y2="260"/>
    <line x1="250" y1="220" x2="330" y2="220"/>
    <line x1="262" y1="192" x2="318" y2="248"/>
    <line x1="318" y1="192" x2="262" y2="248"/>
  </g>

  <!-- Pedals -->
  <circle cx="190" cy="220" r="6" fill="#333"/>
  <line x1="190" y1="220" x2="185" y2="240" stroke="#333" stroke-width="3"/>
  <rect x="176" y="240" width="16" height="5" fill="#333"/>

  <!-- Seat -->
  <ellipse cx="150" cy="138" rx="14" ry="5" fill="#333"/>

  <!-- Handlebar -->
  <line x1="245" y1="140" x2="262" y2="140" stroke="#333" stroke-width="4"/>

  <!-- Cat -->
  <g>
    <!-- Body -->
    <ellipse cx="165" cy="120" rx="35" ry="24" fill="#f4a460"/>
    <!-- Back legs to pedal -->
    <path d="M170 138 Q180 165 187 213" stroke="#f4a460" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Front paws to handlebar -->
    <path d="M195 118 Q230 120 250 138" stroke="#f4a460" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Tail -->
    <path d="M132 118 Q100 100 105 130 Q108 150 120 140" stroke="#f4a460" stroke-width="8" fill="none" stroke-linecap="round"/>

    <!-- Head -->
    <circle cx="200" cy="90" r="26" fill="#f4a460"/>
    <!-- Ears -->
    <polygon points="182,72 178,50 198,66" fill="#f4a460"/>
    <polygon points="218,72 222,50 202,66" fill="#f4a460"/>
    <polygon points="184,68 182,56 194,66" fill="#e8956b"/>
    <polygon points="216,68 218,56 206,66" fill="#e8956b"/>

    <!-- Eyes -->
    <ellipse cx="191" cy="88" rx="4" ry="5" fill="#2b2b2b"/>
    <ellipse cx="209" cy="88" rx="4" ry="5" fill="#2b2b2b"/>
    <!-- Nose -->
    <polygon points="200,96 196,99 204,99" fill="#d15a5a"/>
    <!-- Mouth -->
    <path d="M200 99 Q195 104 190 100 M200 99 Q205 104 210 100" stroke="#2b2b2b" stroke-width="1.5" fill="none"/>
    <!-- Whiskers -->
    <g stroke="#555" stroke-width="1">
      <line x1="186" y1="96" x2="165" y2="92"/>
      <line x1="186" y1="99" x2="165" y2="100"/>
      <line x1="214" y1="96" x2="235" y2="92"/>
      <line x1="214" y1="99" x2="235" y2="100"/>
    </g>
    <!-- Stripes -->
    <path d="M150 108 q6 -8 12 0" stroke="#d2843e" stroke-width="3" fill="none"/>
    <path d="M162 120 q6 -8 12 0" stroke="#d2843e" stroke-width="3" fill="none"/>
  </g>
</svg>