<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .tail {
        transform-origin: 180px 180px;
        animation: sway 2s ease-in-out infinite;
      }
      @keyframes sway {
        0%, 100% { transform: rotate(-25deg); }
        50% { transform: rotate(25deg); }
      }
    </style>
  </defs>
  
  <!-- Tail -->
  <path class="tail" d="M 180 180 Q 160 220 170 260 Q 175 270 185 265 Q 180 230 200 190" 
        fill="#555" stroke="#333" stroke-width="2"/>
  
  <!-- Body -->
  <ellipse cx="200" cy="180" rx="60" ry="50" fill="#555" stroke="#333" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="250" cy="150" r="35" fill="#555" stroke="#333" stroke-width="2"/>
  
  <!-- Ears -->
  <path d="M 230 130 L 225 110 L 240 120 Z" fill="#555" stroke="#333" stroke-width="2"/>
  <path d="M 260 120 L 275 110 L 270 130 Z" fill="#555" stroke="#333" stroke-width="2"/>
  
  <!-- Inner ears -->
  <path d="M 232 122 L 230 115 L 236 119 Z" fill="#ffb3ba"/>
  <path d="M 264 119 L 270 115 L 268 122 Z" fill="#ffb3ba"/>
  
  <!-- Eyes -->
  <ellipse cx="240" cy="145" rx="4" ry="8" fill="#000"/>
  <ellipse cx="260" cy="145" rx="4" ry="8" fill="#000"/>
  
  <!-- Eye highlights -->
  <circle cx="241" cy="143" r="2" fill="#fff"/>
  <circle cx="261" cy="143" r="2" fill="#fff"/>
  
  <!-- Nose -->
  <path d="M 250 155 L 247 158 L 253 158 Z" fill="#ff69b4"/>
  
  <!-- Mouth -->
  <path d="M 250 158 Q 245 162 240 160" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 250 158 Q 255 162 260 160" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Whiskers -->
  <line x1="220" y1="150" x2="200" y2="148" stroke="#333" stroke-width="1.5"/>
  <line x1="220" y1="155" x2="200" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="280" y1="150" x2="300" y2="148" stroke="#333" stroke-width="1.5"/>
  <line x1="280" y1="155" x2="300" y2="155" stroke="#333" stroke-width="1.5"/>
  
  <!-- Front legs -->
  <rect x="220" y="210" width="15" height="40" rx="7" fill="#555" stroke="#333" stroke-width="2"/>
  <rect x="240" y="210" width="15" height="40" rx="7" fill="#555" stroke="#333" stroke-width="2"/>
  
  <!-- Back legs -->
  <ellipse cx="170" cy="215" rx="20" ry="15" fill="#555" stroke="#333" stroke-width="2"/>
  <rect x="160" y="215" width="15" height="35" rx="7" fill="#555" stroke="#333" stroke-width="2"/>
  
  <!-- Paws -->
  <ellipse cx="227" cy="250" rx="10" ry="6" fill="#333"/>
  <ellipse cx="247" cy="250" rx="10" ry="6" fill="#333"/>
  <ellipse cx="167" cy="250" rx="10" ry="6" fill="#333"/>
</svg>