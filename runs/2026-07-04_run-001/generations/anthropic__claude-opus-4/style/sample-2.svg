<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fold1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
    <linearGradient id="fold2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8"/>
      <stop offset="100%" style="stop-color:#c8c8c8"/>
    </linearGradient>
  </defs>
  
  <!-- Head -->
  <polygon points="100,50 130,90 100,110 70,90" fill="url(#fold1)" stroke="#999" stroke-width="0.5"/>
  
  <!-- Left ear -->
  <polygon points="70,90 60,60 85,70" fill="url(#fold2)" stroke="#999" stroke-width="0.5"/>
  <polygon points="60,60 70,50 85,70" fill="#e0e0e0" stroke="#999" stroke-width="0.5"/>
  
  <!-- Right ear -->
  <polygon points="130,90 140,60 115,70" fill="url(#fold2)" stroke="#999" stroke-width="0.5"/>
  <polygon points="140,60 130,50 115,70" fill="#e0e0e0" stroke="#999" stroke-width="0.5"/>
  
  <!-- Body -->
  <polygon points="100,110 120,130 115,160 85,160 80,130" fill="url(#fold1)" stroke="#999" stroke-width="0.5"/>
  
  <!-- Front legs -->
  <polygon points="85,160 85,180 90,180 90,160" fill="#d8d8d8" stroke="#999" stroke-width="0.5"/>
  <polygon points="110,160 110,180 115,180 115,160" fill="#d8d8d8" stroke="#999" stroke-width="0.5"/>
  
  <!-- Tail -->
  <polygon points="120,130 140,140 135,155 115,150" fill="url(#fold2)" stroke="#999" stroke-width="0.5"/>
  
  <!-- Face details -->
  <circle cx="90" cy="85" r="2" fill="#666"/>
  <circle cx="110" cy="85" r="2" fill="#666"/>
  <polygon points="100,95 95,90 105,90" fill="#999"/>
  
  <!-- Whiskers -->
  <line x1="70" y1="85" x2="55" y2="83" stroke="#999" stroke-width="0.5"/>
  <line x1="70" y1="90" x2="55" y2="90" stroke="#999" stroke-width="0.5"/>
  <line x1="130" y1="85" x2="145" y2="83" stroke="#999" stroke-width="0.5"/>
  <line x1="130" y1="90" x2="145" y2="90" stroke="#999" stroke-width="0.5"/>
</svg>