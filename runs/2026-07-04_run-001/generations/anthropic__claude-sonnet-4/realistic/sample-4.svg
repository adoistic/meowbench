<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bodyGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="40%" stop-color="#e8e8e8"/>
      <stop offset="80%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </radialGradient>
    <radialGradient id="darkFur" cx="0.2" cy="0.2" r="0.9">
      <stop offset="0%" stop-color="#c8c8c8"/>
      <stop offset="60%" stop-color="#a8a8a8"/>
      <stop offset="100%" stop-color="#888888"/>
    </radialGradient>
    <linearGradient id="earGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <radialGradient id="noseGradient" cx="0.3" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#ff9999"/>
      <stop offset="70%" stop-color="#ee7777"/>
      <stop offset="100%" stop-color="#cc5555"/>
    </radialGradient>
  </defs>
  
  <!-- Body -->
  <ellipse cx="200" cy="350" rx="85" ry="110" fill="url(#bodyGradient)"/>
  
  <!-- Chest -->
  <ellipse cx="200" cy="280" rx="65" ry="80" fill="url(#bodyGradient)"/>
  
  <!-- Head -->
  <ellipse cx="200" cy="180" rx="70" ry="65" fill="url(#bodyGradient)"/>
  
  <!-- Ears -->
  <ellipse cx="160" cy="130" rx="20" ry="35" fill="url(#earGradient)" transform="rotate(-25 160 130)"/>
  <ellipse cx="240" cy="130" rx="20" ry="35" fill="url(#earGradient)" transform="rotate(25 240 130)"/>
  
  <!-- Inner ears -->
  <ellipse cx="160" cy="135" rx="8" ry="15" fill="#ffb3ba" transform="rotate(-25 160 135)"/>
  <ellipse cx="240" cy="135" rx="8" ry="15" fill="#ffb3ba" transform="rotate(25 240 135)"/>
  
  <!-- Front legs -->
  <ellipse cx="160" cy="380" rx="18" ry="45" fill="url(#darkFur)"/>
  <ellipse cx="240" cy="380" rx="18" ry="45" fill="url(#darkFur)"/>
  
  <!-- Paws -->
  <ellipse cx="160" cy="420" rx="22" ry="15" fill="url(#darkFur)"/>
  <ellipse cx="240" cy="420" rx="22" ry="15" fill="url(#darkFur)"/>
  
  <!-- Tail -->
  <ellipse cx="280" cy="300" rx="25" ry="80" fill="url(#darkFur)" transform="rotate(30 280 300)"/>
  <ellipse cx="320" cy="240" rx="20" ry="60" fill="url(#darkFur)" transform="rotate(60 320 240)"/>
  
  <!-- Face markings -->
  <ellipse cx="170" cy="165" rx="15" ry="12" fill="url(#darkFur)" opacity="0.3"/>
  <ellipse cx="230" cy="165" rx="15" ry="12" fill="url(#darkFur)" opacity="0.3"/>
  
  <!-- Eyes -->
  <ellipse cx="180" cy="170" rx="12" ry="18" fill="#4a7c59"/>
  <ellipse cx="220" cy="170" rx="12" ry="18" fill="#4a7c59"/>
  
  <!-- Eye highlights -->
  <ellipse cx="182" cy="165" rx="4" ry="6" fill="#ffffff"/>
  <ellipse cx="222" cy="165" rx="4" ry="6" fill="#ffffff"/>
  
  <!-- Pupils -->
  <ellipse cx="180" cy="172" rx="3" ry="8" fill="#000000"/>
  <ellipse cx="220" cy="172" rx="3" ry="8" fill="#000000"/>
  
  <!-- Nose -->
  <path d="M200 190 L192 200 L208 200 Z" fill="url(#noseGradient)"/>
  
  <!-- Mouth -->
  <path d="M200 200 Q190 210 185 205" stroke="#666666" stroke-width="2" fill="none"/>
  <path d="M200 200 Q210 210 215 205" stroke="#666666" stroke-width="2" fill="none"/>
  
  <!-- Whiskers -->
  <line x1="130" y1="185" x2="80" y2="180" stroke="#666666" stroke-width="1.5"/>
  <line x1="130" y1="195" x2="75" y2="195" stroke="#666666" stroke-width="1.5"/>
  <line x1="270" y1="185" x2="320" y2="180" stroke="#666666" stroke-width="1.5"/>
  <line x1="270" y1="195" x2="325" y2="195" stroke="#666666" stroke-width="1.5"/>
  
  <!-- Fur texture details -->
  <path d="M140 340 Q145 350 140 360 Q135 350 140 340" fill="url(#darkFur)" opacity="0.4"/>
  <path d="M260 340 Q265 350 260 360 Q255 350 260 340" fill="url(#darkFur)" opacity="0.4"/>
  <path d="M180 320 Q185 330 180 340 Q175 330 180 320" fill="url(#darkFur)" opacity="0.3"/>
  <path d="M220 320 Q225 330 220 340 Q215 330 220 320" fill="url(#darkFur)" opacity="0.3"/>
</svg>