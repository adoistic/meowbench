<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8d8d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Head base -->
  <polygon points="200,120 160,180 240,180" fill="url(#grad1)" stroke="#999" stroke-width="2"/>
  
  <!-- Left ear -->
  <polygon points="140,60 200,120 160,180 120,120" fill="url(#grad2)" stroke="#999" stroke-width="2"/>
  <polygon points="150,90 180,110 160,140 140,120" fill="url(#grad3)" stroke="#999" stroke-width="1"/>
  
  <!-- Right ear -->
  <polygon points="260,60 320,120 280,180 200,120" fill="url(#grad2)" stroke="#999" stroke-width="2"/>
  <polygon points="250,90 280,120 260,140 230,110" fill="url(#grad3)" stroke="#999" stroke-width="1"/>
  
  <!-- Face fold lines -->
  <polygon points="200,120 180,160 200,180 220,160" fill="url(#grad1)" stroke="#999" stroke-width="2"/>
  
  <!-- Body upper -->
  <polygon points="160,180 240,180 280,260 120,260" fill="url(#grad1)" stroke="#999" stroke-width="2"/>
  
  <!-- Body center fold -->
  <polygon points="160,180 200,220 240,180 200,260" fill="url(#grad2)" stroke="#999" stroke-width="2"/>
  
  <!-- Left body panel -->
  <polygon points="120,260 160,180 200,220 160,300" fill="url(#grad3)" stroke="#999" stroke-width="2"/>
  
  <!-- Right body panel -->
  <polygon points="280,260 240,180 200,220 240,300" fill="url(#grad3)" stroke="#999" stroke-width="2"/>
  
  <!-- Tail -->
  <polygon points="240,300 280,260 320,280 300,340 260,320" fill="url(#grad2)" stroke="#999" stroke-width="2"/>
  
  <!-- Left paw -->
  <polygon points="120,260 160,300 140,340 100,320" fill="url(#grad2)" stroke="#999" stroke-width="2"/>
  
  <!-- Right paw -->
  <polygon points="200,260 240,300 220,340 180,320" fill="url(#grad2)" stroke="#999" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="180" cy="150" r="6" fill="#333"/>
  <circle cx="220" cy="150" r="6" fill="#333"/>
  <circle cx="182" cy="148" r="2" fill="#fff"/>
  <circle cx="222" cy="148" r="2" fill="#fff"/>
  
  <!-- Nose -->
  <polygon points="200,165 195,172 205,172" fill="#ff9999"/>
  
  <!-- Mouth -->
  <path d="M 200,175 Q 190,185 185,180" stroke="#666" stroke-width="2" fill="none"/>
  <path d="M 200,175 Q 210,185 215,180" stroke="#666" stroke-width="2" fill="none"/>
  
  <!-- Fold lines for geometric effect -->
  <line x1="140" y1="60" x2="200" y2="120" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="260" y1="60" x2="200" y2="120" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="200" y1="120" x2="200" y2="220" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="160" y1="180" x2="240" y2="180" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="120" y1="260" x2="280" y2="260" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
</svg>