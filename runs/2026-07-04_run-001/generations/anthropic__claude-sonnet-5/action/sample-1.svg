<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- sky -->
  <rect width="400" height="300" fill="#eaf6ff"/>
  <!-- ground -->
  <line x1="0" y1="265" x2="400" y2="265" stroke="#8b5a2b" stroke-width="4"/>
  <rect x="0" y="265" width="400" height="35" fill="#c9a06b"/>

  <!-- ===== Bicycle ===== -->
  <!-- wheels -->
  <circle cx="110" cy="220" r="45" fill="none" stroke="#333" stroke-width="6"/>
  <circle cx="110" cy="220" r="8" fill="#333"/>
  <circle cx="290" cy="220" r="45" fill="none" stroke="#333" stroke-width="6"/>
  <circle cx="290" cy="220" r="8" fill="#333"/>
  <!-- spokes -->
  <g stroke="#666" stroke-width="2">
    <line x1="110" y1="220" x2="80" y2="190"/>
    <line x1="110" y1="220" x2="140" y2="190"/>
    <line x1="110" y1="220" x2="80" y2="250"/>
    <line x1="110" y1="220" x2="140" y2="250"/>
    <line x1="290" y1="220" x2="260" y2="190"/>
    <line x1="290" y1="220" x2="320" y2="190"/>
    <line x1="290" y1="220" x2="260" y2="250"/>
    <line x1="290" y1="220" x2="320" y2="250"/>
  </g>

  <!-- frame -->
  <g stroke="#c0392b" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="110" y1="220" x2="170" y2="140"/>
    <line x1="170" y1="140" x2="190" y2="220"/>
    <line x1="190" y1="220" x2="110" y2="220"/>
    <line x1="190" y1="220" x2="290" y2="220"/>
    <line x1="290" y1="220" x2="270" y2="130"/>
    <line x1="270" y1="130" x2="170" y2="140"/>
  </g>

  <!-- seat -->
  <rect x="158" y="132" width="26" height="8" rx="3" fill="#333"/>

  <!-- handlebar -->
  <line x1="270" y1="130" x2="248" y2="112" stroke="#333" stroke-width="5" stroke-linecap="round"/>
  <line x1="248" y1="112" x2="292" y2="108" stroke="#333" stroke-width="5" stroke-linecap="round"/>

  <!-- pedal crank -->
  <line x1="190" y1="220" x2="168" y2="236" stroke="#333" stroke-width="4"/>
  <line x1="190" y1="220" x2="212" y2="204" stroke="#333" stroke-width="4"/>
  <circle cx="168" cy="236" r="5" fill="#333"/>
  <circle cx="212" cy="204" r="5" fill="#333"/>

  <!-- ===== Cat ===== -->
  <!-- tail -->
  <path d="M150 165 Q100 150 122 195" stroke="#e8974a" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M150 165 Q100 150 122 195" stroke="#c76f2e" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- back leg to pedal -->
  <path d="M172 175 Q150 205 168 230" stroke="#e8974a" stroke-width="13" fill="none" stroke-linecap="round"/>
  <ellipse cx="168" cy="234" rx="8" ry="6" fill="#e8974a"/>

  <!-- body -->
  <ellipse cx="195" cy="155" rx="46" ry="30" fill="#e8974a" transform="rotate(-20 195 155)"/>
  <!-- stripes on body -->
  <path d="M165 145 Q175 130 190 128" stroke="#c76f2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M175 165 Q190 150 205 148" stroke="#c76f2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M195 178 Q210 165 222 160" stroke="#c76f2e" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- front leg to handlebar -->
  <path d="M222 138 Q245 122 253 113" stroke="#e8974a" stroke-width="11" fill="none" stroke-linecap="round"/>
  <ellipse cx="253" cy="112" rx="7" ry="6" fill="#e8974a"/>

  <!-- head -->
  <circle cx="245" cy="108" r="26" fill="#e8974a"/>
  <!-- head stripes -->
  <path d="M232 92 Q245 86 258 92" stroke="#c76f2e" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ears -->
  <polygon points="228,94 236,66 249,90" fill="#e8974a"/>
  <polygon points="262,90 270,64 275,93" fill="#e8974a"/>
  <polygon points="232,88 238,74 245,88" fill="#ffc0cb"/>
  <polygon points="265,86 269,72 273,88" fill="#ffc0cb"/>

  <!-- eyes -->
  <ellipse cx="236" cy="106" rx="4" ry="5" fill="#2b2b2b"/>
  <ellipse cx="255" cy="104" rx="4" ry="5" fill="#2b2b2b"/>
  <circle cx="237" cy="104" r="1" fill="#fff"/>
  <circle cx="256" cy="102" r="1" fill="#fff"/>

  <!-- nose -->
  <polygon points="245,116 241,121 249,121" fill="#8a4a2b"/>

  <!-- mouth -->
  <path d="M245 121 Q240 126 234 123" stroke="#5a3320" stroke-width="1.5" fill="none"/>
  <path d="M245 121 Q250 126 256 123" stroke="#5a3320" stroke-width="1.5" fill="none"/>

  <!-- whiskers -->
  <g stroke="#5a3320" stroke-width="1">
    <line x1="222" y1="112" x2="198" y2="106"/>
    <line x1="222" y1="118" x2="198" y2="118"/>
    <line x1="268" y1="112" x2="292" y2="106"/>
    <line x1="268" y1="118" x2="292" y2="118"/>
  </g>
</svg>