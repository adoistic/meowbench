<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="300" fill="#eaf6ff"/>
  <line x1="0" y1="260" x2="400" y2="260" stroke="#cdeccd" stroke-width="20"/>

  <!-- Bicycle wheels -->
  <g stroke="#333" stroke-width="4" fill="none">
    <circle cx="100" cy="215" r="45"/>
    <circle cx="280" cy="215" r="45"/>
  </g>

  <!-- Spokes -->
  <g stroke="#666" stroke-width="1.5">
    <g>
      <line x1="100" y1="215" x2="100" y2="170"/>
      <line x1="100" y1="215" x2="100" y2="260"/>
      <line x1="100" y1="215" x2="132" y2="183"/>
      <line x1="100" y1="215" x2="68" y2="183"/>
      <line x1="100" y1="215" x2="132" y2="247"/>
      <line x1="100" y1="215" x2="68" y2="247"/>
      <line x1="100" y1="215" x2="145" y2="215"/>
      <line x1="100" y1="215" x2="55" y2="215"/>
    </g>
    <g>
      <line x1="280" y1="215" x2="280" y2="170"/>
      <line x1="280" y1="215" x2="280" y2="260"/>
      <line x1="280" y1="215" x2="312" y2="183"/>
      <line x1="280" y1="215" x2="248" y2="183"/>
      <line x1="280" y1="215" x2="312" y2="247"/>
      <line x1="280" y1="215" x2="248" y2="247"/>
      <line x1="280" y1="215" x2="325" y2="215"/>
      <line x1="280" y1="215" x2="235" y2="215"/>
    </g>
  </g>
  <circle cx="100" cy="215" r="6" fill="#333"/>
  <circle cx="280" cy="215" r="6" fill="#333"/>

  <!-- Bicycle frame -->
  <g stroke="#444" stroke-width="5" fill="none" stroke-linecap="round">
    <line x1="100" y1="215" x2="190" y2="210"/>
    <line x1="190" y1="210" x2="165" y2="130"/>
    <line x1="165" y1="130" x2="100" y2="215"/>
    <line x1="190" y1="210" x2="280" y2="215"/>
    <line x1="190" y1="210" x2="225" y2="115"/>
    <line x1="225" y1="115" x2="280" y2="215"/>
  </g>

  <!-- Handlebar -->
  <g stroke="#333" stroke-width="5" stroke-linecap="round">
    <line x1="225" y1="115" x2="225" y2="98"/>
    <line x1="200" y1="98" x2="250" y2="98"/>
  </g>

  <!-- Seat -->
  <ellipse cx="163" cy="123" rx="18" ry="7" fill="#5a3b2b" transform="rotate(-15 163 123)"/>

  <!-- Pedal crank -->
  <circle cx="190" cy="210" r="6" fill="#333"/>
  <line x1="190" y1="210" x2="175" y2="230" stroke="#333" stroke-width="4"/>
  <line x1="190" y1="210" x2="205" y2="190" stroke="#333" stroke-width="4"/>
  <rect x="167" y="228" width="16" height="6" fill="#222" transform="rotate(35 175 230)"/>
  <rect x="197" y="184" width="16" height="6" fill="#222" transform="rotate(-35 205 190)"/>

  <!-- Cat tail -->
  <path d="M110,160 C70,150 60,110 90,95" stroke="#e8974a" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M110,160 C70,150 60,110 90,95" stroke="#c97a34" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Cat body -->
  <ellipse cx="150" cy="150" rx="48" ry="26" fill="#e8974a" transform="rotate(-18 150 150)"/>
  <ellipse cx="150" cy="150" rx="48" ry="26" fill="none" stroke="#c97a34" stroke-width="3" transform="rotate(-18 150 150)"/>

  <!-- Stripes on body -->
  <g stroke="#c97a34" stroke-width="4" fill="none" opacity="0.7">
    <path d="M120,135 q10,20 0,35"/>
    <path d="M140,128 q10,25 0,42"/>
    <path d="M160,124 q10,25 0,42"/>
  </g>

  <!-- Hind legs -->
  <path d="M140,168 L172,222" stroke="#e8974a" stroke-width="12" stroke-linecap="round"/>
  <path d="M155,170 L200,195" stroke="#e8974a" stroke-width="12" stroke-linecap="round"/>
  <circle cx="172" cy="224" r="7" fill="#d9843a"/>
  <circle cx="202" cy="196" r="7" fill="#d9843a"/>

  <!-- Front legs (arms) to handlebar -->
  <path d="M182,122 L207,100" stroke="#e8974a" stroke-width="11" stroke-linecap="round"/>
  <path d="M195,118 L232,100" stroke="#e8974a" stroke-width="11" stroke-linecap="round"/>
  <circle cx="207" cy="99" r="7" fill="#d9843a"/>
  <circle cx="233" cy="99" r="7" fill="#d9843a"/>

  <!-- Cat head -->
  <circle cx="210" cy="108" r="24" fill="#e8974a"/>
  <circle cx="210" cy="108" r="24" fill="none" stroke="#c97a34" stroke-width="3"/>

  <!-- Ears -->
  <path d="M192,90 L186,68 L206,84 Z" fill="#e8974a" stroke="#c97a34" stroke-width="2"/>
  <path d="M228,90 L236,66 L214,84 Z" fill="#e8974a" stroke="#c97a34" stroke-width="2"/>
  <path d="M195,86 L192,74 L202,84 Z" fill="#f4b98a"/>
  <path d="M225,86 L230,72 L219,84 Z" fill="#f4b98a"/>

  <!-- Face features -->
  <circle cx="202" cy="106" r="3" fill="#2b2b2b"/>
  <circle cx="220" cy="106" r="3" fill="#2b2b2b"/>
  <path d="M210,112 l-3,4 l6,0 Z" fill="#b5602c"/>
  <path d="M210,116 q-6,6 -12,2" stroke="#4a2c17" stroke-width="1.5" fill="none"/>
  <path d="M210,116 q6,6 12,2" stroke="#4a2c17" stroke-width="1.5" fill="none"/>

  <!-- Whiskers -->
  <g stroke="#7a5230" stroke-width="1.5">
    <line x1="195" y1="112" x2="170" y2="108"/>
    <line x1="195" y1="116" x2="170" y2="118"/>
    <line x1="225" y1="112" x2="250" y2="108"/>
    <line x1="225" y1="116" x2="250" y2="118"/>
  </g>
</svg>