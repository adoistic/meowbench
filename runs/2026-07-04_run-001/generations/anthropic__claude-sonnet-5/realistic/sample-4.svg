<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef3f7"/>
      <stop offset="70%" stop-color="#f7f1e6"/>
      <stop offset="100%" stop-color="#efe6d3"/>
    </linearGradient>

    <radialGradient id="furBody" cx="45%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#f3b579"/>
      <stop offset="55%" stop-color="#d9853b"/>
      <stop offset="100%" stop-color="#a85c26"/>
    </radialGradient>

    <radialGradient id="furHead" cx="45%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f6c48c"/>
      <stop offset="60%" stop-color="#dd8f45"/>
      <stop offset="100%" stop-color="#a85c26"/>
    </radialGradient>

    <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3b579"/>
      <stop offset="100%" stop-color="#9c531f"/>
    </linearGradient>

    <radialGradient id="pawGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fdf6ec"/>
      <stop offset="100%" stop-color="#e6d5b8"/>
    </radialGradient>

    <radialGradient id="chestGrad" cx="50%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#fffaf1"/>
      <stop offset="100%" stop-color="#eed9b8"/>
    </radialGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="500" height="600" fill="url(#bgGrad)"/>

  <!-- ground shadow -->
  <ellipse cx="250" cy="575" rx="150" ry="18" fill="#000000" opacity="0.18" filter="url(#soft)"/>

  <!-- tail curling from behind body -->
  <path d="M375,460 C440,445 470,380 445,320 C428,280 385,268 362,290
           C395,300 412,342 400,384 C390,420 368,448 335,462
           C348,470 362,468 375,460 Z"
        fill="url(#tailGrad)" stroke="#7a441a" stroke-width="2"/>
  <!-- tail stripes -->
  <path d="M400,300 C415,320 418,345 405,368" fill="none" stroke="#6e3a16" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
  <path d="M385,285 C400,305 405,330 395,352" fill="none" stroke="#6e3a16" stroke-width="6" opacity="0.4" stroke-linecap="round"/>
  <path d="M420,330 C432,350 432,372 420,392" fill="none" stroke="#6e3a16" stroke-width="6" opacity="0.35" stroke-linecap="round"/>

  <!-- body -->
  <path d="M150,565 C112,565 95,520 95,468
           C95,378 118,312 162,272
           C185,250 210,240 225,238
           L275,238
           C290,240 315,250 338,272
           C382,312 405,378 405,468
           C405,520 388,565 350,565 Z"
        fill="url(#furBody)" stroke="#8a4c22" stroke-width="2"/>

  <!-- chest patch -->
  <ellipse cx="250" cy="440" rx="72" ry="115" fill="url(#chestGrad)" opacity="0.92"/>

  <!-- body stripes -->
  <path d="M140,320 C160,340 168,370 158,400" fill="none" stroke="#8a4c22" stroke-width="7" opacity="0.35" stroke-linecap="round"/>
  <path d="M370,330 C352,350 346,378 358,405" fill="none" stroke="#8a4c22" stroke-width="7" opacity="0.35" stroke-linecap="round"/>
  <path d="M120,400 C142,420 150,450 138,478" fill="none" stroke="#8a4c22" stroke-width="7" opacity="0.3" stroke-linecap="round"/>
  <path d="M382,405 C362,425 355,455 368,482" fill="none" stroke="#8a4c22" stroke-width="7" opacity="0.3" stroke-linecap="round"/>

  <!-- front paws -->
  <ellipse cx="212" cy="548" rx="38" ry="27" fill="url(#pawGrad)" stroke="#c8a97c" stroke-width="1.5"/>
  <ellipse cx="288" cy="548" rx="38" ry="27" fill="url(#pawGrad)" stroke="#c8a97c" stroke-width="1.5"/>
  <line x1="196" y1="540" x2="196" y2="562" stroke="#c8a97c" stroke-width="1.5"/>
  <line x1="212" y1="536" x2="212" y2="562" stroke="#c8a97c" stroke-width="1.5"/>
  <line x1="228" y1="540" x2="228" y2="562" stroke="#c8a97c" stroke-width="1.5"/>
  <line x1="272" y1="540" x2="272" y2="562" stroke="#c8a97c" stroke-width="1.5"/>
  <line x1="288" y1="536" x2="288" y2="562" stroke="#c8a97c" stroke-width="1.5"/>
  <line x1="304" y1="540" x2="304" y2="562" stroke="#c8a97c" stroke-width="1.5"/>

  <!-- fur texture strokes on body -->
  <g stroke-linecap="round" fill="none" opacity="0.55">
    <path d="M160,350 C165,340 172,340 178,350" stroke="#f3b579" stroke-width="2"/>
    <path d="M180,380 C185,368 193,368 198,380" stroke="#a85c26" stroke-width="2"/>
    <path d="M200,420 C206,408 214,408 220,420" stroke="#f3b579" stroke-width="2"/>
    <path d="M320,360 C326,348 334,348 340,360" stroke="#a85c26" stroke-width="2"/>
    <path d="M300,400 C306,388 314,388 320,400" stroke="#f3b579" stroke-width="2"/>
    <path d="M280,440 C286,428 294,428 300,440" stroke="#a85c26" stroke-width="2"/>
    <path d="M230,460 C236,448 244,448 250,460" stroke="#f3b579" stroke-width="2"/>
    <path d="M260,500 C266,488 274,488 280,500" stroke="#a85c26" stroke-width="2"/>
    <path d="M150,470 C156,458 164,458 170,470" stroke="#f3b579" stroke-width="2"/>
    <path d="M370,470 C364,458 356,458 350,470" stroke="#a85c26" stroke-width="2"/>
  </g>

  <!-- head -->
  <ellipse cx="250" cy="195" rx="97" ry="90" fill="url(#furHead)" stroke="#8a4c22" stroke-width="2"/>

  <!-- head fur strokes -->
  <g stroke-linecap="round" fill="none" opacity="0.5">
    <path d="M190,150 C195,138 203,138 208,150" stroke="#f6c48c" stroke-width="2"/>
    <path d="M215,130 C220,118 228,118 233,130" stroke="#a85c26" stroke-width="2"/>
    <path d="M245,120 C250,108 258,108 263,120" stroke="#f6c48c" stroke-width="2"/>
    <path d="M275,130 C280,118 288,118 293,130" stroke="#a85c26" stroke-width="2"/>
    <path d="M300,150 C305,138 313,138 318,150" stroke="#f6c48c" stroke-width="2"/>
  </g>

  <!-- ears -->
  <polygon points="165,150 128,52 208,128" fill="url(#furHead)" stroke="#8a4c22" stroke-width="2"/>
  <polygon points="335,150 372,52 292,128" fill="url(#furHead)" stroke="#8a4c22" stroke-width="2"/>
  <polygon points="168,138 145,75 200,122" fill="#f2a9a9" opacity="0.85"/>
  <polygon points="332,138 355,75 300,122" fill="#f2a9a9" opacity="0.85"/>
  <!-- ear fur tufts -->
  <path d="M150,110 C145,100 150,90 158,88" fill="none" stroke="#8a4c22" stroke-width="2" opacity="0.5"/>
  <path d="M350,110 C355,100 350,90 342,88" fill="none" stroke="#8a4c22" stroke-width="2" opacity="0.5"/>

  <!-- eyes -->
  <path d="M195,178 C205,160 230,160 240,178 C230,198 205,198 195,178 Z" fill="#fffefc"/>
  <path d="M260,178 C270,160 295,160 305,178 C295,198 270,198 260,178 Z" fill="#fffefc"/>
  <circle cx="217" cy="181" r="13" fill="#9fc94b"/>
  <circle cx="283" cy="181" r="13" fill="#9fc94b"/>
  <ellipse cx="217" cy="181" rx="4" ry="11" fill="#1b1b1b"/>
  <ellipse cx="283" cy="181" rx="4" ry="11" fill="#1b1b1b"/>
  <circle cx="213" cy="176" r="2" fill="#ffffff"/>
  <circle cx="279" cy="176" r="2" fill="#ffffff"/>

  <!-- eyelid shading -->
  <path d="M195,178 C205,168 230,168 240,178" fill="none" stroke="#8a4c22" stroke-width="2" opacity="0.4"/>
  <path d="M260,178 C270,168 295,168 305,178" fill="none" stroke="#8a4c22" stroke-width="2" opacity="0.4"/>

  <!-- nose -->
  <path d="M240,210 C245,204 255,204 260,210 C258,220 242,220 240,210 Z" fill="#e08a8a" stroke="#a85252" stroke-width="1"/>

  <!-- mouth -->
  <path d="M250,220 L250,232" stroke="#5c3a22" stroke-width="2" fill="none"/>
  <path d="M250,232 C240,244 222,244 216,234" stroke="#5c3a22" stroke-width="2" fill="none"/>
  <path d="M250,232 C260,244 278,244 284,234" stroke="#5c3a22" stroke-width="2" fill="none"/>

  <!-- whiskers -->
  <g stroke="#f5efe6" stroke-width="1.5" opacity="0.9">
    <line x1="205" y1="215" x2="95" y2="205"/>
    <line x1="205" y1="225" x2="92" y2="228"/>
    <line x1="205" y1="235" x2="98" y2="252"/>
    <line x1="295" y1="215" x2="405" y2="205"/>
    <line x1="295" y1="225" x2="408" y2="228"/>
    <line x1="295" y1="235" x2="402" y2="252"/>
  </g>

  <!-- subtle head highlight -->
  <ellipse cx="225" cy="150" rx="35" ry="20" fill="#ffffff" opacity="0.12"/>
</svg>