<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="#f4e9da"/>
  
  <!-- Shadow -->
  <ellipse cx="255" cy="430" rx="150" ry="18" fill="#00000015"/>

  <!-- Tail -->
  <polygon points="360,340 430,300 420,330 380,350" fill="#e8a33d"/>
  <polygon points="380,350 420,330 400,360" fill="#d68c28"/>

  <!-- Back body -->
  <polygon points="150,260 360,260 340,380 170,390" fill="#f2b545"/>
  <polygon points="150,260 250,260 230,390 170,390" fill="#e8a33d"/>
  <polygon points="250,260 360,260 340,380 230,390" fill="#f7c463"/>

  <!-- Front body fold -->
  <polygon points="150,260 250,180 350,260" fill="#f7c463"/>
  <polygon points="150,260 250,180 250,260" fill="#e8a33d"/>
  <polygon points="250,180 350,260 250,260" fill="#f2b545"/>

  <!-- Legs -->
  <polygon points="180,390 200,440 220,390" fill="#e8a33d"/>
  <polygon points="220,390 240,440 260,390" fill="#f2b545"/>
  <polygon points="260,390 280,440 300,390" fill="#e8a33d"/>
  <polygon points="300,390 320,440 340,390" fill="#f2b545"/>

  <!-- Neck/head base -->
  <polygon points="200,180 250,110 300,180" fill="#f7c463"/>
  <polygon points="200,180 250,110 250,180" fill="#e8a33d"/>
  <polygon points="250,110 300,180 250,180" fill="#f2b545"/>

  <!-- Head -->
  <polygon points="180,130 250,60 320,130 250,190" fill="#f7c463"/>
  <polygon points="180,130 250,60 250,190" fill="#f2b545"/>
  <polygon points="250,60 320,130 250,190" fill="#e8a33d"/>

  <!-- Ears -->
  <polygon points="180,130 150,60 210,95" fill="#e8a33d"/>
  <polygon points="320,130 350,60 290,95" fill="#f2b545"/>
  <polygon points="180,130 210,95 195,120" fill="#d68c28"/>
  <polygon points="320,130 290,95 305,120" fill="#e8a33d"/>

  <!-- Face fold lines -->
  <line x1="250" y1="60" x2="250" y2="190" stroke="#d68c28" stroke-width="2"/>
  <line x1="180" y1="130" x2="320" y2="130" stroke="#d68c28" stroke-width="2"/>

  <!-- Eyes -->
  <polygon points="215,120 230,110 230,130" fill="#3a2c1a"/>
  <polygon points="285,120 270,110 270,130" fill="#3a2c1a"/>

  <!-- Nose -->
  <polygon points="245,145 255,145 250,155" fill="#c65a3b"/>

  <!-- Whisker folds -->
  <line x1="190" y1="150" x2="150" y2="145" stroke="#5c4a30" stroke-width="1.5"/>
  <line x1="190" y1="160" x2="150" y2="165" stroke="#5c4a30" stroke-width="1.5"/>
  <line x1="310" y1="150" x2="350" y2="145" stroke="#5c4a30" stroke-width="1.5"/>
  <line x1="310" y1="160" x2="350" y2="165" stroke="#5c4a30" stroke-width="1.5"/>

  <!-- Fold lines on body for origami effect -->
  <line x1="150" y1="260" x2="250" y2="180" stroke="#c9852c" stroke-width="1.5"/>
  <line x1="250" y1="180" x2="350" y2="260" stroke="#c9852c" stroke-width="1.5"/>
  <line x1="150" y1="260" x2="360" y2="260" stroke="#c9852c" stroke-width="1.5"/>
  <line x1="250" y1="260" x2="230" y2="390" stroke="#c9852c" stroke-width="1.5"/>
  <line x1="250" y1="260" x2="340" y2="380" stroke="#c9852c" stroke-width="1.5"/>
</svg>