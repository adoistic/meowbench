<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#87CEEB"/>
  <rect x="0" y="250" width="400" height="50" fill="#7CFC00"/>
  
  <!-- Bicycle -->
  <circle cx="150" cy="200" r="40" fill="none" stroke="black" stroke-width="3"/>
  <circle cx="250" cy="200" r="30" fill="none" stroke="black" stroke-width="3"/>
  <line x1="150" y1="200" x2="200" y2="150" stroke="black" stroke-width="3"/>
  <line x1="200" y1="150" x2="250" y2="200" stroke="black" stroke-width="3"/>
  <line x1="200" y1="150" x2="200" y2="120" stroke="black" stroke-width="3"/>
  <line x1="150" y1="200" x2="120" y2="170" stroke="black" stroke-width="3"/>
  
  <!-- Cat -->
  <circle cx="200" cy="100" r="30" fill="gray"/>
  <circle cx="190" cy="90" r="5" fill="white"/>
  <circle cx="210" cy="90" r="5" fill="white"/>
  <circle cx="190" cy="90" r="2" fill="black"/>
  <circle cx="210" cy="90" r="2" fill="black"/>
  <path d="M185 115 Q200 130 215 115" stroke="black" stroke-width="2" fill="none"/>
  <path d="M170 80 Q180 60 190 80" stroke="black" stroke-width="2" fill="none"/>
  <path d="M230 80 Q240 60 210 80" stroke="black" stroke-width="2" fill="none"/>
  
  <!-- Sun -->
  <circle cx="350" cy="50" r="30" fill="yellow"/>
  <line x1="350" y1="20" x2="350" y2="10" stroke="yellow" stroke-width="3"/>
  <line x1="350" y1="80" x2="350" y2="90" stroke="yellow" stroke-width="3"/>
  <line x1="320" y1="50" x2="310" y2="50" stroke="yellow" stroke-width="3"/>
  <line x1="380" y1="50" x2="390" y2="50" stroke="yellow" stroke-width="3"/>
  <line x1="330" y1="30" x2="325" y2="20" stroke="yellow" stroke-width="3"/>
  <line x1="370" y1="30" x2="375" y2="20" stroke="yellow" stroke-width="3"/>
  <line x1="330" y1="70" x2="325" y2="80" stroke="yellow" stroke-width="3"/>
  <line x1="370" y1="70" x2="375" y2="80" stroke="yellow" stroke-width="3"/>
</svg>