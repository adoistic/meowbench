<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="furGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#5a4a42"/>
      <stop offset="50%" stop-color="#3a2e28"/>
      <stop offset="100%" stop-color="#1a1512"/>
    </radialGradient>
    <filter id="furTexture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#ffffff" surfaceScale="2">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="0.5" k2="0.5" k3="0.5" k4="0"/>
    </filter>
  </defs>
  
  <!-- Body -->
  <path d="M200 300 C150 300 120 250 100 200 C80 150 100 100 150 80 C200 60 250 80 280 120 C300 150 290 200 270 240 C250 280 230 300 200 300 Z" fill="url(#furGradient)" filter="url(#furTexture)" stroke="#1a1512" stroke-width="1"/>
  
  <!-- Head -->
  <circle cx="150" cy="120" r="50" fill="url(#furGradient)" filter="url(#furTexture)" stroke="#1a1512" stroke-width="1"/>
  
  <!-- Ears -->
  <path d="M110 80 L130 60 L150 80 Z" fill="url(#furGradient)" filter="url(#furTexture)" stroke="#1a1512" stroke-width="1"/>
  <path d="M150 80 L170 60 L190 80 Z" fill="url(#furGradient)" filter="url(#furTexture)" stroke="#1a1512" stroke-width="1"/>
  
  <!-- Eyes -->
  <ellipse cx="130" cy="110" rx="5" ry="8" fill="#1a1512"/>
  <ellipse cx="170" cy="110" rx="5" ry="8" fill="#1a1512"/>
  
  <!-- Nose -->
  <path d="M150 130 L140 140 L160 140 Z" fill="#f7a8b8"/>
  
  <!-- Whiskers -->
  <line x1="140" y1="140" x2="100" y2="130" stroke="#ffffff" stroke-width="1"/>
  <line x1="140" y1="145" x2="100" y2="145" stroke="#ffffff" stroke-width="1"/>
  <line x1="140" y1="150" x2="100" y2="160" stroke="#ffffff" stroke-width="1"/>
  <line x1="160" y1="140" x2="200" y2="130" stroke="#ffffff" stroke-width="1"/>
  <line x1="160" y1="145" x2="200" y2="145" stroke="#ffffff" stroke-width="1"/>
  <line x1="160" y1="150" x2="200" y2="160" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Tail -->
  <path d="M270 240 C300 220 330 200 350 230 C370 260 350 280 320 270 C290 260 270 240 270 240 Z" fill="url(#furGradient)" filter="url(#furTexture)" stroke="#1a1512" stroke-width="1"/>
  
  <!-- Paws -->
  <circle cx="180" cy="300" r="15" fill="url(#furGradient)" filter="url(#furTexture)" stroke="#1a1512" stroke-width="1"/>
  <circle cx="220" cy="300" r="15" fill="url(#furGradient)" filter="url(#furTexture)" stroke="#1a1512" stroke-width="1"/>
</svg>