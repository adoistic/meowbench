<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Bicycle -->
  <g fill="none" stroke="#333" stroke-width="3">
    <!-- Wheels -->
    <g id="wheel">
      <circle cx="100" cy="230" r="35" stroke="#555" stroke-width="4"/>
      <circle cx="100" cy="230" r="4" fill="#555"/>
      <line x1="100" y1="230" x2="125" y2="230" stroke="#555"/>
      <line x1="100" y1="230" x2="120" y2="245" stroke="#555"/>
      <line x1="100" y1="230" x2="120" y2="215" stroke="#555"/>
      <line x1="100" y1="230" x2="80" y2="245" stroke="#555"/>
      <line x1="100" y1="230" x2="80" y2="215" stroke="#555"/>
    </g>
    <g id="wheel2" transform="translate(200, 0)">
      <use href="#wheel"/>
    </g>
    
    <!-- Frame -->
    <line x1="100" y1="230" x2="140" y2="180"/>
    <line x1="140" y1="180" x2="300" y2="230"/>
    <line x1="140" y1="180" x2="150" y2="160"/>
    
    <!-- Handlebars -->
    <line x1="150" y1="160" x2="180" y2="130"/>
    <line x1="180" y1="130" x2="170" y2="130" stroke-width="4"/>
    <line x1="180" y1="130" x2="190" y2="130" stroke-width="4"/>
    
    <!-- Pedals -->
    <circle cx="240" cy="190" r="8" fill="#555"/>
    <line x1="240" y1="190" x2="220" y2="180" stroke-width="2"/>
    <line x1="240" y1="190" x2="260" y2="200" stroke-width="2"/>
    
    <!-- Seat -->
    <path d="M130 190 L140 180 L155 180 L145 190 Z" fill="#555"/>
  </g>
  
  <!-- Cat -->
  <g fill="#f39" stroke="#c06" stroke-width="1.5">
    <!-- Body -->
    <ellipse cx="180" cy="170" rx="35" ry="20"/>
    
    <!-- Head -->
    <circle cx="150" cy="150" r="15"/>
    
    <!-- Ears -->
    <path d="M140 135 L145 120 L150 135 Z"/>
    <path d="M155 135 L160 120 L165 135 Z"/>
    
    <!-- Eyes -->
    <circle cx="145" cy="147" r="2" fill="#333"/>
    <circle cx="155" cy="147" r="2" fill="#333"/>
    
    <!-- Nose -->
    <path d="M150 155 L148 158 L152 158 Z" fill="#ff99aa"/>
    
    <!-- Whiskers -->
    <line x1="148" y1="157" x2="130" y2="155"/>
    <line x1="148" y1="158" x2="130" y2="160"/>
    <line x1="152" y1="157" x2="170" y2="155"/>
    <line x1="152" y1="158" x2="170" y2="160"/>
    
    <!-- Tail -->
    <path d="M210 175 Q240 160 250 190" stroke="#f39" stroke-width="6" fill="none"/>
    
    <!-- Paws -->
    <circle cx="210" cy="180" r="6"/>
    <circle cx="150" cy="170" r="6" opacity="0.7"/>
    <line x1="180" y1="170" x2="165" y2="130" stroke="#f39" stroke-width="3"/>
    <line x1="180" y1="170" x2="195" y2="130" stroke="#f39" stroke-width="3"/>
  </g>
</svg>