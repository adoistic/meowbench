<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Bicycle frame -->
  <rect x="65" y="85" width="70" height="5" fill="#555" />
  <line x1="135" y1="90" x2="155" y2="70" stroke="#555" stroke-width="4" />
  <circle cx="100" cy="115" r="8" fill="#888" />
  <line x1="100" y1="85" x2="80" y2="110" stroke="#555" stroke-width="4" />
  
  <!-- Wheels and spokes -->
  <g stroke="#333" stroke-width="1">
    <circle cx="60" cy="110" r="25" stroke="#555" stroke-width="4" fill="none"/>
    <circle cx="140" cy="110" r="25" stroke="#555" stroke-width="4" fill="none"/>
    <line x1="60" y1="110" x2="52" y2="90" />
    <line x1="60" y1="110" x2="70" y2="90" />
    <line x1="60" y1="110" x2="80" y2="105" />
    <line x1="60" y1="110" x2="80" y2="115" />
    <line x1="140" y1="110" x2="150" y2="90" />
    <line x1="140" y1="110" x2="130" y2="90" />
    <line x1="140" y1="110" x2="120" y2="105" />
    <line x1="140" y1="110" x2="120" y2="115" />
  </g>
  
  <!-- Handlebars and seat -->
  <path d="M155 70 L165 65 L165 75 Z" fill="#555" />
  <path d="M75 100 Q85 70 95 95" stroke="#555" stroke-width="4" fill="none"/>
  
  <!-- Pedals -->
  <g transform="rotate(30 100 115)">
    <rect x="98" y="110" width="4" height="15" fill="#555"/>
    <rect x="88" y="112" width="20" height="1" fill="#777"/>
  </g>
  
  <!-- Cat body -->
  <path d="M70 95 Q85 60 100 95 Q115 60 130 95" stroke="#ffa500" stroke-width="18" fill="none" stroke-linecap="round"/>
  <circle cx="100" cy="65" r="15" fill="#ffa500" />
  
  <!-- Cat face -->
  <circle cx="95" cy="62" r="3" fill="#333" />
  <circle cx="105" cy="62" r="3" fill="#333" />
  <path d="M97 70 Q100 73 103 70" stroke="#333" stroke-width="1.5" fill="none"/>
  <path d="M100 60 L100 62" stroke="#333" stroke-width="1" />
  <path d="M90 58 L85 53" stroke="#333" stroke-width="1.5" />
  <path d="M110 58 L115 53" stroke="#333" stroke-width="1.5" />
  
  <!-- Cat limbs -->
  <path d="M100 80 L105 110" stroke="#ffa500" stroke-width="8" stroke-linecap="round"/>
  <circle cx="107" cy="113" r="5" fill="#ffa500"/>
  <path d="M95 82 L85 105" stroke="#ffa500" stroke-width="8" stroke-linecap="round"/>
  <circle cx="83" cy="108" r="5" fill="#ffa500"/>
  <path d="M90 95 L70 100" stroke="#ffa500" stroke-width="6" stroke-linecap="round"/>
</svg>