<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <!-- Tail -->
  <g transform="translate(200, 100)">
    <path d="M0,0 C-30,-20 -60,-40 -80,-30 C-100,-20 -90,10 -60,20 C-30,30 0,20 0,0" fill="#ffa500" stroke="#000" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="20" begin="0s" dur="1.5s" repeatCount="indefinite" additive="sum" calcMode="spline" keySplines="0.5 0 0.5 1; 0.5 0 0.5 1" keyTimes="0;0.5;1"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="-20" begin="1.5s" dur="1.5s" repeatCount="indefinite" additive="sum" calcMode="spline" keySplines="0.5 0 0.5 1; 0.5 0 0.5 1" keyTimes="0;0.5;1"/>
    </path>
  </g>
  
  <!-- Body -->
  <ellipse cx="150" cy="100" rx="50" ry="30" fill="#ffa500" stroke="#000" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="30" fill="#ffa500" stroke="#000" stroke-width="2"/>
  
  <!-- Legs -->
  <rect x="110" y="130" width="15" height="30" fill="#ffa500" stroke="#000" stroke-width="2"/>
  <rect x="130" y="130" width="15" height="30" fill="#ffa500" stroke="#000" stroke-width="2"/>
  <rect x="160" y="130" width="15" height="30" fill="#ffa500" stroke="#000" stroke-width="2"/>
  <rect x="180" y="130" width="15" height="30" fill="#ffa500" stroke="#000" stroke-width="2"/>
  
  <!-- Ears -->
  <polygon points="80,50 70,65 90,65" fill="#ffa500" stroke="#000" stroke-width="2"/>
  <polygon points="120,50 110,65 130,65" fill="#ffa500" stroke="#000" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="75" r="5" fill="#fff" stroke="#000" stroke-width="1"/>
  <circle cx="110" cy="75" r="5" fill="#fff" stroke="#000" stroke-width="1"/>
  <circle cx="89" cy="75" r="2" fill="#000"/>
  <circle cx="109" cy="75" r="2" fill="#000"/>
  
  <!-- Nose -->
  <polygon points="100,90 95,95 105,95" fill="#ff6b81"/>
</svg>