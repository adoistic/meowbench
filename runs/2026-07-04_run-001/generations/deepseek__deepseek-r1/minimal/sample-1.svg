<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Head -->
  <circle cx="50" cy="40" r="25" fill="#FFD700" stroke="#333" stroke-width="2"/>
  
  <!-- Ears -->
  <polygon points="35,20 45,10 30,10" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <polygon points="65,20 75,10 60,10" fill="#FFD700" stroke="#333" stroke-width="2"/>
  
  <!-- Eyes -->
  <circle cx="40" cy="35" r="3" fill="#333"/>
  <circle cx="60" cy="35" r="3" fill="#333"/>
  
  <!-- Nose -->
  <path d="M48 45 L52 45 L50 50 Z" fill="#FF6B6B"/>
  
  <!-- Whiskers -->
  <line x1="40" y1="47" x2="30" y2="45" stroke="#333" stroke-width="1"/>
  <line x1="40" y1="50" x2="30" y2="50" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="47" x2="70" y2="45" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="50" x2="70" y2="50" stroke="#333" stroke-width="1"/>
  
  <!-- Body -->
  <ellipse cx="50" cy="75" rx="20" ry="15" fill="#FFD700" stroke="#333" stroke-width="2"/>
  
  <!-- Tail -->
  <path d="M70 75 Q90 60 75 90" fill="none" stroke="#333" stroke-width="2"/>
</svg>