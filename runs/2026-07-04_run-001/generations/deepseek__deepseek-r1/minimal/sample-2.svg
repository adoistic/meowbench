<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g stroke-width="2" stroke="#333">
    <!-- Body -->
    <circle cx="100" cy="130" r="50" fill="#FFC0CB"/>
    
    <!-- Head -->
    <circle cx="100" cy="65" r="35" fill="#FFC0CB"/>
    
    <!-- Ears -->
    <polygon points="85,25 65,12 80,50" fill="#FFC0CB"/>
    <polygon points="115,25 135,12 120,50" fill="#FFC0CB"/>
    
    <!-- Eyes -->
    <circle cx="85" cy="60" r="6" fill="#333"/>
    <circle cx="115" cy="60" r="6" fill="#333"/>
    
    <!-- Nose -->
    <polygon points="98,80 102,80 100,85" fill="#333"/>
    
    <!-- Whiskers -->
    <g stroke-linecap="round">
      <line x1="70" y1="75" x2="92" y2="80"/>
      <line x1="70" y1="85" x2="92" y2="85"/>
      <line x1="108" y1="80" x2="130" y2="75"/>
      <line x1="108" y1="85" x2="130" y2="85"/>
    </g>
  </g>
</svg>