<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body -->
  <ellipse cx="100" cy="125" rx="60" ry="40" fill="#FFC0CB"/>
  
  <!-- Head -->
  <circle cx="100" cy="75" r="35" fill="#FFC0CB"/>
  
  <!-- Ears -->
  <polygon points="75,45 85,20 95,40" fill="#FFB6C1"/>
  <polygon points="105,40 115,20 125,45" fill="#FFB6C1"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="70" r="8" fill="white"/>
  <circle cx="115" cy="70" r="8" fill="white"/>
  <circle cx="85" cy="70" r="3" fill="#333"/>
  <circle cx="115" cy="70" r="3" fill="#333"/>
  
  <!-- Nose -->
  <polygon points="100,80 95,85 105,85" fill="#F281B9"/>
  
  <!-- Mouth -->
  <path d="M95 90 Q100 100 105 90" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Tail -->
  <path d="M160 130 Q180 100 170 70" stroke="#FFB6C1" stroke-width="10" fill="none" stroke-linecap="round"/>
  
  <!-- Legs -->
  <rect x="70" y="160" width="15" height="25" fill="#FFC0CB" rx="3"/>
  <rect x="115" y="160" width="15" height="25" fill="#FFC0CB" rx="3"/>
</svg>