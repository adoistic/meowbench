<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Body -->
  <polygon points="100,40 140,80 100,160 60,80" fill="#ffcc99" stroke="#333" stroke-width="2"/>
  
  <!-- Head -->
  <polygon points="100,20 80,50 100,70 120,50" fill="#ffcc99" stroke="#333" stroke-width="2"/>
  
  <!-- Ears -->
  <polygon points="75,35 80,20 85,35" fill="#ff9966" stroke="#333" stroke-width="2"/>
  <polygon points="115,35 120,20 125,35" fill="#ff9966" stroke="#333" stroke-width="2"/>
  
  <!-- Tail -->
  <polyline points="140,80 160,60 180,90 170,110" fill="none" stroke="#333" stroke-width="2"/>
  
  <!-- Legs -->
  <polygon points="80,120 70,160 85,160" fill="#ffcc99" stroke="#333" stroke-width="2"/>
  <polygon points="120,120 115,160 130,160" fill="#ffcc99" stroke="#333" stroke-width="2"/>
  
  <!-- Face details -->
  <polygon points="90,50 85,55 95,55" fill="#333" stroke="#333" stroke-width="1"/>
  <polygon points="110,50 105,55 115,55" fill="#333" stroke="#333" stroke-width="1"/>
  <polygon points="100,60 95,65 105,65" fill="#333" stroke="#333" stroke-width="1"/>
  
  <!-- Whiskers -->
  <line x1="105" y1="65" x2="130" y2="60" stroke="#333" stroke-width="1"/>
  <line x1="105" y1="68" x2="130" y2="70" stroke="#333" stroke-width="1"/>
  <line x1="95" y1="65" x2="70" y2="60" stroke="#333" stroke-width="1"/>
  <line x1="95" y1="68" x2="70" y2="70" stroke="#333" stroke-width="1"/>
  
  <!-- Fold lines -->
  <line x1="100" y1="40" x2="100" y2="160" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="60" y1="80" x2="140" y2="80" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
</svg>