<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Spoke Pattern for Rear Wheel -->
    <g id="spokes-rear">
      <line x1="200" y1="360" x2="200" y2="540" stroke="#BDC3C7" stroke-width="2" />
      <line x1="110" y1="450" x2="290" y2="450" stroke="#BDC3C7" stroke-width="2" />
      <line x1="136" y1="386" x2="264" y2="514" stroke="#BDC3C7" stroke-width="2" />
      <line x1="264" y1="386" x2="136" y2="514" stroke="#BDC3C7" stroke-width="2" />
      <line x1="160" y1="367" x2="240" y2="533" stroke="#BDC3C7" stroke-width="2" />
      <line x1="240" y1="367" x2="160" y2="533" stroke="#BDC3C7" stroke-width="2" />
      <line x1="117" y1="420" x2="283" y2="480" stroke="#BDC3C7" stroke-width="2" />
      <line x1="283" y1="420" x2="117" y2="480" stroke="#BDC3C7" stroke-width="2" />
    </g>

    <!-- Spoke Pattern for Front Wheel -->
    <g id="spokes-front">
      <line x1="550" y1="360" x2="550" y2="540" stroke="#BDC3C7" stroke-width="2" />
      <line x1="460" y1="450" x2="640" y2="450" stroke="#BDC3C7" stroke-width="2" />
      <line x1="486" y1="386" x2="614" y2="514" stroke="#BDC3C7" stroke-width="2" />
      <line x1="614" y1="386" x2="486" y2="514" stroke="#BDC3C7" stroke-width="2" />
      <line x1="510" y1="367" x2="590" y2="533" stroke="#BDC3C7" stroke-width="2" />
      <line x1="590" y1="367" x2="510" y2="533" stroke="#BDC3C7" stroke-width="2" />
      <line x1="467" y1="420" x2="633" y2="480" stroke="#BDC3C7" stroke-width="2" />
      <line x1="633" y1="420" x2="467" y2="480" stroke="#BDC3C7" stroke-width="2" />
    </g>
  </defs>

  <!-- Background -->
  <circle cx="400" cy="300" r="280" fill="#EBF5FB" />
  <ellipse cx="380" cy="535" rx="220" ry="12" fill="#D5DBDB" />
  
  <!-- Clouds -->
  <path d="M 120 180 Q 140 160 160 180 Q 180 150 210 170 Q 230 160 240 180 Z" fill="white" opacity="0.8" />
  <path d="M 550 120 Q 570 100 590 120 Q 610 90 640 110 Q 660 100 670 120 Z" fill="white" opacity="0.8" />

  <!-- Speed Lines -->
  <line x1="600" y1="200" x2="680" y2="200" stroke="#BDC3C7" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" />
  <line x1="620" y1="240" x2="690" y2="240" stroke="#BDC3C7" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" />
  <line x1="610" y1="280" x2="700" y2="280" stroke="#BDC3C7" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" />
  <line x1="600" y1="320" x2="670" y2="320" stroke="#BDC3C7" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10" />

  <!-- Pedal Motion Lines -->
  <path d="M 370 350 Q 380 340 390 350" stroke="#BDC3C7" stroke-width="3" fill="none" stroke-linecap="round" />
  <path d="M 380 440 Q 390 450 400 440" stroke="#BDC3C7" stroke-width="3" fill="none" stroke-linecap="round" />

  <!-- Tires -->
  <circle cx="200" cy="450" r="90" fill="none" stroke="#2C3E50" stroke-width="16" />
  <circle cx="550" cy="450" r="90" fill="none" stroke="#2C3E50" stroke-width="16" />
  
  <!-- Rims -->
  <circle cx="200" cy="450" r="82" fill="none" stroke="#BDC3C7" stroke-width="6" />
  <circle cx="550" cy="450" r="82" fill="none" stroke="#BDC3C7" stroke-width="6" />

  <!-- Spokes -->
  <use href="#spokes-rear" />
  <use href="#spokes-front" />

  <!-- Chainring & Sprocket -->
  <circle cx="370" cy="400" r="25" fill="none" stroke="#2C3E50" stroke-width="8" />
  <circle cx="200" cy="450" r="15" fill="none" stroke="#2C3E50" stroke-width="6" />
  
  <!-- Chain -->
  <line x1="195" y1="435" x2="365" y2="380" stroke="#7F8C8D" stroke-width="6" />
  <line x1="205" y1="465" x2="375" y2="420" stroke="#7F8C8D" stroke-width="6" />

  <!-- Bike Frame -->
  <g stroke="#E74C3C" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Chainstay -->
    <line x1="200" y1="450" x2="370" y2="400" />
    <!-- Seatstay -->
    <line x1="200" y1="450" x2="310" y2="240" />
    <!-- Seat tube -->
    <line x1="370" y1="400" x2="310" y2="240" />
    <!-- Down tube -->
    <line x1="370" y1="400" x2="570" y2="300" />
    <!-- Top tube -->
    <line x1="310" y1="240" x2="510" y2="230" />
    <!-- Fork -->
    <line x1="550" y1="450" x2="570" y2="300" />
    <!-- Head tube -->
    <line x1="510" y1="230" x2="570" y2="300" stroke-width="16" />
  </g>

  <!-- Seatpost & Saddle -->
  <line x1="310" y1="240" x2="290" y2="200" stroke="#2C3E50" stroke-width="8" stroke-linecap="round" />
  <rect x="260" y="190" width="60" height="15" rx="7" fill="#2C3E50" />

  <!-- Handlebars -->
  <line x1="510" y1="230" x2="520" y2="200" stroke="#2C3E50" stroke-width="8" stroke-linecap="round" />
  <path d="M 520 200 C 540 170, 570 180, 550 195" stroke="#2C3E50" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Cranks & Pedals -->
  <!-- Background Crank -->
  <line x1="370" y1="400" x2="350" y2="370" stroke="#1A1A25" stroke-width="10" stroke-linecap="round" />
  <line x1="330" y1="370" x2="370" y2="370" stroke="#2C3E50" stroke-width="10" stroke-linecap="round" />
  <!-- Foreground Crank -->
  <line x1="370" y1="400" x2="390" y2="430" stroke="#2C3E50" stroke-width="10" stroke-linecap="round" />
  <line x1="370" y1="430" x2="410" y2="430" stroke="#2C3E50" stroke-width="10" stroke-linecap="round" />

  <!-- Cat Tail -->
  <path d="M 300 200 C 220 230, 180 120, 210 80 C 230 50, 260 60, 240 90" stroke="#2C3E50" stroke-width="18" fill="none" stroke-linecap="round" />

  <!-- Cat Background Leg & Arm -->
  <path d="M 320 180 Q 340 280 350 370" stroke="#1A1A25" stroke-width="20" fill="none" stroke-linecap="round" />
  <circle cx="350" cy="370" r="11" fill="#1A1A25" />
  <path d="M 380 140 Q 440 180 520 190" stroke="#1A1A25" stroke-width="16" fill="none" stroke-linecap="round" />
  <circle cx="520" cy="190" r="9" fill="#1A1A25" />

  <!-- Cat Body -->
  <ellipse cx="350" cy="150" rx="60" ry="80" transform="rotate(20, 350, 150)" fill="#2C3E50" />
  <!-- Cat Belly Highlight -->
  <ellipse cx="345" cy="160" rx="40" ry="65" transform="rotate(20, 345, 160)" fill="#34495E" />

  <!-- Cat Foreground Leg & Arm -->
  <path d="M 360 180 Q 380 300 390 430" stroke="#2C3E50" stroke-width="22" fill="none" stroke-linecap="round" />
  <circle cx="390" cy="430" r="12" fill="#2C3E50" />
  <path d="M 390 130 Q 450 160 530 200" stroke="#2C3E50" stroke-width="18" fill="none" stroke-linecap="round" />
  <circle cx="530" cy="200" r="10" fill="#2C3E50" />

  <!-- Cat Head -->
  <circle cx="470" cy="100" r="50" fill="#2C3E50" />
  
  <!-- Cat Ears -->
  <polygon points="435,60 410,15 465,50" fill="#2C3E50" />
  <polygon points="505,50 530,15 515,60" fill="#2C3E50" />
  <!-- Inner Ears -->
  <polygon points="435,55 420,25 460,48" fill="#FF9F43" />
  <polygon points="505,48 525,25 515,55" fill="#FF9F43" />

  <!-- Cat Face -->
  <!-- Eyes -->
  <circle cx="445" cy="95" r="8" fill="#2ECC71" />
  <circle cx="485" cy="95" r="8" fill="#2ECC71" />
  <!-- Pupils -->
  <circle cx="445" cy="95" r="4" fill="#1A1A25" />
  <circle cx="485" cy="95" r="4" fill="#1A1A25" />
  <!-- Eye Highlights -->
  <circle cx="443" cy="93" r="1.5" fill="white" />
  <circle cx="483" cy="93" r="1.5" fill="white" />
  
  <!-- Nose -->
  <polygon points="467,110 473,110 470,113" fill="#E74C3C" />
  <line x1="468" y1="111" x2="471" y2="111" stroke="white" stroke-width="1.5" stroke-linecap="round" />

  <!-- Mouth -->
  <path d="M 462 118 Q 466 122 470 118 Q 474 122 478 118" stroke="#1A1A25" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Whiskers -->
  <line x1="455" y1="105" x2="415" y2="100" stroke="white" stroke-width="2.5" stroke-linecap="round" />
  <line x1="455" y1="112" x2="415" y2="115" stroke="white" stroke-width="2.5" stroke-linecap="round" />
  <line x1="485" y1="105" x2="525" y2="100" stroke="white" stroke-width="2.5" stroke-linecap="round" />
  <line x1="485" y1="112" x2="525" y2="115" stroke="white" stroke-width="2.5" stroke-linecap="round" />

  <!-- Scarf -->
  <path d="M 400 130 Q 430 140 460 115" stroke="#E74C3C" stroke-width="14" fill="none" stroke-linecap="round" />
  <!-- Scarf Tail -->
  <path d="M 420 135 Q 360 150 320 110 Q 280 70 250 90" stroke="#E74C3C" stroke-width="14" fill="none" stroke-linecap="round" />

  <!-- Front Basket -->
  <rect x="500" y="220" width="45" height="35" rx="5" fill="#F1C40F" stroke="#D4AC0D" stroke-width="3" />
  <line x1="500" y1="230" x2="545" y2="230" stroke="#D4AC0D" stroke-width="2" />
  <line x1="500" y1="240" x2="545" y2="240" stroke="#D4AC0D" stroke-width="2" />

  <!-- Flower in Basket -->
  <line x1="522" y1="220" x2="522" y2="225" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="522" cy="210" r="8" fill="#E74C3C" />
  <circle cx="522" cy="210" r="3" fill="#F1C40F" />
  <path d="M 522 218 Q 518 222 520 225" stroke="#27AE60" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Handlebar Bell -->
  <circle cx="555" cy="185" r="9" fill="#F1C40F" />
  <line x1="555" y1="185" x2="555" y2="192" stroke="#D4AC0D" stroke-width="2.5" stroke-linecap="round" />
  <circle cx="552" cy="182" r="2.5" fill="white" />
</svg>