<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gradient for the ground -->
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="100%" stop-color="#fdf6e3" />
    </linearGradient>
    <!-- Gradient for the bike frame -->
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a9d8f" />
      <stop offset="100%" stop-color="#264653" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#fdf6e3" />

  <!-- Ground -->
  <rect x="0" y="520" width="800" height="80" fill="url(#groundGradient)" />
  <line x1="0" y1="520" x2="800" y2="520" stroke="#d4a373" stroke-width="4" opacity="0.5" />

  <!-- Shadows under wheels -->
  <ellipse cx="200" cy="530" rx="90" ry="15" fill="#d3d3d3" />
  <ellipse cx="600" cy="530" rx="90" ry="15" fill="#d3d3d3" />

  <!-- Motion Lines -->
  <g stroke="#ccc" stroke-width="4" stroke-linecap="round">
    <line x1="80" y1="400" x2="130" y2="400" />
    <line x1="40" y1="450" x2="120" y2="450" />
    <line x1="100" y1="500" x2="140" y2="500" />
    <line x1="60" y1="350" x2="90" y2="350" />
  </g>

  <!-- ================= BICYCLE (BACKGROUND LAYERS) ================= -->
  
  <!-- Back Wheel -->
  <g id="rear-wheel">
    <circle cx="200" cy="450" r="80" fill="none" stroke="#333" stroke-width="14" />
    <circle cx="200" cy="450" r="73" fill="none" stroke="#888" stroke-width="2" />
    <!-- Spokes -->
    <g stroke="#aaa" stroke-width="2">
      <line x1="200" y1="370" x2="200" y2="530" />
      <line x1="120" y1="450" x2="280" y2="450" />
      <line x1="143" y1="393" x2="257" y2="507" />
      <line x1="143" y1="507" x2="257" y2="393" />
      <line x1="170" y1="375" x2="230" y2="525" />
      <line x1="230" y1="375" x2="170" y2="525" />
      <line x1="125" y1="420" x2="275" y2="480" />
      <line x1="275" y1="420" x2="125" y2="480" />
    </g>
    <circle cx="200" cy="450" r="15" fill="#666" />
    <!-- Rear Cog -->
    <circle cx="200" cy="450" r="22" fill="none" stroke="#444" stroke-width="4" />
  </g>

  <!-- Front Wheel -->
  <g id="front-wheel">
    <circle cx="600" cy="450" r="80" fill="none" stroke="#333" stroke-width="14" />
    <circle cx="600" cy="450" r="73" fill="none" stroke="#888" stroke-width="2" />
    <!-- Spokes -->
    <g stroke="#aaa" stroke-width="2">
      <line x1="600" y1="370" x2="600" y2="530" />
      <line x1="520" y1="450" x2="680" y2="450" />
      <line x1="543" y1="393" x2="657" y2="507" />
      <line x1="543" y1="507" x2="657" y2="393" />
      <line x1="570" y1="375" x2="630" y2="525" />
      <line x1="630" y1="375" x2="570" y2="525" />
      <line x1="525" y1="420" x2="675" y2="480" />
      <line x1="675" y1="420" x2="525" y2="480" />
    </g>
    <circle cx="600" cy="450" r="15" fill="#666" />
  </g>

  <!-- Bike Frame -->
  <g id="bike-frame" fill="none" stroke="url(#frameGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top tube -->
    <line x1="320" y1="300" x2="580" y2="280" />
    <!-- Down tube -->
    <line x1="400" y1="450" x2="580" y2="280" />
    <!-- Seat tube -->
    <line x1="320" y1="300" x2="400" y2="450" />
    <!-- Chainstay -->
    <line x1="400" y1="450" x2="200" y2="450" />
    <!-- Seatstay -->
    <line x1="320" y1="300" x2="200" y2="450" />
  </g>

  <!-- Fork -->
  <path d="M 600 340 Q 590 390 600 450" fill="none" stroke="url(#frameGradient)" stroke-width="10" stroke-linecap="round" />

  <!-- Seat & Seatpost -->
  <line x1="320" y1="300" x2="320" y2="315" stroke="#aaa" stroke-width="8" />
  <ellipse cx="320" cy="300" rx="55" ry="15" fill="#222" />

  <!-- Left Arm (Back) -->
  <g id="left-arm-cat">
    <ellipse cx="380" cy="240" rx="25" ry="18" fill="#d96d00" transform="rotate(-10 380 240)" />
    <path d="M 360 220 Q 500 240 620 225" fill="none" stroke="#d96d00" stroke-width="22" stroke-linecap="round" />
    <!-- Left Paw -->
    <ellipse cx="630" cy="225" rx="15" ry="12" fill="#d96d00" transform="rotate(30 630 225)" />
  </g>

  <!-- Handlebar & Stem -->
  <g id="handlebar-stem">
    <!-- Stem -->
    <line x1="580" y1="280" x2="630" y2="240" stroke="#aaa" stroke-width="10" stroke-linecap="round" />
    <!-- Handlebar Bar -->
    <path d="M 610 230 Q 630 220 650 240 Q 660 270 640 290" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" />
  </g>

  <!-- Left Leg (Back) -->
  <g id="left-leg-cat">
    <ellipse cx="320" cy="380" rx="35" ry="45" fill="#d96d00" transform="rotate(-30 320 380)" />
    <path d="M 310 340 Q 300 430 370 510" fill="none" stroke="#d96d00" stroke-width="25" stroke-linecap="round" />
    <!-- Left Paw -->
    <circle cx="370" cy="510" r="15" fill="#d96d00" />
    <circle cx="360" cy="515" r="8" fill="#333" />
  </g>

  <!-- Left Pedal (Back) -->
  <line x1="400" y1="450" x2="370" y2="510" stroke="#555" stroke-width="10" stroke-linecap="round" />
  <rect x="355" y="505" width="30" height="12" fill="#333" rx="5" />

  <!-- Chainring, Chain, Rear Cog -->
  <g id="drivetrain">
    <circle cx="400" cy="450" r="35" fill="none" stroke="#666" stroke-width="6" />
    <circle cx="400" cy="450" r="15" fill="#888" />
    <!-- Chain -->
    <path d="M 400 415 L 200 428" fill="none" stroke="#666" stroke-width="4" stroke-dasharray="4 2" />
    <path d="M 400 485 L 200 472" fill="none" stroke="#666" stroke-width="4" stroke-dasharray="4 2" />
  </g>

  <!-- Right Pedal (Front) -->
  <line x1="400" y1="450" x2="430" y2="500" stroke="#333" stroke-width="12" stroke-linecap="round" />
  <rect x="415" y="490" width="30" height="14" fill="#111" rx="5" />

  <!-- ================= CAT (FOREGROUND LAYERS) ================= -->

  <!-- Cat Body -->
  <g id="cat-body">
    <ellipse cx="340" cy="270" rx="75" ry="95" fill="#ff8c00" />
    <!-- Belly Patch -->
    <ellipse cx="340" cy="260" rx="50" ry="70" fill="#fff" />
  </g>

  <!-- Cat Tail -->
  <g id="cat-tail">
    <path d="M 270 320 Q 150 400 120 250 Q 90 100 180 80" fill="none" stroke="#ff8c00" stroke-width="28" stroke-linecap="round" />
    <!-- Tail Stripes -->
    <path d="M 270 320 Q 150 400 120 250 Q 90 100 180 80" fill="none" stroke="#cc7000" stroke-width="28" stroke-linecap="round" stroke-dasharray="10 18" />
  </g>

  <!-- Cat Head -->
  <g id="cat-head">
    <circle cx="360" cy="140" r="65" fill="#ff8c00" />
    
    <!-- Ears -->
    <!-- Left Ear -->
    <polygon points="310,85 280,10 350,65" fill="#ff8c00" stroke="#ff8c00" stroke-width="4" stroke-linejoin="round" />
    <polygon points="315,78 295,40 340,65" fill="#ffb6c1" />
    <!-- Right Ear -->
    <polygon points="410,85 440,10 370,65" fill="#ff8c00" stroke="#ff8c00" stroke-width="4" stroke-linejoin="round" />
    <polygon points="405,78 425,40 380,65" fill="#ffb6c1" />

    <!-- Forehead Stripes (M shape) -->
    <path d="M 340 100 L 350 115 L 360 100 L 370 115 L 380 100" fill="none" stroke="#d96d00" stroke-width="4" stroke-linejoin="round" />

    <!-- Eyes -->
    <ellipse cx="330" cy="130" rx="12" ry="18" fill="#333" />
    <circle cx="326" cy="124" r="5" fill="#fff" />
    <circle cx="333" cy="133" r="2" fill="#fff" />

    <ellipse cx="390" cy="130" rx="12" ry="18" fill="#333" />
    <circle cx="386" cy="124" r="5" fill="#fff" />
    <circle cx="393" cy="133" r="2" fill="#fff" />

    <!-- Blush -->
    <ellipse cx="315" cy="150" rx="15" ry="8" fill="#ffb6c1" opacity="0.6" />
    <ellipse cx="405" cy="150" rx="15" ry="8" fill="#ffb6c1" opacity="0.6" />

    <!-- Nose -->
    <polygon points="360,155 355,165 365,165" fill="#ff69b4" />

    <!-- Mouth -->
    <path d="M 355 165 Q 345 175 335 170 M 355 165 Q 365 175 375 170" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round" />

    <!-- Whiskers -->
    <!-- Left Whiskers -->
    <g stroke="#333" stroke-width="3" stroke-linecap="round">
      <line x1="290" y1="155" x2="240" y2="145" />
      <line x1="290" y1="160" x2="235" y2="160" />
      <line x1="290" y1="165" x2="240" y2="175" />
    </g>
    <!-- Right Whiskers -->
    <g stroke="#333" stroke-width="3" stroke-linecap="round">
      <line x1="430" y1="155" x2="480" y2="145" />
      <line x1="430" y1="160" x2="485" y2="160" />
      <line x1="430" y1="165" x2="480" y2="175" />
    </g>

    <!-- Collar & Bell -->
    <path d="M 300 195 Q 360 215 420 195" fill="none" stroke="#e63946" stroke-width="10" stroke-linecap="round" />
    <circle cx="420" cy="200" r="12" fill="#ffd700" />
    <circle cx="420" cy="210" r="4" fill="#b8860b" />
    <circle cx="418" cy="196" r="2" fill="#fff" />
  </g>

  <!-- Helmet -->
  <g id="helmet">
    <path d="M 300 90 Q 360 50 420 90 Z" fill="#e63946" />
    <circle cx="360" cy="50" r="8" fill="#e63946" />
    <!-- Helmet Straps -->
    <line x1="300" y1="90" x2="330" y2="130" stroke="#333" stroke-width="3" />
    <line x1="420" y1="90" x2="390" y2="130" stroke="#333" stroke-width="3" />
  </g>

  <!-- Right Leg (Front) -->
  <g id="right-leg-cat">
    <ellipse cx="350" cy="370" rx="40" ry="50" fill="#ff8c00" transform="rotate(-30 350 370)" />
    <path d="M 340 330 Q 350 420 430 490" fill="none" stroke="#ff8c00" stroke-width="30" stroke-linecap="round" />
    <!-- Right Paw -->
    <circle cx="430" cy="490" r="18" fill="#ff8c00" />
    <circle cx="420" cy="495" r="10" fill="#333" />
  </g>

  <!-- Right Arm (Front) -->
  <g id="right-arm-cat">
    <ellipse cx="420" cy="230" rx="30" ry="20" fill="#ff8c00" transform="rotate(-15 420 230)" />
    <path d="M 390 210 Q 530 250 650 280" fill="none" stroke="#ff8c00" stroke-width="28" stroke-linecap="round" />
    <!-- Right Paw overlapping handlebar -->
    <ellipse cx="660" cy="280" rx="18" ry="14" fill="#ff8c00" transform="rotate(45 660 280)" />
    <!-- Paw pads -->
    <circle cx="665" cy="285" r="6" fill="#333" />
    <circle cx="654" cy="278" r="4" fill="#333" />
    <circle cx="654" cy="288" r="4" fill="#333" />
  </g>

  <!-- Handlebar Grips (drawn last to overlap the hand) -->
  <path d="M 610 230 L 620 225" fill="none" stroke="#222" stroke-width="14" stroke-linecap="round" />
  <path d="M 640 290 L 655 285" fill="none" stroke="#222" stroke-width="14" stroke-linecap="round" />

</svg>