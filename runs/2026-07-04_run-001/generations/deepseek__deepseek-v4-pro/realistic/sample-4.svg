<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3a3a4a" />
      <stop offset="60%" stop-color="#1a1a24" />
      <stop offset="100%" stop-color="#0a0a14" />
    </radialGradient>

    <!-- Blur Filter for Shadows -->
    <filter id="shadowBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" />
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" />
    </filter>

    <!-- Body Fur Gradients -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a5e" />
      <stop offset="30%" stop-color="#2c2c3e" />
      <stop offset="70%" stop-color="#1a1a28" />
      <stop offset="100%" stop-color="#0a0a14" />
    </linearGradient>

    <linearGradient id="bodyHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.4" />
    </linearGradient>

    <!-- Tail Gradient -->
    <linearGradient id="tailGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a28" />
      <stop offset="60%" stop-color="#2c2c3e" />
      <stop offset="100%" stop-color="#4a4a5e" />
    </linearGradient>

    <!-- Chest Fur Gradient -->
    <linearGradient id="chestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#e8e8ec" />
      <stop offset="100%" stop-color="#a0a0b0" />
    </linearGradient>

    <!-- Eye Setup -->
    <radialGradient id="eyeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f4d03f" />
      <stop offset="40%" stop-color="#d4ac0d" />
      <stop offset="100%" stop-color="#7d6608" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Ground Shadow -->
  <ellipse cx="400" cy="730" rx="220" ry="35" fill="#000000" opacity="0.6" filter="url(#shadowBlur)" />
  <ellipse cx="400" cy="730" rx="150" ry="20" fill="#000000" opacity="0.8" filter="url(#softBlur)" />

  <!-- TAIL (Behind Body) -->
  <g id="tail">
    <!-- Main Tail Curve -->
    <path d="M 520 680 C 650 760, 820 700, 780 580 C 750 480, 700 440, 660 480 C 620 520, 660 560, 720 600 C 770 640, 700 690, 520 680 Z" fill="url(#tailGrad)" />
    <!-- White Tail Tip -->
    <path d="M 720 460 C 760 480, 790 520, 780 560 C 770 580, 740 580, 720 570 C 740 550, 750 520, 720 480 Z" fill="#e8e8ec" />
    <path d="M 690 440 C 720 450, 750 480, 760 530 C 770 570, 800 600, 780 620 C 770 630, 750 620, 730 600 C 740 580, 730 550, 700 520 C 680 500, 670 470, 690 440 Z" fill="#e8e8ec" opacity="0.8" />
    <!-- Tail Fur Strokes -->
    <path d="M 700 680 L 740 700 M 750 660 L 780 680 M 780 620 L 810 630 M 780 580 L 810 570 M 760 540 L 790 520 M 740 500 L 770 480" fill="none" stroke="#6a6a7e" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <path d="M 680 700 L 700 720 M 650 680 L 670 700 M 630 640 L 650 650 M 640 580 L 660 590 M 660 520 L 680 520" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.2" />
  </g>

  <!-- BODY -->
  <g id="body">
    <!-- Main Body (Pear/Loaf Shape) -->
    <path d="M 340 380 C 240 450, 220 620, 280 700 C 300 730, 340 750, 400 750 C 460 750, 500 730, 520 700 C 580 620, 560 450, 460 380 C 420 420, 380 420, 340 380 Z" fill="url(#bodyGrad)" />
    <!-- Body Volume (Highlights and Shadows overlay) -->
    <path d="M 340 380 C 240 450, 220 620, 280 700 C 300 730, 340 750, 400 750 C 460 750, 500 730, 520 700 C 580 620, 560 450, 460 380 C 420 420, 380 420, 340 380 Z" fill="url(#bodyHighlight)" />
    
    <!-- Body Fur Tufts (Left Side) -->
    <path d="M 260 480 L 230 490 L 255 500 Z M 245 520 L 210 530 L 240 540 Z M 235 560 L 200 570 L 230 580 Z M 230 600 L 195 610 L 225 620 Z M 240 640 L 210 650 L 235 660 Z M 260 680 L 230 690 L 255 700 Z" fill="#2c2c3e" />
    <!-- Body Fur Tufts (Right Side) -->
    <path d="M 540 480 L 570 490 L 545 500 Z M 555 520 L 590 530 L 560 540 Z M 565 560 L 600 570 L 570 580 Z M 570 600 L 605 610 L 575 620 Z M 560 640 L 590 650 L 565 660 Z M 540 680 L 570 690 L 545 700 Z" fill="#2c2c3e" />
  </g>

  <!-- CHEST (White Bib) -->
  <g id="chest">
    <path d="M 360 380 C 310 430, 280 500, 290 560 C 300 620, 330 670, 400 680 C 470 670, 500 620, 510 560 C 520 500, 490 430, 440 380 C 410 410, 390 410, 360 380 Z" fill="url(#chestGrad)" />
    <!-- Chest Shading (Right side shadow) -->
    <path d="M 440 380 C 490 430, 520 500, 510 560 C 500 620, 470 670, 400 680 C 460 660, 480 600, 480 550 C 480 480, 450 420, 440 380 Z" fill="#000000" opacity="0.15" />
    <!-- Chest Fur Tufts -->
    <path d="M 300 520 L 270 540 L 295 550 Z M 310 560 L 280 580 L 305 590 Z M 340 620 L 310 650 L 345 650 Z M 380 680 L 370 710 L 400 710 L 430 680 Z M 460 620 L 490 650 L 455 650 Z M 490 560 L 520 580 L 495 590 Z" fill="#ffffff" opacity="0.8" />
    <path d="M 500 520 L 530 540 L 510 550 Z M 290 520 Z" fill="#ffffff" opacity="0.8" />
  </g>

  <!-- HIND LEGS / PAWS -->
  <g id="paws">
    <!-- Left Hind Leg -->
    <ellipse cx="300" cy="720" rx="55" ry="35" fill="#1a1a28" />
    <ellipse cx="300" cy="720" rx="55" ry="35" fill="url(#bodyHighlight)" />
    <!-- Right Hind Leg -->
    <ellipse cx="500" cy="720" rx="55" ry="35" fill="#1a1a28" />
    <ellipse cx="500" cy="720" rx="55" ry="35" fill="url(#bodyHighlight)" />
    
    <!-- Front Paws (Tucked) -->
    <!-- Left Paw -->
    <path d="M 320 650 C 300 680, 300 720, 320 740 C 340 750, 370 750, 380 720 C 390 690, 380 660, 370 640 Z" fill="#e8e8ec" />
    <!-- Left Paw Shading -->
    <path d="M 370 640 C 380 660, 390 690, 380 720 C 370 750, 340 750, 320 740 C 340 720, 350 680, 360 650 Z" fill="#c0c0c8" />
    <!-- Left Paw Toes -->
    <path d="M 330 730 L 340 745 M 350 735 L 355 748 M 365 730 L 368 743" fill="none" stroke="#a0a0a8" stroke-width="3" stroke-linecap="round" />
    
    <!-- Right Paw -->
    <path d="M 430 650 C 410 680, 410 720, 430 740 C 450 750, 480 750, 490 720 C 500 690, 490 660, 480 640 Z" fill="#e8e8ec" />
    <!-- Right Paw Shading -->
    <path d="M 480 640 C 490 660, 500 690, 490 720 C 480 750, 450 750, 430 740 C 450 720, 460 680, 470 650 Z" fill="#d0d0d8" />
    <!-- Right Paw Toes -->
    <path d="M 440 730 L 450 745 M 460 735 L 465 748 M 475 730 L 478 743" fill="none" stroke="#a0a0a8" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- HEAD -->
  <g id="head">
    <!-- Head Base -->
    <path d="M 300 280 C 280 180, 520 180, 500 280 C 480 380, 450 390, 400 390 C 350 390, 320 380, 300 280 Z" fill="url(#bodyGrad)" />
    <path d="M 300 280 C 280 180, 520 180, 500 280 C 480 380, 450 390, 400 390 C 350 390, 320 380, 300 280 Z" fill="url(#bodyHighlight)" />

    <!-- Head Fur Tufts (Cheeks and Top) -->
    <!-- Left Cheek -->
    <path d="M 300 300 L 260 310 L 290 320 L 250 340 L 285 350 Z" fill="#2c2c3e" />
    <path d="M 290 360 L 260 380 L 285 370 Z" fill="#2c2c3e" />
    <!-- Right Cheek -->
    <path d="M 500 300 L 540 310 L 510 320 L 550 340 L 515 350 Z" fill="#2c2c3e" />
    <path d="M 510 360 L 540 380 L 515 370 Z" fill="#2c2c3e" />
    <!-- Head Top Tufts -->
    <path d="M 340 200 L 330 170 L 360 190 Z" fill="#2c2c3e" />
    <path d="M 460 200 L 470 170 L 440 190 Z" fill="#2c2c3e" />

    <!-- EARS -->
    <!-- Left Ear -->
    <path d="M 290 240 L 230 90 L 330 200 Z" fill="#2c2c3e" />
    <path d="M 290 240 L 230 90 L 330 200 Z" fill="url(#bodyHighlight)" />
    <!-- Left Ear Inner -->
    <path d="M 285 230 L 242 110 L 318 200 Z" fill="#d9a7a7" />
    <path d="M 285 230 L 242 110 L 318 200 Z" fill="#000000" opacity="0.3" />
    <!-- Left Ear Fluff -->
    <path d="M 230 90 L 210 70 L 240 100 Z" fill="#2c2c3e" />
    <path d="M 330 200 L 340 180 L 325 190 Z" fill="#2c2c3e" />

    <!-- Right Ear -->
    <path d="M 510 240 L 570 90 L 470 200 Z" fill="#2c2c3e" />
    <path d="M 510 240 L 570 90 L 470 200 Z" fill="url(#bodyHighlight)" />
    <!-- Right Ear Inner -->
    <path d="M 515 230 L 558 110 L 482 200 Z" fill="#d9a7a7" />
    <path d="M 515 230 L 558 110 L 482 200 Z" fill="#000000" opacity="0.3" />
    <!-- Right Ear Fluff -->
    <path d="M 570 90 L 590 70 L 560 100 Z" fill="#2c2c3e" />
    <path d="M 470 200 L 460 180 L 475 190 Z" fill="#2c2c3e" />

    <!-- Forehead White Patch (Tuxedo Marking) -->
    <path d="M 360 210 Q 400 180 440 210 Q 420 280 400 320 Q 380 280 360 210 Z" fill="#e8e8ec" />
    <!-- Forehead Shading -->
    <path d="M 400 320 Q 380 280 360 210 Q 370 260 380 290 Z" fill="#c0c0c8" opacity="0.5" />

    <!-- Muzzle -->
    <path d="M 340 330 Q 400 390 460 330 Q 420 370 400 360 Q 380 370 340 330 Z" fill="#e8e8ec" />
    <path d="M 460 330 Q 420 370 400 360 Q 450 355 460 330 Z" fill="#c0c0c8" />

    <!-- NOSE -->
    <path d="M 390 315 L 410 315 L 400 330 Z" fill="#e87b7b" />
    <path d="M 395 315 L 400 330 L 400 315 Z" fill="#f7a2a2" />
    <path d="M 400 315 L 405 315 L 400 320 Z" fill="#ffffff" />

    <!-- MOUTH -->
    <path d="M 400 330 L 400 340" fill="none" stroke="#4a4a5e" stroke-width="2" />
    <path d="M 380 345 Q 400 355 400 345" fill="none" stroke="#4a4a5e" stroke-width="2" />
    <path d="M 420 345 Q 400 355 400 345" fill="none" stroke="#4a4a5e" stroke-width="2" />
    <!-- Chin Fluff -->
    <path d="M 380 360 L 370 380 Z M 420 360 L 430 380 Z" fill="#e8e8ec" />

    <!-- EYES -->
    <!-- Left Eye -->
    <g id="left-eye">
      <!-- Outer/Eyelids -->
      <path d="M 320 260 Q 350 230 380 260 Q 350 290 320 260" fill="#1a1a24" />
      <path d="M 320 260 Q 350 240 380 260 Q 350 295 320 260" fill="#0a0a14" />
      <!-- Iris -->
      <path d="M 325 260 Q 350 235 375 260 Q 350 285 325 260" fill="url(#eyeGrad)" />
      <!-- Pupil -->
      <ellipse cx="350" cy="260" rx="4" ry="12" fill="#050505" />
      <!-- Eyelid Overlay (Top shadow) -->
      <path d="M 320 260 Q 350 240 380 260 Q 350 285 320 260 Z" fill="#000000" opacity="0.4" />
      <!-- Catchlights -->
      <circle cx="345" cy="252" r="4" fill="#ffffff" />
      <circle cx="357" cy="265" r="1.5" fill="#ffffff" />
    </g>

    <!-- Right Eye -->
    <g id="right-eye">
      <!-- Outer/Eyelids -->
      <path d="M 480 260 Q 450 230 420 260 Q 450 290 480 260" fill="#1a1a24" />
      <path d="M 480 260 Q 450 240 420 260 Q 450 295 480 260" fill="#0a0a14" />
      <!-- Iris -->
      <path d="M 475 260 Q 450 235 425 260 Q 450 285 475 260" fill="url(#eyeGrad)" />
      <!-- Pupil -->
      <ellipse cx="450" cy="260" rx="4" ry="12" fill="#050505" />
      <!-- Eyelid Overlay (Top shadow) -->
      <path d="M 480 260 Q 450 240 420 260 Q 450 285 480 260 Z" fill="#000000" opacity="0.4" />
      <!-- Catchlights -->
      <circle cx="455" cy="252" r="4" fill="#ffffff" />
      <circle cx="443" cy="265" r="1.5" fill="#ffffff" />
    </g>
  </g>

  <!-- FUR TEXTURE & SHADING OVERLAYS (The "Visible Fur Shading" layer) -->
  <g id="fur-texture" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body Fur (Dark Grey layer) -->
    <path d="M 270 480 L 260 500 M 260 510 L 250 530 M 255 540 L 245 560 M 255 570 L 245 590 M 260 600 L 250 620 M 265 630 L 255 650 M 270 660 L 260 680 M 280 690 L 270 710" stroke="#4a4a5e" stroke-width="6" opacity="0.6" />
    <path d="M 530 480 L 540 500 M 540 510 L 550 530 M 545 540 L 555 560 M 545 570 L 555 590 M 540 600 L 550 620 M 535 630 L 545 650 M 530 660 L 540 680 M 520 690 L 530 710" stroke="#4a4a5e" stroke-width="6" opacity="0.6" />

    <!-- Highlight Fur Strokes (Left side emphasis) -->
    <path d="M 280 490 L 270 510 M 270 550 L 260 570 M 280 630 L 270 650" stroke="#ffffff" stroke-width="3" opacity="0.3" />
    <path d="M 320 400 L 310 420 M 300 450 L 290 470 M 290 520 L 280 540 M 300 580 L 290 600" stroke="#ffffff" stroke-width="3" opacity="0.2" />

    <!-- Center Body Fur Direction -->
    <path d="M 360 420 L 350 450 M 380 420 L 370 450 M 420 420 L 430 450 M 440 420 L 450 450" stroke="#2c2c3e" stroke-width="4" opacity="0.7" />
    <path d="M 400 480 L 390 510 M 420 480 L 410 510 M 380 480 L 370 510 M 440 480 L 450 510" stroke="#2c2c3e" stroke-width="4" opacity="0.5" />
    <path d="M 350 550 L 340 580 M 380 560 L 370 590 M 420 560 L 430 590 M 450 550 L 460 580" stroke="#1a1a28" stroke-width="4" opacity="0.8" />
    
    <!-- Chest Fur Strokes (Over white bib) -->
    <path d="M 340 400 L 330 420 M 360 390 L 350 410 M 460 400 L 470 420 M 440 390 L 450 410" stroke="#ffffff" stroke-width="4" opacity="0.8" />
    <path d="M 320 480 L 310 500 M 310 520 L 300 540 M 480 480 L 490 500 M 490 520 L 500 540" stroke="#d0d0d8" stroke-width="4" opacity="0.8" />
    <path d="M 330 580 L 320 600 M 360 620 L 350 640 M 470 580 L 480 600 M 440 620 L 450 640" stroke="#a0a0b0" stroke-width="4" opacity="0.8" />

    <!-- Head Fur Strokes -->
    <!-- Forehead -->
    <path d="M 380 200 L 375 180 M 390 195 L 385 170 M 400 190 L 400 165 M 410 195 L 415 170 M 420 200 L 425 180" stroke="#4a4a5e" stroke-width="3" opacity="0.8" />
    <!-- Cheeks Left -->
    <path d="M 320 300 L 300 310 M 310 320 L 290 330 M 305 340 L 285 350 M 300 360 L 280 370" stroke="#4a4a5e" stroke-width="4" opacity="0.7" />
    <!-- Cheeks Right -->
    <path d="M 480 300 L 500 310 M 490 320 L 510 330 M 495 340 L 515 350 M 500 360 L 520 370" stroke="#4a4a5e" stroke-width="4" opacity="0.7" />
    
    <!-- Ear Fur Strokes -->
    <path d="M 240 120 L 230 100 M 260 150 L 250 130" stroke="#ffffff" stroke-width="2" opacity="0.4" />
    <path d="M 560 120 L 570 100 M 540 150 L 550 130" stroke="#ffffff" stroke-width="2" opacity="0.4" />
  </g>

  <!-- WHISKERS -->
  <g id="whiskers" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7">
    <!-- Left Whiskers -->
    <path d="M 330 330 Q 240 320 160 340" />
    <path d="M 330 340 Q 230 335 150 360" />
    <path d="M 340 350 Q 250 350 180 380" />
    <path d="M 350 360 Q 270 370 210 400" />
    <!-- Right Whiskers -->
    <path d="M 470 330 Q 560 320 640 340" />
    <path d="M 470 340 Q 570 335 650 360" />
    <path d="M 460 350 Q 550 350 620 380" />
    <path d="M 450 360 Q 530 370 590 400" />
  </g>

  <!-- FINAL ATMOSPHERIC LIGHTING (Rim Light & Glow) -->
  <g id="lighting">
    <!-- Left Rim Light -->
    <path d="M 300 280 C 280 180, 520 180, 500 280" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.2" filter="url(#softBlur)" />
    <path d="M 340 380 C 240 450, 220 620, 280 700" fill="none" stroke="#7a7a8e" stroke-width="6" opacity="0.4" filter="url(#softBlur)" />
    <path d="M 290 240 L 230 90" fill="none" stroke="#7a7a8e" stroke-width="4" opacity="0.5" />
    <path d="M 510 240 L 570 90" fill="none" stroke="#7a7a8e" stroke-width="4" opacity="0.5" />
  </g>
</svg>