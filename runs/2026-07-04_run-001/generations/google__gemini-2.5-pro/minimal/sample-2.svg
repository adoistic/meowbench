<svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- A group for the cat's main body, to apply a single fill color -->
  <g fill="#2c3e50">
    <!-- The tail, created with a thick, round-capped stroke -->
    <path d="M 82,75 C 95,75 100,55 90,40" stroke="#2c3e50" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- The main body, a large circle -->
    <circle cx="50" cy="68" r="32"/>
    <!-- The ears, drawn as simple triangles -->
    <polygon points="28,38 18,12 42,30"/>
    <polygon points="72,38 82,12 58,30"/>
    <!-- The head, a circle layered on top of the body and ears -->
    <circle cx="50" cy="42" r="26"/>
  </g>
  <!-- The nose, a small triangle with a different color -->
  <polygon points="48,50 52,50 50,54" fill="#e74c3c"/>
</svg>