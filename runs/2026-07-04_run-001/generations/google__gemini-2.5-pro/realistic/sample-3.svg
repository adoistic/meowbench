<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="fur-texture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.1 0.4" numOctaves="3" seed="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#bbb" surfaceScale="1.5" result="lit-noise">
        <feDistantLight azimuth="45" elevation="30"/>
      </feDiffuseLighting>
      <feComposite in="lit-noise" in2="SourceGraphic" operator="in" result="textured"/>
      <feComposite in="textured" in2="SourceGraphic" operator="arithmetic" k1="1.3" k2="0" k3="0" k4="0"/>
    </filter>
    <filter id="soft-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <radialGradient id="body-gradient" cx="50%" cy="40%" r="60%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#ab8b6a"/>
      <stop offset="60%" stop-color="#8a6e51"/>
      <stop offset="100%" stop-color="#554433"/>
    </radialGradient>
    <radialGradient id="eye-gradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c1ff7a"/>
      <stop offset="50%" stop-color="#70a340"/>
      <stop offset="90%" stop-color="#3b5921"/>
    </radialGradient>
    <clipPath id="cat-mask">
      <path d="M 330,290 C 380,270 420,320 415,380 C 410,440 370,450 340,445 L 305,441 C 305,420 320,380 330,290 Z"/>
      <path d="M 160,240 C 120,280 110,400 160,450 C 220,460 310,460 350,440 C 370,380 360,280 320,240 C 280,200 200,200 160,240 Z"/>
      <path d="M 210,120 C 160,110 130,160 135,210 C 140,260 210,280 260,270 C 295,240 280,140 210,120 Z"/>
    </clipPath>
  </defs>
  <ellipse cx="250" cy="455" rx="140" ry="15" fill="#000" opacity="0.3" filter="url(#soft-shadow)"/>
  <g id="cat" transform="translate(0, 10)">
    <g filter="url(#fur-texture)">
      <path d="M 330,290 C 380,270 420,320 415,380 C 410,440 370,450 340,445 L 305,441 C 305,420 320,380 330,290 Z" fill="url(#body-gradient)" />
      <path d="M 160,240 C 120,280 110,400 160,450 C 220,460 310,460 350,440 C 370,380 360,280 320,240 C 280,200 200,200 160,240 Z" fill="url(#body-gradient)"/>
      <path d="M 210,120 C 160,110 130,160 135,210 C 140,260 210,280 260,270 C 295,240 280,140 210,120 Z" fill="url(#body-gradient)" />
      <path d="M 160,145 L 140,110 L 180,120 Z" fill="#6B5B49"/>
      <path d="M 240,135 L 270,115 L 255,150 Z" fill="#6B5B49"/>
      <path d="M 162,140 L 150,118 L 175,123 Z" fill="#c4a586"/>
      <path d="M 245,138 L 265,122 L 253,145 Z" fill="#c4a586"/>
    </g>
    <g clip-path="url(#cat-mask)" opacity="0.3" filter="url(#soft-shadow)">
      <path d="M 190,120 Q 200,160 210,120 M 215,115 Q 220,150 225,115 M 240,120 Q 230,160 220,120" stroke="#443322" stroke-width="8" fill="none"/>
      <ellipse cx="280" cy="300" rx="40" ry="100" fill="#443322" transform="rotate(-15 280 300)"/>
      <ellipse cx="190" cy="320" rx="30" ry="80" fill="#443322" transform="rotate(10 190 320)"/>
      <ellipse cx="380" cy="360" rx="30" ry="50" fill="#443322" transform="rotate(45 380 360)"/>
      <ellipse cx="320" cy="420" rx="40" ry="20" fill="#443322"/>
    </g>
    <g id="face">
      <path d="M 170,210 C 190,250 250,250 270,210 C 250,225 190,225 170,210 Z" fill="#d4b79b" opacity="0.8"/>
      <g id="left-eye">
        <ellipse cx="180" cy="190" rx="14" ry="16" fill="#3B5921"/>
        <ellipse cx="180" cy="190" rx="12" ry="14" fill="url(#eye-gradient)"/>
        <ellipse cx="180" cy="193" rx="4" ry="9" fill="#000"/>
        <circle cx="177" cy="186" r="2" fill="white" opacity="0.9"/>
      </g>
      <g id="right-eye">
        <ellipse cx="230" cy="190" rx="14" ry="16" fill="#3B5921"/>
        <ellipse cx="230" cy="190" rx="12" ry="14" fill="url(#eye-gradient)"/>
        <ellipse cx="230" cy="193" rx="4" ry="9" fill="#000"/>
        <circle cx="227" cy="186" r="2" fill="white" opacity="0.9"/>
      </g>
      <path d="M 205,210 L 215,210 L 210,217 Z" fill="#ffaaa9"/>
      <path d="M 210,217 C 205,220 215,220 210,217" stroke="#443322" stroke-width="0.5" fill="none"/>
    </g>
    <g stroke="white" stroke-width="0.7" opacity="0.6" fill="none">
        <path d="M 160,215 C 120,215 110,205 100,195"/>
        <path d="M 160,220 C 120,220 110,220 100,220"/>
        <path d="M 160,225 C 120,225 110,235 100,245"/>
        <path d="M 280,215 C 320,215 330,205 340,195"/>
        <path d="M 280,220 C 320,220 330,220 340,220"/>
        <path d="M 280,225 C 320,225 330,235 340,245"/>
    </g>
  </g>
</svg>