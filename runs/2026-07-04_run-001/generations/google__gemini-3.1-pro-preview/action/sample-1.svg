<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
    <defs>
        <!-- Wheel Spoke Component -->
        <g id="spoke">
            <line x1="-76" y1="0" x2="76" y2="0" stroke="#8D99AE" stroke-width="2"/>
        </g>
        <!-- Full Wheel Component -->
        <g id="wheel">
            <!-- Tire Drop Shadow -->
            <circle cx="0" cy="4" r="85" fill="none" stroke="#EAE2B7" stroke-width="16" opacity="0.3"/>
            <!-- Main Tire -->
            <circle cx="0" cy="0" r="85" fill="none" stroke="#2B2D42" stroke-width="16"/>
            <!-- White-wall Accent -->
            <circle cx="0" cy="0" r="77" fill="none" stroke="#F8F9FA" stroke-width="3"/>
            <!-- Inner Rim -->
            <circle cx="0" cy="0" r="72" fill="none" stroke="#A8DADC" stroke-width="8"/>
            <!-- Rim Gloss -->
            <circle cx="0" cy="0" r="69" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
            <!-- Spokes -->
            <use href="#spoke" transform="rotate(0)" />
            <use href="#spoke" transform="rotate(30)" />
            <use href="#spoke" transform="rotate(60)" />
            <use href="#spoke" transform="rotate(90)" />
            <use href="#spoke" transform="rotate(120)" />
            <use href="#spoke" transform="rotate(150)" />
            <!-- Center Hub -->
            <circle cx="0" cy="0" r="12" fill="#1D3557"/>
            <circle cx="0" cy="0" r="4" fill="#FFFFFF" opacity="0.6"/>
        </g>
    </defs>

    <!-- Sky Background -->
    <rect width="100%" height="100%" fill="#FDFCDC" />

    <!-- Giant Setting Sun -->
    <circle cx="400" cy="300" r="260" fill="#FFECB3" opacity="0.6"/>
    <circle cx="400" cy="300" r="210" fill="#FFE082" opacity="0.8"/>

    <!-- Sparkles / Magic Motif -->
    <g fill="#FFE082">
        <path d="M 680 120 Q 680 140 700 140 Q 680 140 680 160 Q 680 140 660 140 Q 680 140 680 120 Z" />
        <path d="M 120 100 Q 120 110 130 110 Q 120 110 120 120 Q 120 110 110 110 Q 120 110 120 100 Z" />
        <path d="M 620 60 Q 620 75 635 75 Q 620 75 620 90 Q 620 75 605 75 Q 620 75 620 60 Z" />
    </g>

    <!-- Floor Shadows -->
    <ellipse cx="400" cy="515" rx="360" ry="16" fill="#EAE2B7" opacity="0.8" />
    <ellipse cx="240" cy="513" rx="60" ry="6" fill="#D4C8A6" />
    <ellipse cx="560" cy="513" rx="60" ry="6" fill="#D4C8A6" />

    <!-- Speed Lines / Wind Details -->
    <path d="M 620 480 L 700 480 M 670 450 L 740 450 M 50 350 L 150 350 M 80 320 L 120 320 M 100 200 L 250 200 M 680 250 L 760 250 M 30 160 L 90 160" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

    <!-- Trailing Dust Clouds behind bicycle -->
    <g fill="#FFFFFF" opacity="0.85">
        <circle cx="100" cy="495" r="16"/>
        <circle cx="130" cy="485" r="22"/>
        <circle cx="160" cy="495" r="14"/>
        <circle cx="180" cy="505" r="8"/>
        <rect x="95" y="490" width="80" height="20" rx="10"/>
        
        <circle cx="40" cy="500" r="12" opacity="0.6"/>
        <circle cx="60" cy="495" r="14" opacity="0.6"/>
        <rect x="35" y="498" width="30" height="12" rx="6" opacity="0.6"/>
    </g>

    <!-- LEFT LAYER (Background elements of cat and bike) -->
    <!-- Left Background Arm -->
    <path d="M 395 135 Q 420 160 445 205" fill="none" stroke="#E76F51" stroke-width="16" stroke-linecap="round"/>
    <circle cx="446" cy="204" r="8" fill="#FFF3B0"/>

    <!-- Left Background Back Leg -->
    <ellipse cx="320" cy="245" rx="28" ry="40" transform="rotate(-20 320 245)" fill="#E76F51"/>
    <!-- Left Shank -->
    <path d="M 330 280 L 350 384" fill="none" stroke="#E76F51" stroke-width="13" stroke-linecap="round"/>
    <!-- Left Paw -->
    <path d="M 342 382 L 365 382 A 6 6 0 0 1 365 394 L 342 394 Z" fill="#FFF3B0"/>
    <!-- Left Background Pedal & Crank -->
    <line x1="380" y1="420" x2="350" y2="385" stroke="#8D99AE" stroke-width="8" stroke-linecap="round"/>
    <line x1="340" y1="385" x2="360" y2="385" stroke="#1D3557" stroke-width="14" stroke-linecap="round"/>

    <!-- MIDDLE LAYER: BICYCLE BASE -->
    <!-- Rear Wheel -->
    <use href="#wheel" x="240" y="420" />
    <!-- Front Wheel -->
    <use href="#wheel" x="560" y="420" />

    <!-- Bicycle Frame (Bright Coral Red) -->
    <g stroke="#FF6B6B" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
        <!-- Chainstay -->
        <line x1="240" y1="420" x2="380" y2="420"/>
        <!-- Seatstay -->
        <line x1="240" y1="420" x2="340" y2="250"/>
        <!-- Seat Tube -->
        <line x1="380" y1="420" x2="340" y2="250"/>
        <!-- Down Tube -->
        <line x1="380" y1="420" x2="520" y2="290"/>
        <!-- Top Tube -->
        <line x1="340" y1="250" x2="510" y2="250"/>
        <!-- Head Tube -->
        <line x1="508" y1="245" x2="522" y2="295"/>
        <!-- Fork with classic gentle curve -->
        <path d="M 520 290 Q 545 360 560 420" fill="none"/>
    </g>
    <!-- Frame Join Caps / Shells to smooth out corners -->
    <circle cx="340" cy="250" r="8" fill="#FF6B6B"/>
    <circle cx="380" cy="420" r="16" fill="#FF6B6B"/>
    <circle cx="510" cy="250" r="8" fill="#FF6B6B"/>
    <circle cx="520" cy="290" r="8" fill="#FF6B6B"/>
    
    <!-- Highlights for the Bike Frame to pop -->
    <line x1="360" y1="246" x2="490" y2="246" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="390" y1="410" x2="510" y2="295" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.4"/>

    <!-- Seatpost & Saddle -->
    <line x1="340" y1="250" x2="325" y2="200" stroke="#8D99AE" stroke-width="12" stroke-linecap="round"/>
    <path d="M 315 195 C 345 195 375 200 370 215 C 370 225 320 220 295 215 C 285 210 285 198 315 195 Z" fill="#1D3557"/>

    <!-- Handlebar Stem & Bar -->
    <line x1="510" y1="250" x2="500" y2="210" stroke="#8D99AE" stroke-width="12" stroke-linecap="round"/>
    <path d="M 500 210 Q 480 195 440 214" fill="none" stroke="#8D99AE" stroke-width="12" stroke-linecap="round"/>
    <!-- Navy Grips -->
    <line x1="465" y1="205" x2="435" y2="217" stroke="#1D3557" stroke-width="16" stroke-linecap="round"/>

    <!-- Handlebar Bell -->
    <path d="M 465 212 C 465 195, 495 195, 495 212 Z" fill="#FFD166"/>
    <circle cx="480" cy="190" r="4" fill="#FFD166"/>
    <line x1="492" y1="205" x2="502" y2="198" stroke="#8D99AE" stroke-width="3" stroke-linecap="round"/>
    <circle cx="504" cy="196" r="3" fill="#1D3557"/>

    <!-- Main Front Gear & Chain -->
    <!-- Chain loops -->
    <path d="M 240 405 A 15 15 0 0 0 240 435 M 380 392 A 28 28 0 0 1 380 448" fill="none" stroke="#4A4E69" stroke-width="4"/>
    <path d="M 240 405 L 380 392 M 240 435 L 380 448" stroke="#4A4E69" stroke-width="4"/>
    <!-- Chainring Edge -->
    <circle cx="380" cy="420" r="28" fill="none" stroke="#1D3557" stroke-width="6"/>
    <!-- Chainring Internal Star Detail -->
    <path d="M 380 395 L 380 445 M 355 420 L 405 420" stroke="#1D3557" stroke-width="4"/>
    <circle cx="380" cy="420" r="6" fill="#8D99AE"/>

    <!-- HERO LAYER: THE RIDING CAT -->

    <!-- Giant Fluffy Tail -->
    <path id="tail" d="M 300 185 C 220 180, 140 260, 80 190 Q 50 150, 70 110" fill="none" stroke="#F4A261" stroke-width="26" stroke-linecap="round"/>
    <!-- Tail Stripes overlay (awesome dynamic look!) -->
    <use href="#tail" stroke="#E76F51" stroke-dasharray="14, 26" />

    <!-- Cat Scarf Background Tails Blowing in Wind -->
    <path id="s1" d="M 410 120 Q 320 120 250 80 T 120 60" fill="none" stroke="#00B4D8" stroke-width="18" stroke-linecap="round"/>
    <use href="#s1" stroke="#03045E" stroke-dasharray="14, 28"/>
    <path id="s2" d="M 405 125 Q 350 160 280 140 T 150 150" fill="none" stroke="#0096C7" stroke-width="14" stroke-linecap="round"/>
    <use href="#s2" stroke="#03045E" stroke-dasharray="10, 20"/>

    <!-- Cat Main Body Over the Frame -->
    <path d="M 290 190 Q 280 80 390 100 Q 425 105 430 140 Q 400 210 290 190 Z" fill="#F4A261"/>
    <!-- Pale Belly Block underneath -->
    <path d="M 315 200 C 350 195, 390 160, 420 135 C 410 170, 380 205, 315 200 Z" fill="#FFF3B0"/>
    
    <!-- Tabby Back Stripes -->
    <path d="M 315 125 Q 325 140 345 135 M 335 110 Q 350 130 370 120 M 355 102 Q 370 120 390 110 M 375 100 Q 390 115 405 108" fill="none" stroke="#E76F51" stroke-width="6" stroke-linecap="round"/>

    <!-- Right Foreground Thigh -->
    <ellipse cx="340" cy="235" rx="35" ry="48" transform="rotate(-30 340 235)" fill="#F4A261"/>
    <!-- Thigh Stripes -->
    <path d="M 320 205 L 343 218 M 310 218 L 338 232 M 310 234 L 335 245" stroke="#E76F51" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Right Leg Shank down to pedal -->
    <path d="M 355 270 L 404 440" fill="none" stroke="#F4A261" stroke-width="18" stroke-linecap="round"/>
    <path d="M 388 440 L 418 440 A 8 8 0 0 1 418 455 L 388 455 Z" fill="#FFF3B0"/>

    <!-- Right Foreground Arm -->
    <path d="M 400 135 Q 425 175 444 214" fill="none" stroke="#F4A261" stroke-width="18" stroke-linecap="round"/>
    <path d="M 414 158 L 430 148 M 424 176 L 440 166" stroke="#E76F51" stroke-width="5" stroke-linecap="round"/>
    <!-- Front Paw overlapping handle -->
    <circle cx="444" cy="214" r="10" fill="#FFF3B0"/>

    <!-- Right Foreground Pedal & Crank Base (Foot overlaps part of it, this overlaps remainder) -->
    <!-- Front Crank -->
    <line x1="380" y1="420" x2="410" y2="455" stroke="#8D99AE" stroke-width="8" stroke-linecap="round"/>
    <!-- Front Pedal sitting strictly on the outside of foot -->
    <line x1="400" y1="455" x2="420" y2="455" stroke="#1D3557" stroke-width="12" stroke-linecap="round"/>

    <!-- Cat Neck Scarf Wrap -->
    <path d="M 386 118 C 400 135 435 140 445 125 C 435 110 395 100 386 118 Z" fill="#00B4D8"/>
    <!-- Little scarf highlight -->
    <path d="M 395 122 Q 420 132 435 120" fill="none" stroke="#CAF0F8" stroke-width="3" stroke-linecap="round"/>

    <!-- Cat Head Elements -->
    <!-- Left Ear (Back) -->
    <polygon points="390,75 405,35 425,70" fill="#E76F51" stroke="#E76F51" stroke-linejoin="round" stroke-width="4"/>
    
    <!-- Base Head Shape -->
    <path d="M 400 120 C 380 90, 400 60, 425 60 C 445 60, 460 75, 460 95 C 460 105, 455 115, 440 125 L 420 130 Z" fill="#F4A261"/>
    
    <!-- Forehead Tabby M Stripes -->
    <path d="M 410 65 L 415 80 M 425 62 L 425 78 M 440 68 L 435 80" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Snout White Block -->
    <path d="M 445 95 C 465 95, 465 115, 445 120 C 430 120, 425 110, 425 100 C 425 95, 435 95, 445 95 Z" fill="#FFF3B0"/>
    
    <!-- Pink Cheeks Blushing in the wind -->
    <ellipse cx="435" cy="103" rx="7" ry="4" fill="#FF8FA3" opacity="0.6"/>
    
    <!-- Eye & Eyebrow -->
    <path d="M 432 88 Q 442 84 450 92" fill="none" stroke="#1D3557" stroke-width="4" stroke-linecap="round"/>
    <path d="M 430 78 Q 440 76 448 82" fill="none" stroke="#E76F51" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Happy Little Nose & Mouth -->
    <circle cx="458" cy="100" r="4" fill="#F08080"/>
    <path d="M 458 103 Q 450 108 442 105" fill="none" stroke="#1D3557" stroke-width="2" stroke-linecap="round"/>
    <path d="M 452 106 Q 448 116 442 110 Z" fill="#FF8FA3"/>
    
    <!-- Long Sweeping Whiskers -->
    <path d="M 450 100 Q 470 105 485 100 M 445 105 Q 465 110 480 110 M 442 110 Q 460 120 475 120" fill="none" stroke="#2B2D42" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Right Ear (Front) -->
    <polygon points="410,65 425,20 445,65" fill="#F4A261" stroke="#F4A261" stroke-linejoin="round" stroke-width="4"/>
    <!-- Pink Inner Ear details -->
    <polygon points="418,62 425,30 435,62" fill="#FAD2E1"/>


    <!-- FOREGROUND PROPS (Basket) -->
    
    <!-- Basket Mounts connecting correctly to Headtube -->
    <line x1="518" y1="245" x2="545" y2="245" stroke="#8D99AE" stroke-width="4" stroke-linecap="round"/>
    <line x1="510" y1="250" x2="525" y2="235" stroke="#8D99AE" stroke-width="4" stroke-linecap="round"/>

    <!-- Woven Front Basket -->
    <rect x="525" y="210" width="45" height="35" rx="4" fill="#E29578" stroke="#D4A373" stroke-width="4"/>
    <path d="M 525 222 L 570 222 M 525 233 L 570 233 M 540 210 L 540 245 M 555 210 L 555 245" stroke="#FFDDD2" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Dynamic Flowers popping out of basket -->
    <!-- Stems -->
    <path d="M 545 210 Q 550 180 565 190 M 535 210 L 530 185" fill="none" stroke="#2DC653" stroke-width="4" stroke-linecap="round"/>
    <!-- Leaves -->
    <path d="M 535 200 Q 525 195 530 190 Q 535 195 535 200" fill="#2DC653"/>
    
    <!-- Pink Blossom Left -->
    <g transform="translate(530, 185) rotate(-15)">
        <circle cx="0" cy="-6" r="6" fill="#FFB5A7"/>
        <circle cx="0" cy="6" r="6" fill="#FFB5A7"/>
        <circle cx="-6" cy="0" r="6" fill="#FFB5A7"/>
        <circle cx="6" cy="0" r="6" fill="#FFB5A7"/>
        <circle cx="0" cy="0" r="4" fill="#FFF3B0"/>
    </g>

    <!-- Yellow Blossom Right -->
    <g transform="translate(565, 190) scale(0.9) rotate(25)">
        <circle cx="0" cy="-6" r="5" fill="#FFD166"/>
        <circle cx="0" cy="6" r="5" fill="#FFD166"/>
        <circle cx="-6" cy="0" r="5" fill="#FFD166"/>
        <circle cx="6" cy="0" r="5" fill="#FFD166"/>
        <circle cx="4" cy="-4" r="5" fill="#FFD166"/>
        <circle cx="-4" cy="-4" r="5" fill="#FFD166"/>
        <circle cx="4" cy="4" r="5" fill="#FFD166"/>
        <circle cx="-4" cy="4" r="5" fill="#FFD166"/>
        <circle cx="0" cy="0" r="4" fill="#E76F51"/>
    </g>
</svg>