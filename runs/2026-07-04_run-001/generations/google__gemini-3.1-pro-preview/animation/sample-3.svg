<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141129"/>
      <stop offset="100%" stop-color="#2D284F"/>
    </linearGradient>

    <filter id="tailShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="-4" dy="8" stdDeviation="6" flood-color="#05030A" flood-opacity="0.35"/>
    </filter>

    <filter id="catShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#05030A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="500" height="500" fill="#25213D"/>

  <path d="M 90,500 L 90,200 A 160,160 0 0,1 410,200 L 410,500 Z" fill="url(#skyGrad)"/>

  <g id="stars">
    <path d="M 230,70 Q 230,80 240,80 Q 230,80 230,90 Q 230,80 220,80 Q 230,80 230,70" fill="#FFF">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3s" repeatCount="indefinite" begin="0s"/>
    </path>
    <path d="M 330,120 Q 330,125 335,125 Q 330,125 330,130 Q 330,125 325,125 Q 330,125 330,120" fill="#FFF">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
    </path>
    <path d="M 130,220 Q 130,228 138,228 Q 130,228 130,236 Q 130,228 122,228 Q 130,228 130,220" fill="#FFF">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="4s" repeatCount="indefinite" begin="1.5s"/>
    </path>
    <circle cx="360" cy="80" r="1.5" fill="#FFF">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="160" cy="110" r="2" fill="#FFF">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="280" cy="180" r="1" fill="#FFF">
      <animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.5s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
  </g>

  <path d="M 155,115 A 35,35 0 1,0 185,180 A 40,40 0 0,1 155,115 Z" fill="#FFD166"/>

  <path d="M 80,500 L 80,200 A 170,170 0 0,1 420,200 L 420,500 Z" fill="none" stroke="#1D192E" stroke-width="20"/>
