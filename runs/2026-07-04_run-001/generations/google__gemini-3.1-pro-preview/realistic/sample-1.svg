<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" />
    </filter>
    
    <filter id="furryEdge" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.15 0.08" numOctaves="4" result="noise1"/>
      <feDisplacementMap in="SourceGraphic" in2="noise1" scale="18" xChannelSelector="R" yChannelSelector="G" result="fur"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.08 0.15" numOctaves="3" result="noise2"/>
      <feDisplacementMap in="fur" in2="noise2" scale="10" xChannelSelector="B" yChannelSelector="A"/>
    </filter>

    <radialGradient id="bodyGrad" cx="35%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#FFB966"/>
      <stop offset="40%" stop-color="#D9751E"/>
      <stop offset="85%" stop-color="#80340A"/>
      <stop offset="100%" stop-color="#3D1501"/>
    </radialGradient>

    <radialGradient id="haunchGrad" cx="70%" cy="80%" r="60%">
