        M330,550 Q500,630 670,550 L680,580 Q500,680 320,580 Z
        M315,620 Q500,700 685,620 L695,650 Q500,740 310,650 Z" fill="#D1743E" opacity="0.65" filter="url(#stripeBlur)" />
        
      <path d="M495,380 Q450,550 350,680 M505,380 Q550,550 650,680 M480,380 Q430,500 350,550 M520,380 Q570,500 650,550" stroke="#FFFFFF" stroke-width="8" fill="none" opacity="0.8" stroke-linecap="round" filter="url(#softBlur)" />
      <path d="M495,380 Q460,600 400,740 M505,380 Q540,600 600,740" stroke="#FFFFFF" stroke-width="6" fill="none" opacity="0.6" stroke-linecap="round" />
      <path d="M470,400 Q400,550 340,580 M530,400 Q600,550 660,580" stroke="#FFFFFF" stroke-width="4" fill="none" opacity="0.8" stroke-linecap="round" />
