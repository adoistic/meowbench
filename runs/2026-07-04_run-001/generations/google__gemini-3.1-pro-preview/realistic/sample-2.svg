      <path d="M180,650 Q 280,720 240,820 M 230,680 Q 320,750 280,850 M 280,700 Q 360,780 320,850" stroke="#2E0E04" stroke-width="18" fill="none" opacity="0.6" filter="url(#stripeBlur)" />
      <path d="M 380,450 C 270,450 200,600 220,780" stroke="#A6583A" stroke-width="6" fill="none" opacity="0.5" filter="url(#softBlur)" />
    </g>

    <use href="#defRightHip" fill="url(#rightHipGrad)" />
    <g clip-path="url(#rightHipClip)">
