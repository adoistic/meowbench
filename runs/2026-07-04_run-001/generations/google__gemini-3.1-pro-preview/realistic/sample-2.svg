    <circle cx="480" cy="345" r="1.5" fill="#5F3119" opacity="0.6"/><circle cx="470" cy="355" r="1.5" fill="#5F3119" opacity="0.6"/><circle cx="460" cy="345" r="1.5" fill="#5F3119" opacity="0.6"/>
    <circle cx="520" cy="345" r="1.5" fill="#5F3119" opacity="0.6"/><circle cx="530" cy="355" r="1.5" fill="#5F3119" opacity="0.6"/><circle cx="540" cy="345" r="1.5" fill="#5F3119" opacity="0.6"/>

