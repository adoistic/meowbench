<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#2a2522"/>
      <stop offset="60%" stop-color="#141211"/>
      <stop offset="100%" stop-color="#080707"/>
    </radialGradient>
    
    <filter id="shadowBlur" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="35" />
    </filter>
    <filter id="stripeBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" />
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" />
    </filter>

    <radialGradient id="headGrad" cx="60%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#F29A4D"/>
      <stop offset="50%" stop-color="#C76722"/>
      <stop offset="85%" stop-color="#803810"/>
      <stop offset="100%" stop-color="#411B07"/>
    </radialGradient>

    <linearGradient id="chestGrad" x1="0.1" y1="0.1" x2="0.9" y2="0.8">
      <stop offset="0%" stop-color="#9C775D"/>
      <stop offset="35%" stop-color="#EBC6A6"/>
      <stop offset="70%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EED5C0"/>
    </linearGradient>

    <radialGradient id="leftHipGrad" cx="90%" cy="30%" r="100%">
      <stop offset="0%" stop-color="#6B290B"/>
      <stop offset="50%" stop-color="#B8591B"/>
      <stop offset="100%" stop-color="#471A06"/>
    </radialGradient>

    <radialGradient id="rightHipGrad" cx="20%" cy="20%" r="100%">
      <stop offset="0%" stop-color="#F4A254"/>
      <stop offset="60%" stop-color="#C25916"/>
      <stop offset="100%" stop-color="#702F0E"/>
    </radialGradient>

    <linearGradient id="tailGrad" x1="1" y1="0.5" x2="0" y2="1">
      <stop offset="0%" stop-color="#D96E25"/>
      <stop offset="40%" stop-color="#AE4B12"/>
      <stop offset="80%" stop-color="#552207"/>
      <stop offset="100%" stop-color="#2F1102"/>
    </linearGradient>
    
    <linearGradient id="frontLegL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A95A2B"/>
      <stop offset="50%" stop-color="#E0A678"/>
      <stop offset="100%" stop-color="#C88E65"/>
    </linearGradient>

    <linearGradient id="frontLegR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7B272"/>
      <stop offset="50%" stop-color="#DC8944"/>
      <stop offset="100%" stop-color="#A95822"/>
    </linearGradient>

    <radialGradient id="eyeGradL" cx="60%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E2FF61"/>
      <stop offset="50%" stop-color="#9BC71B"/>
      <stop offset="80%" stop-color="#41730C"/>
      <stop offset="100%" stop-color="#1B3803"/>
    </radialGradient>
    <radialGradient id="eyeGradR" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E2FF61"/>
      <stop offset="50%" stop-color="#9BC71B"/>
      <stop offset="80%" stop-color="#41730C"/>
      <stop offset="100%" stop-color="#1B3803"/>
    </radialGradient>

    <linearGradient id="noseGrad" x1="0.3" y1="0.1" x2="0.7" y2="0.9">
      <stop offset="0%" stop-color="#FFA8A1"/>
      <stop offset="70%" stop-color="#D66056"/>
      <stop offset="100%" stop-color="#8E2D25"/>
    </linearGradient>

    <linearGradient id="earGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8F3F1A"/>
      <stop offset="70%" stop-color="#DE844D"/>
      <stop offset="100%" stop-color="#FBB489"/>
