    <path d="M 437,243 C 445,215 480,225 485,245 C 470,253 450,255 437,243 Z" fill="#EA9592" />
    <path d="M 563,243 C 555,215 520,225 515,245 C 530,253 550,255 563,243 Z" fill="#EA9592" />

    <path d="M 395 245 C 420 215 455 220 465 240 C 450 265 415 265 395 245 Z" fill="url(#eyeGradL)" />
    <ellipse cx="433" cy="242" rx="4" ry="15" fill="#131B05" />
    <circle cx="430" cy="235" r="3.5" fill="#FFF" opacity="0.9" />
    <circle cx="438" cy="245" r="1.5" fill="#FFF" opacity="0.6" />
    
    <path d="M 605 245 C 580 215 545 220 535 240 C 550 265 585 265 605 245 Z" fill="url(#eyeGradR)" />
    <ellipse cx="567" cy="242" rx="4" ry="15" fill="#131B05" />
    <circle cx="563" cy="235" r="3.5" fill="#FFF" opacity="0.9" />
    <circle cx="572" cy="245" r="1.5" fill="#FFF" opacity="0.6" />

    <path d="M 390 248 C 420 212 460 215 470 240 C 455 268 415 270 390 248 Z" fill="none" stroke="#160803" stroke-width="4" stroke-linecap="round"/>
    <path d="M 465 242 C 475 235 485 235 490 240 C 480 245 470 245 465 242 Z" fill="#160803" />
    <path d="M 610 248 C 580 212 540 215 530 240 C 545 268 585 270 610 248 Z" fill="none" stroke="#160803" stroke-width="4" stroke-linecap="round"/>
    <path d="M 535 242 C 525 235 515 235 510 240 C 520 245 530 245 535 242 Z" fill="#160803" />

    <path d="M 480 300 Q 500 295 520 300 Q 525 315 500 325 Q 475 315 480 300 Z" fill="url(#noseGrad)" />
