        M380,300 L290,320 L280,335 L370,325 Z
        M600,260 L680,265 L690,275 L620,285 Z
        M620,300 L710,320 L720,335 L630,325 Z" fill="#3D1201" opacity="0.75" filter="url(#stripeBlur)" />
        
      <path d="M370,340 L300,380 L300,390 L360,360 Z M630,340 L700,380 L700,390 L640,360 Z" fill="#3D1201" opacity="0.7" filter="url(#stripeBlur)" />

      <path d="M 400 310 C 370 280 340 310 370 340 Z M 600 310 C 630 280 660 310 630 340 Z" fill="#F4E9DF" opacity="0.4" filter="url(#stripeBlur)" />
      <path d="M 500 240 L 485 300 L 515 300 Z" fill="#F4B785" opacity="0.7" filter="url(#softBlur)" />
