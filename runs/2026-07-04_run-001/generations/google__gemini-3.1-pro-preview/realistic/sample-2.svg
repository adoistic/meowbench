      <path d="M820,650 Q 720,720 760,820 M 770,680 Q 680,750 720,850 M 720,700 Q 640,780 680,850" stroke="#6A2204" stroke-width="18" fill="none" opacity="0.6" filter="url(#stripeBlur)" />
      <path d="M 620,450 C 730,450 800,600 780,780" stroke="#FFD8AB" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#softBlur)" opacity="0.85" />
      <path d="M 780,780 C 780,830 750,860 700,850" stroke="#FFCE93" stroke-width="5" fill="none" filter="url(#softBlur)" opacity="0.6" />
    </g>
  </g>

  <g id="Front_Legs">
    <path id="defLeftLeg" d="M 400,600 L 390,830 C 370,860 380,890 415,890 C 445,890 470,880 470,850 C 475,820 460,700 460,600 Z" fill="url(#frontLegL)" />
    <path id="defRightLeg" d="M 600,600 L 610,830 C 630,860 620,890 585,890 C 555,890 530,880 530,850 C 525,820 540,700 540,600 Z" fill="url(#frontLegR)" />
    
    <path d="M 390,650 Q 420,800 395,850 M 420,650 Q 450,780 435,840 M 450,650 Q 480,750 465,840" stroke="#A9654C" stroke-width="12" fill="none" opacity="0.5" filter="url(#stripeBlur)" />
    <path d="M 610,650 Q 580,800 605,850 M 580,650 Q 550,780 565,840 M 550,650 Q 520,750 535,840" stroke="#87351A" stroke-width="12" fill="none" opacity="0.6" filter="url(#stripeBlur)" />

    <path d="M 400,890 C 400,870 395,865 395,855 M 420,890 C 420,870 415,860 415,845 M 445,885 C 440,865 440,855 435,840" stroke="#260C03" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 600,890 C 600,870 605,865 605,855 M 580,890 C 580,870 585,860 585,845 M 555,885 C 560,865 560,855 565,840" stroke="#260C03" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

