        M475,175 L450,140 L440,145 L465,195 Z
        M525,175 L550,140 L560,145 L535,195 Z
        M490,200 L503,240 L516,200 Z" fill="#3D1201" opacity="0.8" filter="url(#stripeBlur)" />
        
      <path d="
