        L 340,430 L 375,445
        L 325,490 L 365,510
        L 310,550 L 355,575
        L 300,630 L 370,640
        L 330,710 L 400,700
        C 430,740 470,750 500,750
        C 530,750 570,740 600,700
        L 670,710 L 630,640
        L 700,630 L 645,575
        L 690,550 L 635,510
        L 675,490 L 625,445
        L 660,430 L 620,380 Z" />
        
    <path id="defHead" d="
        M 500,120
        C 530,120 560,130 580,140
        C 610,160 630,200 640,240
        L 660,260 L 645,265
        L 680,290 L 650,295
        L 690,320 L 650,330
        L 700,350 L 640,360
        L 680,380 L 630,385
        L 650,400 L 600,395
        C 570,410 540,420 500,420
        C 460,420 430,410 400,395
        L 350,400 L 370,385
        L 320,380 L 360,360
        L 300,350 L 350,330
        L 310,320 L 350,295
        L 320,290 L 355,265
        L 340,260
        C 370,200 390,160 420,140
        C 440,130 470,120 500,120 Z" />
        
    <path id="defTail" d="
