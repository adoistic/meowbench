      <path d="M0,8 Q-160,30 -240,20" stroke="#FFF" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
      <path d="M5,18 Q-130,50 -200,60" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
      <path d="M8,-12 Q-140,-30 -220,-50" stroke="#FFF" stroke-width="1.8" fill="none" opacity="0.7" stroke-linecap="round"/>
      <path d="M12,-20 Q-100,-40 -150,-80" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    </g>
    <g id="whiskerGroupR">
      <path d="M0,0 Q150,15 250,-10" stroke="#FFF" stroke-width="2.5" fill="none" opacity="0.8" stroke-linecap="round"/>
      <path d="M0,8 Q160,30 240,20" stroke="#FFF" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
      <path d="M-5,18 Q130,50 200,60" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
      <path d="M-8,-12 Q140,-30 220,-50" stroke="#FFF" stroke-width="1.8" fill="none" opacity="0.7" stroke-linecap="round"/>
      <path d="M-12,-20 Q100,-40 150,-80" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
    </g>
