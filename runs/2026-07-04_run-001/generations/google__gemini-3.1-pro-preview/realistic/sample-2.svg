  <rect width="1000" height="1000" fill="url(#bgGrad)" />
  <ellipse cx="500" cy="850" rx="420" ry="90" fill="#030202" opacity="0.8" filter="url(#shadowBlur)" />
  <ellipse cx="650" cy="840" rx="200" ry="60" fill="#000" opacity="0.9" filter="url(#shadowBlur)" />
  <ellipse cx="300" cy="840" rx="150" ry="70" fill="#000" opacity="0.9" filter="url(#shadowBlur)" />

  <g id="Ears">
    <path d="M 370,180 C 320,80 300,50 330,40 C 360,30 410,70 440,140 Z" fill="url(#earGrad)" />
    <path d="M 380,165 C 340,90 325,70 340,60 C 355,50 395,80 420,135 Z" fill="url(#earInner)" />
    <path d="M 630,180 C 680,80 700,50 670,40 C 640,30 590,70 560,140 Z" fill="url(#earGrad)" />
