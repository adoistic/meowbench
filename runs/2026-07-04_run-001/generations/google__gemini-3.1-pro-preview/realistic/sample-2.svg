    <linearGradient id="earInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#160803"/>
      <stop offset="40%" stop-color="#6F2825"/>
      <stop offset="100%" stop-color="#CC786E"/>
