      <path d="M 15,25 C 18,15 22,5 18,0 C 20,10 25,20 25,27 Z" fill="#2E0E02" opacity="0.12"/>
      <path d="M 22,20 C 27,10 25,5 28,0 C 30,10 32,20 28,25 Z" fill="#F4953A" opacity="0.06"/>
    </pattern>

    <pattern id="microFurL" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="scale(1.3) rotate(-20)">
      <path d="M 5,20 C 8,10 12,0 8,-5 C 10,5 15,15 15,22 Z" fill="#FFF" opacity="0.08"/>
      <path d="M 15,25 C 18,15 22,5 18,0 C 20,10 25,20 25,27 Z" fill="#2E0E02" opacity="0.12"/>
      <path d="M 22,20 C 27,10 25,5 28,0 C 30,10 32,20 28,25 Z" fill="#F4953A" opacity="0.06"/>
    </pattern>

