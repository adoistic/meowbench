<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- bicycle -->
  <rect x="50" y="120" width="100" height="20" fill="#999" rx="5"/>
  <circle cx="60" cy="140" r="10" fill="#999"/>
  <circle cx="140" cy="140" r="10" fill="#999"/>
  <path d="M 70 110 L 130 110 L 150 90 L 70 90 Z" fill="#999"/>
  <path d="M 80 100 L 120 100 L 110 80 Z" fill="#999"/>
  
  <!-- cat -->
  <circle cx="100" cy="80" r="30" fill="#FFD7BE"/>
  <circle cx="90" cy="70" r="10" fill="#FFFFFF"/>
  <circle cx="110" cy="70" r="10" fill="#FFFFFF"/>
  <path d="M 90 60 L 110 60 L 100 40 Z" fill="#FFFFFF"/>
  <path d="M 80 90 L 120 90 L 100 110 Z" fill="#FFD7BE"/>
  <path d="M 110 50 L 130 50 L 120 30 Z" fill="#FFD7BE"/>
  
  <!-- wheels spin -->
  <animateTransform attributeName="transform" type="rotate" from="0 60 140" to="360 60 140" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="rotate" from="0 140 140" to="360 140 140" dur="2s" repeatCount="indefinite"/>
</svg>