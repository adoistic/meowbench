<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .stroke2 { stroke-width: 2; }
      .stroke4 { stroke-width: 4; }
      .gray { fill: #ccc; }
      .black { fill: #000; }
      .white { fill: #fff; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="400" fill="#f0f0f0" rx="10" />
  <!-- bicycle -->
  <circle cx="250" cy="150" r="40" fill="#ccc" stroke="#000" class="stroke4" />
  <circle cx="250" cy="250" r="40" fill="#ccc" stroke="#000" class="stroke4" />
  <rect x="200" y="180" width="100" height="10" fill="#ccc" stroke="#000" class="stroke2" />
  <rect x="220" y="190" width="60" height="10" fill="#ccc" stroke="#000" class="stroke2" transform="rotate(-45 250 200)" />
  <rect x="220" y="210" width="60" height="10" fill="#ccc" stroke="#000" class="stroke2" transform="rotate(45 250 210)" />
  <!-- cat -->
  <path d="M 260 80 C 260 80, 280 70, 290 80 S 310 90, 300 100" fill="#fff" stroke="#000" class="stroke2" />
  <circle cx="280" cy="50" r="20" fill="#fff" stroke="#000" class="stroke2" />
  <ellipse cx="280" cy="40" rx="15" ry="10" fill="#000" />
  <path d="M 270 60 L 280 70 L 290 60" fill="#000" />
  <path d="M 250 80 L 260 90 L 270 80" fill="#000" />
  <path d="M 310 80 L 300 90 L 290 80" fill="#000" />
  <path d="M 290 100 L 310 110 L 290 120" fill="#000" />
  <!-- spotlight -->
  <circle cx="280" cy="260" r="30" fill="#ffff00" opacity=".5" />
</svg>