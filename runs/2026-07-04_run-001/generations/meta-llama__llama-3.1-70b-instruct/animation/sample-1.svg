<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" preserveAspectRatio="xMinYMin meet">
  <!-- cat's body -->
  <circle cx="50" cy="40" r="30" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- cat's head -->
  <circle cx="50" cy="20" r="20" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- cat's tail -->
  <path id="tail" d="M 80 60 C 90 50, 95 60, 85 70" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 80 60" to="10 80 60" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- whiskers -->
  <line x1="40" y1="25" x2="45" y2="20" stroke="#000" stroke-width="2"/>
  <line x1="60" y1="25" x2="55" y2="20" stroke="#000" stroke-width="2"/>
  <!-- eyes and nose -->
  <circle cx="45" cy="15" r="2" fill="#000"/>
  <circle cx="55" cy="15" r="2" fill="#000"/>
  <circle cx="50" cy="25" r="1" fill="#000"/>
</svg>