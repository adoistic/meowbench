<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- body -->
  <g>
    <path d="M150 200c-30 0-55-20-55-45s25-45 55-45 55 20 55 45-25 45-55 45z" fill="#F7F4C9" />
    <path d="M150 200c-20 0-35-10-35-25s15-25 35-25 35 10 35 25-15 25-35 25z" fill="#FFC499" />
    <path d="M150 200c-15 0-25-5-25-15s10-15 25-15 25 5 25 15-10 15-25 15z" fill="#FFA07A" />
  </g>

  <!-- head -->
  <g transform="translate(150 120)">
    <circle cx="0" cy="0" r="40" fill="#F7F4C9" />
    <circle cx="0" cy="-10" r="20" fill="#FFC499" />
    <circle cx="0" cy="-10" r="10" fill="#FFA07A" />
  </g>

  <!-- ears -->
  <g transform="translate(150 80)">
    <path d="M-30 0L-20 20L-10 0Z" fill="#F7F4C9" transform="rotate(45)" />
    <path d="M-30 0L-20 20L-10 0Z" fill="#FFC499" transform="rotate(45) scale(0.8)" />
    <path d="M-30 0L-20 20L-10 0Z" fill="#FFA07A" transform="rotate(45) scale(0.6)" />
    <path d="M30 0L20 20L10 0Z" fill="#F7F4C9" transform="rotate(-45)" />
    <path d="M30 0L20 20L10 0Z" fill="#FFC499" transform="rotate(-45) scale(0.8)" />
    <path d="M30 0L20 20L10 0Z" fill="#FFA07A" transform="rotate(-45) scale(0.6)" />
  </g>

  <!-- whiskers -->
  <g stroke="#FFA07A" stroke-width="2">
    <path d="M130 120h-20" />
    <path d="M170 120h20" />
    <path d="M120 130v-20" />
    <path d="M180 130v-20" />
  </g>

  <!-- eyes -->
  <g transform="translate(150 100)">
    <circle cx="-20" cy="0" r="8" fill="#2F4F4F" />
    <circle cx="20" cy="0" r="8" fill="#2F4F4F" />
  </g>

  <!-- nose -->
  <circle cx="150" cy="110" r="5" fill="#FFA07A" />
</svg>