<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="250" cy="200" rx="120" ry="80" fill="#964B00" />
  <!-- Fur texture -->
  <defs>
    <pattern id="fur" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="10" height="10" fill="#432B1A" />
      <rect x="2" y="2" width="6" height="6" fill="#786C3B" />
    </pattern>
  </defs>
  <ellipse cx="250" cy="200" rx="120" ry="80" fill="url(#fur)" />
  <!-- Head -->
  <ellipse cx="250" cy="120" rx="60" ry="40" fill="#964B00" />
  <!-- Whiskers -->
  <line x1="220" y1="100" x2="200" y2="80" stroke="#fff" stroke-width="2" />
  <line x1="280" y1="100" x2="300" y2="80" stroke="#fff" stroke-width="2" />
  <!-- Eyes -->
  <circle cx="230" cy="110" r="10" fill="#00a0e6" />
  <circle cx="270" cy="110" r="10" fill="#00a0e6" />
  <circle cx="230" cy="110" r="5" fill="#fff" />
  <circle cx="270" cy="110" r="5" fill="#fff" />
  <!-- Nose -->
  <circle cx="250" cy="130" r="5" fill="#ff9900" />
  <!-- Mouth -->
  <path d="M 240 140 C 240 150, 260 150, 260 140" stroke="#000" stroke-width="2" fill="none" />
  <!-- Ears -->
  <polygon points="200,80 220,60 240,80" fill="#964B00" />
  <polygon points="260,80 280,60 300,80" fill="#964B00" />
  <!-- Paws -->
  <rect x="180" y="240" width="40" height="20" fill="#964B00" />
  <rect x="280" y="240" width="40" height="20" fill="#964B00" />
  <!-- Tail -->
  <path d="M 250 280 C 250 300, 220 320, 200 340" stroke="#964B00" stroke-width="20" fill="none" />
</svg>