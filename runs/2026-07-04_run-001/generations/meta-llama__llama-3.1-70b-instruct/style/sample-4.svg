<svg width="200" height="250" viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
  <!-- body -->
  <rect x="65" y="40" width="70" height="120" fill="#F7D2C4" rx="10"/>
  <!-- head -->
  <rect x="75" y="10" width="50" height="30" fill="#F7D2C4" rx="5"/>
  <!-- ears -->
  <polygon points="90,5 95,0 100,5" fill="#F7D2C4"/>
  <polygon points="110,5 105,0 100,5" fill="#F7D2C4"/>
  <!-- legs -->
  <rect x="60" y="160" width="10" height="30" fill="#964B00" rx="2"/>
  <rect x="130" y="160" width="10" height="30" fill="#964B00" rx="2"/>
  <!-- tail -->
  <path d="M 120 180 Q 140 200 120 220" stroke="#964B00" stroke-width="10" fill="none"/>
  <!-- whiskers -->
  <line x1="85" y1="25" x2="95" y2="35" stroke="#964B00" stroke-width="2"/>
  <line x1="115" y1="25" x2="105" y2="35" stroke="#964B00" stroke-width="2"/>
  <!-- eyes -->
  <circle cx="90" cy="20" r="5" fill="#000000"/>
  <circle cx="110" cy="20" r="5" fill="#000000"/>
  <!-- nose -->
  <rect x="100" y="25" width="5" height="5" fill="#000000"/>
  <!-- mouth -->
  <path d="M 105 30 Q 100 35 95 30" stroke="#000000" stroke-width="2" fill="none"/>
</svg>