<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Bicycle -->
  <g fill="#666" stroke="#333" stroke-width="2">
    <circle cx="150" cy="350" r="30" />
    <circle cx="250" cy="350" r="30" />
    <rect x="120" y="280" width="160" height="10" rx="2" />
    <path d="M 150 280 L 120 230 L 150 230 Z" />
    <path d="M 250 280 L 280 230 L 250 230 Z" />
    <line x1="150" y1="230" x2="250" y2="230" stroke-width="5" />
    <line x1="200" y1="230" x2="200" y2="180" stroke-width="5" />
  </g>

  <!-- Cat -->
  <g fill="#ccc" stroke="#333" stroke-width="2">
    <circle cx="200" cy="150" r="50" />
    <path d="M 180 120 L 150 100 L 170 90 L 200 100 Z" />
    <path d="M 220 120 L 250 100 L 230 90 L 200 100 Z" />
    <circle cx="185" cy="140" r="10" fill="#333" />
    <circle cx="215" cy="140" r="10" fill="#333" />
    <path d="M 200 170 L 200 180" stroke="#333" stroke-width="5" />
  </g>

  <!-- Pedals -->
  <g fill="#666" stroke="#333" stroke-width="2">
    <circle cx="150" cy="340" r="10" />
    <circle cx="250" cy="340" r="10" />
    <line x1="150" y1="340" x2="140" y2="330" stroke-width="2" />
    <line x1="250" y1="340" x2="260" y2="330" stroke-width="2" />
  </g>
</svg>