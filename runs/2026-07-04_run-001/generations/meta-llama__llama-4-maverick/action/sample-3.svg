<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Bicycle -->
  <g fill="#666" stroke="#333" stroke-width="2">
    <circle cx="150" cy="350" r="30" />
    <circle cx="250" cy="350" r="30" />
    <rect x="120" y="280" width="160" height="10" rx="5" />
    <path d="M 150 280 L 120 230 L 140 220 L 160 230 Z" />
    <path d="M 250 280 L 280 230 L 260 220 L 240 230 Z" />
    <path d="M 180 250 L 220 250 L 230 270 L 170 270 Z" fill="#999" />
  </g>

  <!-- Cat -->
  <g fill="#ccc" stroke="#333" stroke-width="2">
    <circle cx="200" cy="220" r="40" />
    <path d="M 180 200 L 160 180 L 170 160 L 200 180 Z" />
    <path d="M 220 200 L 240 180 L 230 160 L 200 180 Z" />
    <circle cx="190" cy="210" r="10" fill="#000" />
    <circle cx="210" cy="210" r="10" fill="#000" />
    <path d="M 200 230 L 200 250" stroke="#000" stroke-width="5" />
  </g>

  <!-- Handlebars -->
  <path d="M 200 250 L 200 270 L 220 290" stroke="#333" stroke-width="5" fill="none" />
  <path d="M 200 270 L 180 290" stroke="#333" stroke-width="5" fill="none" />

  <!-- Pedals -->
  <g fill="#999" stroke="#333" stroke-width="2">
    <circle cx="150" cy="365" r="10" />
    <circle cx="250" cy="365" r="10" />
  </g>
</svg>