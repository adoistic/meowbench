<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- CSS Animation for the tail -->
  <style>
    .tail {
      /* Pivot point at the base of the tail (where it meets the body) */
      transform-origin: 255px 265px;
      animation: sway 1.5s ease-in-out infinite alternate;
    }
    @keyframes sway {
      from { transform: rotate(-15deg); }
      to { transform: rotate(15deg); }
    }
  </style>

  <!-- Tail (Drawn first so it appears behind the body) -->
  <path class="tail" d="M 255 265 Q 330 265 350 190" stroke="#333" stroke-width="16" fill="none" stroke-linecap="round" />

  <!-- Back Legs -->
  <ellipse cx="160" cy="310" rx="12" ry="20" fill="#333" />
  <ellipse cx="270" cy="310" rx="12" ry="20" fill="#333" />

  <!-- Body -->
  <ellipse cx="220" cy="270" rx="75" ry="50" fill="#333" />
  
  <!-- Belly Patch -->
  <ellipse cx="220" cy="280" rx="45" ry="30" fill="#555" />

  <!-- Front Legs -->
  <ellipse cx="185" cy="320" rx="12" ry="20" fill="#333" />
  <ellipse cx="245" cy="320" rx="12" ry="20" fill="#333" />

  <!-- Head Group -->
  <g id="head">
    <!-- Ears -->
    <path d="M 145 210 L 135 165 L 170 195 Z" fill="#333" />
    <path d="M 195 210 L 205 165 L 170 195 Z" fill="#333" />
    
    <!-- Face Shape -->
    <circle cx="170" cy="220" r="42" fill="#333" />
    
    <!-- Eyes -->
    <circle cx="155" cy="215" r="9" fill="#ffdb58" />
    <circle cx="185" cy="215" r="9" fill="#ffdb58" />
    <!-- Pupils -->
    <ellipse cx="155" cy="215" rx="2.5" ry="7" fill="black" />
    <ellipse cx="185" cy="215" rx="2.5" ry="7" fill="black" />
    <!-- Eye Shine -->
    <circle cx="152" cy="212" r="2" fill="white" opacity="0.8"/>
    <circle cx="182" cy="212" r="2" fill="white" opacity="0.8"/>

    <!-- Nose -->
    <path d="M 166 238 L 174 238 L 170 244 Z" fill="pink" />
    
    <!-- Mouth -->
    <path d="M 170 244 Q 160 252 155 248" stroke="pink" stroke-width="1.5" fill="none" />
    <path d="M 170 244 Q 180 252 185 248" stroke="pink" stroke-width="1.5" fill="none" />
    
    <!-- Whiskers -->
    <g stroke="white" stroke-width="1" opacity="0.5">
        <line x1="140" y1="235" x2="110" y2="230" />
        <line x1="140" y1="240" x2="105" y2="240" />
        <line x1="140" y1="245" x2="110" y2="250" />
        
        <line x1="200" y1="235" x2="230" y2="230" />
        <line x1="200" y1="240" x2="235" y2="240" />
        <line x1="200" y1="245" x2="230" y2="250" />
    </g>
  </g>
</svg>