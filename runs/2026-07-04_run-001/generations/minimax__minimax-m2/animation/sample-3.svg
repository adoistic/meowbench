<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    /* Define the swaying animation for the tail */
    .tail-sway {
      transform-origin: 135px 130px;
      animation: sway 2s ease-in-out infinite alternate;
    }

    @keyframes sway {
      from {
        transform: rotate(-15deg);
      }
      to {
        transform: rotate(15deg);
      }
    }
  </style>

  <!-- Ground Shadow -->
  <ellipse cx="100" cy="175" rx="50" ry="5" fill="#e0e0e0" />

  <!-- Tail (Drawn first so it appears behind the body) -->
  <path class="tail-sway" d="M135,130 Q165,130 165,90" fill="none" stroke="#333" stroke-width="14" stroke-linecap="round" />

  <!-- Body -->
  <ellipse cx="100" cy="135" rx="45" ry="40" fill="#333" />

  <!-- Legs -->
  <path d="M75,160 L75,175" stroke="#333" stroke-width="12" stroke-linecap="round" />
  <path d="M125,160 L125,175" stroke="#333" stroke-width="12" stroke-linecap="round" />

  <!-- Head -->
  <circle cx="100" cy="95" r="35" fill="#333" />

  <!-- Ears -->
  <path d="M75,75 L70,40 L95,65 Z" fill="#333" />
  <path d="M125,75 L130,40 L105,65 Z" fill="#333" />

  <!-- Face -->
  <!-- Eyes -->
  <circle cx="88" cy="90" r="4" fill="#fff" />
  <circle cx="112" cy="90" r="4" fill="#fff" />
  
  <!-- Nose -->
  <polygon points="97,100 103,100 100,105" fill="#pink" />
  
  <!-- Mouth -->
  <path d="M100,105 Q95,110 90,105" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" />
  <path d="M100,105 Q105,110 110,105" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" />
  
  <!-- Whiskers -->
  <line x1="80" y1="100" x2="60" y2="95" stroke="#555" stroke-width="1" />
  <line x1="80" y1="105" x2="60" y2="105" stroke="#555" stroke-width="1" />
  <line x1="120" y1="100" x2="140" y2="95" stroke="#555" stroke-width="1" />
  <line x1="120" y1="105" x2="140" y2="105" stroke="#555" stroke-width="1" />
</svg>