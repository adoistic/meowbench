<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Fur Gradient (Body) -->
    <radialGradient id="furBodyGrad" cx="50%" cy="50%" r="70%" fx="40%" fy="30%">
      <stop offset="0%" style="stop-color:#FDB979;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#E68A4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B85C30;stop-opacity:1" />
    </radialGradient>

    <!-- Fur Gradient (Head) -->
    <radialGradient id="furHeadGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="40%">
      <stop offset="0%" style="stop-color:#FFD699;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#E68A4F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B85C30;stop-opacity:1" />
    </radialGradient>

    <!-- Eye Gradient -->
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="70%" style="stop-color:#A4C639;stop-opacity:1" />
      <stop offset="95%" style="stop-color:#4B5320;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    
    <!-- Inner Ear Gradient -->
    <linearGradient id="earInnerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCCC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B85C30;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow Filter for depth -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="2" dy="4" result="offsetBlur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Floor Shadow -->
  <ellipse cx="250" cy="440" rx="160" ry="20" fill="#000000" opacity="0.2" filter="url(#softShadow)"/>

  <!-- Tail -->
  <path d="M180 400 Q 120 420 100 350 Q 90 300 130 280 Q 150 270 160 290" 
        fill="url(#furBodyGrad)" stroke="#B85C30" stroke-width="1"/>
  <!-- Tail Stripes -->
  <path d="M115 330 Q 125 320 135 335" fill="none" stroke="#8F4A1D" stroke-width="3" opacity="0.6"/>

  <!-- Body Main -->
  <path d="M150 280 
           C 130 350 140 420 180 430 
           L 320 430 
           C 360 420 370 350 350 280 
           C 320 240 180 240 150 280 Z" 
        fill="url(#furBodyGrad)" filter="url(#softShadow)"/>

  <!-- Body Markings (Stripes) -->
  <path d="M160 280 Q 180 310 200 280" fill="none" stroke="#8F4A1D" stroke-width="4" opacity="0.5"/>
  <path d="M300 280 Q 320 310 340 280" fill="none" stroke="#8F4A1D" stroke-width="4" opacity="0.5"/>
  <path d="M220 430 L 220 380" fill="none" stroke="#8F4A1D" stroke-width="3" opacity="0.3"/>
  <path d="M280 430 L 280 380" fill="none" stroke="#8F4A1D" stroke-width="3" opacity="0.3"/>

  <!-- Rear Haunches -->
  <path d="M330 300 Q 370 350 360 410 Q 340 430 300 400" fill="url(#furBodyGrad)"/>

  <!-- Front Paws -->
  <ellipse cx="190" cy="430" rx="25" ry="15" fill="#E68A4F"/>
  <ellipse cx="310" cy="430" rx="25" ry="15" fill="#E68A4F"/>

  <!-- Head Group -->
  <g transform="translate(0, -10)">
    <!-- Ears -->
    <path d="M160 160 L 140 80 L 200 130 Z" fill="url(#furBodyGrad)" stroke="#B85C30" stroke-width="1"/>
    <path d="M160 160 L 140 80 L 170 150 Z" fill="url(#earInnerGrad)"/> <!-- Left Ear Inner -->
    
    <path d="M340 160 L 360 80 L 300 130 Z" fill="url(#furBodyGrad)" stroke="#B85C30" stroke-width="1"/>
    <path d="M340 160 L 360 80 L 330 150 Z" fill="url(#earInnerGrad)"/> <!-- Right Ear Inner -->

    <!-- Head Shape -->
    <path d="M160 160 
             C 150 200 160 250 200 260 
             C 250 270 300 260 340 250 
             C 380 200 350 150 340 160 
             C 340 120 300 100 250 100 
             C 200 100 160 120 160 160 Z" 
          fill="url(#furHeadGrad)" filter="url(#softShadow)"/>

    <!-- Forehead Markings (Tabby M) -->
    <path d="M220 105 L 230 135 L 250 120 L 270 135 L 280 105" fill="none" stroke="#8F4A1D" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Cheek Stripes -->
    <path d="M170 220 Q 190 230 210 220" fill="none" stroke="#8F4A1D" stroke-width="3" opacity="0.7"/>
    <path d="M180 235 Q 200 245 220 235" fill="none" stroke="#8F4A1D" stroke-width="3" opacity="0.7"/>
    <path d="M330 220 Q 310 230 290 220" fill="none" stroke="#8F4A1D" stroke-width="3" opacity="0.7"/>
    <path d="M320 235 Q 300 245 280 235" fill="none" stroke="#8F4A1D" stroke-width="3" opacity="0.7"/>

    <!-- Eyes -->
    <g>
      <!-- Left Eye -->
      <path d="M190 180 Q 215 160 240 180 Q 215 200 190 180 Z" fill="#FFFFFF"/> <!-- Sclera BG -->
      <ellipse cx="215" cy="180" rx="20" ry="16" fill="url(#eyeGrad)"/>
      <ellipse cx="215" cy="180" rx="2" ry="12" fill="#000000"/> <!-- Pupil -->
      <circle cx="222" cy="174" r="3" fill="#FFFFFF" opacity="0.9"/> <!-- Highlight -->
      
      <!-- Right Eye -->
      <path d="M260 180 Q 285 160 310 180 Q 285 200 260 180 Z" fill="#FFFFFF"/>
      <ellipse cx="285" cy="180" rx="20" ry="16" fill="url(#eyeGrad)"/>
      <ellipse cx="285" cy="180" rx="2" ry="12" fill="#000000"/>
      <circle cx="292" cy="174" r="3" fill="#FFFFFF" opacity="0.9"/>
    </g>

    <!-- Nose -->
    <path d="M240 230 L 260 230 L 250 245 Z" fill="#FF9999"/>
    
    <!-- Mouth -->
    <path d="M250 245 Q 240 255 230 250" fill="none" stroke="#333" stroke-width="1.5"/>
    <path d="M250 245 Q 260 255 270 250" fill="none" stroke="#333" stroke-width="1.5"/>

    <!-- Whiskers -->
    <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.6" fill="none">
      <!-- Left Side -->
      <path d="M230 240 L 180 230"/>
      <path d="M230 245 L 180 245"/>
      <path d="M230 250 L 180 260"/>
      
      <!-- Right Side -->
      <path d="M270 240 L 320 230"/>
      <path d="M270 245 L 320 245"/>
      <path d="M270 250 L 320 260"/>
    </g>
  </g>
</svg>