<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e89866"/>
      <stop offset="100%" stop-color="#b86838"/>
    </radialGradient>
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b86838"/>
      <stop offset="100%" stop-color="#7a3f1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#fce4c4"/>

  <!-- Ground shadow -->
  <ellipse cx="200" cy="345" rx="115" ry="12" fill="#000" opacity="0.18"/>

  <!-- Tail with continuous swaying animation -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="-30 280 232; 28 280 232; -30 280 232"
      keyTimes="0; 0.5; 1"
      dur="2.5s" repeatCount="indefinite"
      calcMode="spline"
      keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"/>
    <path d="M 280 232 C 318 226 358 208 352 165 C 348 142 368 138 370 158"
          stroke="url(#tailGrad)" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Tail stripes -->
    <path d="M 305 222 L 312 232" stroke="#7a3f1a" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M 333 198 L 340 208" stroke="#7a3f1a" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Tail tip lighter -->
    <circle cx="368" cy="158" r="6" fill="#7a3f1a" opacity="0.6"/>
  </g>

  <!-- Back legs -->
  <ellipse cx="158" cy="315" rx="22" ry="28" fill="#a86030"/>
  <ellipse cx="242" cy="315" rx="22" ry="28" fill="#a86030"/>

  <!-- Front legs -->
  <ellipse cx="175" cy="320" rx="20" ry="26" fill="#c97844"/>
  <ellipse cx="225" cy="320" rx="20" ry="26" fill="#c97844"/>
  <!-- Paws -->
  <ellipse cx="175" cy="340" rx="18" ry="8" fill="#a86030"/>
  <ellipse cx="225" cy="340" rx="18" ry="8" fill="#a86030"/>

  <!-- Body -->
  <ellipse cx="200" cy="245" rx="92" ry="62" fill="url(#bodyGrad)"/>

  <!-- Body stripes -->
  <path d="M 138 220 Q 142 245 138 270" stroke="#7a3f1a" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 168 213 Q 172 240 168 268" stroke="#7a3f1a" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 232 213 Q 228 240 232 268" stroke="#7a3f1a" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 262 220 Q 258 245 262 270" stroke="#7a3f1a" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Belly -->
  <ellipse cx="200" cy="268" rx="58" ry="38" fill="#f5d4b0"/>

  <!-- Head -->
  <circle cx="200" cy="158" r="56" fill="url(#bodyGrad)"/>

  <!-- Ear stripes (on head behind ears) -->
  <path d="M 152 100 L 158 112" stroke="#7a3f1a" stroke-width="3" stroke-linecap="round"/>
  <path d="M 248 100 L 242 112" stroke="#7a3f1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Ears (outer) -->
  <path d="M 162 128 L 146 68 L 190 115 Z" fill="#a86030"/>
  <path d="M 238 128 L 254 68 L 210 115 Z" fill="#a86030"/>

  <!-- Ears (inner) -->
  <path d="M 166 120 L 156 84 L 182 112 Z" fill="#ffb590"/>
  <path d="M 234 120 L 244 84 L 218 112 Z" fill="#ffb590"/>

  <!-- Eyes outer -->
  <ellipse cx="178" cy="160" rx="11" ry="13" fill="#7cc77c"/>
  <ellipse cx="222" cy="160" rx="11" ry="13" fill="#7cc77c"/>

  <!-- Pupils -->
  <ellipse cx="178" cy="160" rx="3.5" ry="12" fill="#1a1a1a"/>
  <ellipse cx="222" cy="160" rx="3.5" ry="12" fill="#1a1a1a"/>

  <!-- Eye shine -->
  <circle cx="181" cy="154" r="2.8" fill="#fff"/>
  <circle cx="225" cy="154" r="2.8" fill="#fff"/>
  <circle cx="175" cy="166" r="1.4" fill="#fff"/>
  <circle cx="219" cy="166" r="1.4" fill="#fff"/>

  <!-- Nose -->
  <path d="M 191 176 L 209 176 L 200 186 Z" fill="#ff9eb5"/>
  <ellipse cx="200" cy="178" rx="2" ry="1" fill="#ff7a99"/>

  <!-- Mouth -->
  <path d="M 200 186 Q 192 194 184 189" stroke="#5a2a10" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 200 186 Q 208 194 216 189" stroke="#5a2a10" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="148" y1="178" x2="92" y2="170" stroke="#5a2a10" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="148" y1="184" x2="90" y2="186" stroke="#5a2a10" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="148" y1="190" x2="95" y2="202" stroke="#5a2a10" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="252" y1="178" x2="308" y2="170" stroke="#5a2a10" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="252" y1="184" x2="310" y2="186" stroke="#5a2a10" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="252" y1="190" x2="305" y2="202" stroke="#5a2a10" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Collar -->
  <path d="M 165 207 Q 200 224 235 207" stroke="#c93030" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 165 207 Q 200 224 235 207" stroke="#ff5050" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Bell -->
  <circle cx="200" cy="218" r="7" fill="#ffd700"/>
  <circle cx="200" cy="218" r="7" fill="none" stroke="#b8860b" stroke-width="1"/>
  <line x1="200" y1="213" x2="200" y2="218" stroke="#b8860b" stroke-width="1.2"/>
  <circle cx="198" cy="220" r="1" fill="#b8860b"/>
</svg>