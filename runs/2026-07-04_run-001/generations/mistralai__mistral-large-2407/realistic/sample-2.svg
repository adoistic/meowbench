<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <filter id="fur" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#f5d5ae" surfaceScale="3" result="diffLight">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="diffLight" operator="arithmetic" k1="0" k2="1" k3="0.5" k4="0"/>
    </filter>
    <radialGradient id="eyeGradient" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#006644"/>
    </radialGradient>
    <linearGradient id="noseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff1e1e"/>
    </linearGradient>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="10" height="10">
      <path d="M0,0 L10,10 M5,-5 L15,5 M-5,5 L5,15" stroke="#000" stroke-width="1" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Body -->
  <path d="M250,200 Q200,180 180,220 Q160,260 180,300 Q200,340 250,320 Q300,340 320,300 Q340,260 320,220 Q300,180 250,200 Z" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>

  <!-- Head -->
  <circle cx="250" cy="150" r="60" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>

  <!-- Ears -->
  <path d="M210,100 Q220,80 240,90 Q260,80 270,100 L250,120 Z" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>
  <path d="M290,100 Q280,80 260,90 Q240,80 230,100 L250,120 Z" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>
  <path d="M215,105 Q225,90 240,95 Q255,90 265,105 L250,120 Z" fill="#d4a574" opacity="0.5"/>
  <path d="M285,105 Q275,90 260,95 Q245,90 235,105 L250,120 Z" fill="#d4a574" opacity="0.5"/>

  <!-- Eyes -->
  <ellipse cx="230" cy="145" rx="12" ry="15" fill="white" stroke="#333" stroke-width="0.5"/>
  <ellipse cx="270" cy="145" rx="12" ry="15" fill="white" stroke="#333" stroke-width="0.5"/>
  <circle cx="230" cy="145" r="6" fill="url(#eyeGradient)"/>
  <circle cx="270" cy="145" r="6" fill="url(#eyeGradient)"/>
  <circle cx="233" cy="142" r="2" fill="black"/>
  <circle cx="273" cy="142" r="2" fill="black"/>

  <!-- Nose -->
  <path d="M250,160 Q245,165 250,170 Q255,165 250,160 Z" fill="url(#noseGradient)"/>

  <!-- Mouth -->
  <path d="M250,170 Q245,175 250,180" stroke="#333" stroke-width="1" fill="none"/>
  <path d="M250,170 Q255,175 250,180" stroke="#333" stroke-width="1" fill="none"/>

  <!-- Whiskers -->
  <line x1="220" y1="165" x2="180" y2="160" stroke="#333" stroke-width="0.5"/>
  <line x1="220" y1="170" x2="180" y2="170" stroke="#333" stroke-width="0.5"/>
  <line x1="220" y1="175" x2="180" y2="180" stroke="#333" stroke-width="0.5"/>
  <line x1="280" y1="165" x2="320" y2="160" stroke="#333" stroke-width="0.5"/>
  <line x1="280" y1="170" x2="320" y2="170" stroke="#333" stroke-width="0.5"/>
  <line x1="280" y1="175" x2="320" y2="180" stroke="#333" stroke-width="0.5"/>

  <!-- Front legs -->
  <path d="M200,300 Q180,320 180,350 Q180,380 200,380 L220,380 Q220,350 220,320 Z" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>
  <path d="M280,300 Q300,320 300,350 Q300,380 280,380 L260,380 Q260,350 260,320 Z" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>

  <!-- Paws -->
  <ellipse cx="210" cy="380" rx="15" ry="8" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>
  <ellipse cx="270" cy="380" rx="15" ry="8" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>

  <!-- Tail -->
  <path d="M320,220 Q350,200 380,220 Q400,240 380,260 Q360,280 340,260 Q330,250 320,220 Z" fill="#f5d5ae" filter="url(#fur)" stroke="#d4a574" stroke-width="1"/>

  <!-- Fur texture overlay -->
  <rect width="100%" height="100%" fill="url(#stripes)" opacity="0.3"/>

  <!-- Shadow -->
  <ellipse cx="250" cy="390" rx="80" ry="15" fill="#333" opacity="0.2"/>
</svg>