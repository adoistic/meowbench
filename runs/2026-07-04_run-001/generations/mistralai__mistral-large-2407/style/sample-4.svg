<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="foldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9f9f9" />
      <stop offset="100%" stop-color="#e0e0e0" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="1" flood-color="rgba(0,0,0,0.3)" />
    </filter>
  </defs>

  <!-- Head -->
  <polygon points="100,30 140,60 130,100 70,100 60,60" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" filter="url(#shadow)" />
  <polygon points="100,30 140,60 135,50" fill="#e8e8e8" stroke="#333" stroke-width="0.5" />
  <polygon points="100,30 60,60 65,50" fill="#e8e8e8" stroke="#333" stroke-width="0.5" />

  <!-- Ears -->
  <polygon points="140,60 160,40 145,55" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" />
  <polygon points="60,60 40,40 55,55" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" />
  <polygon points="160,40 150,30 145,55" fill="#e8e8e8" stroke="#333" stroke-width="0.5" />
  <polygon points="40,40 50,30 55,55" fill="#e8e8e8" stroke="#333" stroke-width="0.5" />

  <!-- Body -->
  <polygon points="70,100 130,100 150,150 50,150" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" filter="url(#shadow)" />
  <polygon points="130,100 150,150 140,140" fill="#e8e8e8" stroke="#333" stroke-width="0.5" />
  <polygon points="70,100 50,150 60,140" fill="#e8e8e8" stroke="#333" stroke-width="0.5" />

  <!-- Legs -->
  <polygon points="70,150 80,170 90,150" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" />
  <polygon points="110,150 120,170 130,150" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" />
  <polygon points="50,150 60,170 70,150" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" />
  <polygon points="130,150 140,170 150,150" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" />

  <!-- Tail -->
  <polygon points="150,150 170,140 165,160" fill="url(#foldGradient)" stroke="#333" stroke-width="0.5" />
  <polygon points="170,140 180,130 165,160" fill="#e8e8e8" stroke="#333" stroke-width="0.5" />

  <!-- Eyes -->
  <circle cx="85" cy="70" r="5" fill="#333" />
  <circle cx="115" cy="70" r="5" fill="#333" />

  <!-- Nose -->
  <polygon points="100,80 95,85 105,85" fill="#333" />

  <!-- Whiskers -->
  <line x1="90" y1="85" x2="70" y2="80" stroke="#333" stroke-width="0.5" />
  <line x1="90" y1="85" x2="70" y2="90" stroke="#333" stroke-width="0.5" />
  <line x1="110" y1="85" x2="130" y2="80" stroke="#333" stroke-width="0.5" />
  <line x1="110" y1="85" x2="130" y2="90" stroke="#333" stroke-width="0.5" />

  <!-- Fold lines -->
  <line x1="100" y1="30" x2="100" y2="100" stroke="#333" stroke-width="0.3" stroke-dasharray="2,2" />
  <line x1="100" y1="100" x2="100" y2="150" stroke="#333" stroke-width="0.3" stroke-dasharray="2,2" />
  <line x1="70" y1="100" x2="130" y2="100" stroke="#333" stroke-width="0.3" stroke-dasharray="2,2" />
</svg>