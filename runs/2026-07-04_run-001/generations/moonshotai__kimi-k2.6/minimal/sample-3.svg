<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
    <defs>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="12" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.08"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #EAEAE3; }
        svg { display: block; width: 100vw; height: 100vh; }
    </style>

    <g id="atmosphere">
        <circle cx="250" cy="250" r="210" fill="#FFFAF0"/>
        <circle cx="250" cy="250" r="200" fill="#FFE4C4" opacity="0.3"/>
    </g>

    <g id="cat" transform="translate(250, 290)">
        
        <g id="tail">
            <path d="M 110,20 C 160,20 160,-120 95,-110" fill="none" stroke="#A2A938" stroke-width="18" stroke-linecap="round"/>
        </g>

        <g id="body">
            <path d="M -80,-50 C -80,55 -50,100 0,110 C 50,100 85,55 85,-50 Z" fill="#A2A938"/>
        </g>

        <g id="head">
            <rect x="-75" y="-125" width="150" height="110" rx="55" ry="55" fill="#A2A938"/>
            
            <g id="ears">
                <circle cx="-75" cy="-125" r="24" fill="#A2A938"/>
                <circle cx="-75" cy="-125" r="12" fill="#FFFFFF"/>
                
                <circle cx="75" cy="-125" r="24" fill="#A2A938"/>
                <circle cx="75" cy="-125" r="12" fill="#FFFFFF"/>
            </g>
        </g>

        <g id="face">
            <g id="eyes">
                <rect x="-52" y="-95" width="24" height="32" rx="10" fill="#FFFFFF"/>
                <rect x="-42" y="-87" width="14" height="16" rx="7" fill="#202020" class="pupils"/>
                
                <rect x="28" y="-95" width="24" height="32" rx="10" fill="#FFFFFF"/>
                <rect x="28" y="-87" width="14" height="16" rx="7" fill="#202020" class="pupils"/>
                
                <g id="highlight-l">
                    <circle cx="-36" cy="-91" r="3.5" fill="#FFFFFF"/>
                    <circle cx="-40" cy="-83" r="1.5" fill="#FFFFFF"/>
                </g>
                <g id="highlight-r">
                    <circle cx="41" cy="-91" r="3.5" fill="#FFFFFF"/>
                    <circle cx="37" cy="-83" r="1.5" fill="#FFFFFF"/>
                </g>
            </g>

            <g id="nose">
                <polygon points="-6,-61 6,-61 0,-54" fill="#FF8696"/>
            </g>

            <g id="mouth">
                <path d="M 0,-54 Q -12,-44 -22,-52" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
                <path d="M 0,-54 Q 12,-44 22,-52" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
            </g>

            <g id="whiskers">
                <line x1="-22" y1="-52" x2="-75" y2="-65" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
                <line x1="-22" y1="-52" x2="-80" y2="-48" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
                <line x1="-22" y1="-52" x2="-75" y2="-35" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

                <line x1="22" y1="-52" x2="75" y2="-65" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
                <line x1="22" y1="-52" x2="80" y2="-48" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
                <line x1="22" y1="-52" x2="75" y2="-35" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
            </g>
        </g>

        <g id="arms">
            <path d="M -65,25 Q -90,50 -55,80" fill="none" stroke="#A2A938" stroke-width="16" stroke-linecap="round"/>
            <path d="M 65,25 Q 90,50 55,80" fill="none" stroke="#A2A938" stroke-width="16" stroke-linecap="round"/>
        </g>

        <g id="feet">
            <rect x="-55" y="75" width="36" height="20" rx="10" fill="#FFFFFF"/>
            <rect x="19" y="75" width="36" height="20" rx="10" fill="#FFFFFF"/>
        </g>

        <g id="chest">
            <rect x="-22" y="-25" width="44" height="60" rx="22" ry="22" fill="#FFFFFF"/>
            
            <g stroke="#E8E8D8" stroke-width="2.5" stroke-linecap="round" fill="none">
                <path d="M 0,-10 L 0,30"/>
                <path d="M -11,0 Q 0,5 11,0"/>
                <path d="M -15,10 Q 0,15 15,10"/>
                <path d="M -11,20 Q 0,25 11,20"/>
            </g>
        </g>

    </g>

    <animateTransform 
        xlink:href="#cat"
        attributeName="transform" 
        type="translate" 
        values="250, 295; 250, 280; 250, 295" 
        dur="4s" 
        repeatCount="indefinite"/>

    <animateTransform 
        xlink:href="#face"
        attributeName="transform" 
        type="translate" 
        values="0, 0; 0, -5; 0, 0" 
        dur="4s" 
        repeatCount="indefinite"/>

    <g id="hearts" filter="url(#shadow)">
        <path d="M -10,-15 C -25,-30 -45,0 -10,20 C 25,0 5,-30 -10,-15" fill="#FF6B81"/>
        <path d="M -10,-15 C -25,-30 -45,0 -10,20 C 25,0 5,-30 -10,-15" fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linejoin="round"/>
    </g>

    <animateMotion xlink:href="#hearts" dur="3s" repeatCount="indefinite" path="M 0,0 Q 20,-60 0,-120" />
    <animateTransform xlink:href="#hearts" attributeName="transform" type="scale" values="1;1.8;1.8" dur="3s" repeatCount="indefinite" additive="sum"/>
    <animate xlink:href="#hearts" attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>

    <script>
        <![CDATA[
            document.addEventListener('DOMContentLoaded', () => {
                const svg = document.querySelector('svg');
                const pupils = document.querySelectorAll('.pupils');
                const headGroup = document.getElementById('head');
                const eyesGroup = document.getElementById('eyes');

                const headRect = headGroup.getBoundingClientRect();
                const eyesBounds = eyesGroup.getBoundingClientRect();
                
                const leftEyeBase = { x: -42 + 250, y: -87 + 290 }; 
                const rightEyeBase = { x: 28 + 250, y: -87 + 290 };
                const maxDist = 6;

                document.addEventListener('mousemove', (e) => {
                    const svgRect = svg.getBoundingClientRect();
                    
                    const mx = e.clientX - svgRect.left;
                    const my = e.clientY - svgRect.top;

                    const updatePupil = (pupil, base) => {
                        const dx = mx - base.x;
                        const dy = my - base.y;
                        const angle = Math.atan2(dy, dx);
                        const dist = Math.min(Math.hypot(dx, dy) / 25, maxDist);
                        
                        const tx = Math.cos(angle) * dist;
                        const ty = Math.sin(angle) * dist;

                        pupil.setAttribute('transform', `translate(${tx}, ${ty})`);
                    };

                    updatePupil(pupils[0], leftEyeBase);
                    updatePupil(pupils[1], rightEyeBase);
                });
            });
        ]]>
    </script>
</svg>