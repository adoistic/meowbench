  <!-- Dark Base Body Shape -->
  <path d="M 140,230 L 340,230 Q 425,230 425,320 L 410,520 L 410,580 Q 410,600 380,600 L 115,600 Q 85,600 85,580 L 80,520 Q 65,420 80,320 Z" fill="#1F2329" opacity="0.9"/>

