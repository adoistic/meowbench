  <line x1="235" y1="262" x2="245" y2="260" stroke="#6B2B3F" stroke-width="2" stroke-linecap="round"/>
  <line x1="265" y1="262" x2="255" y2="260" stroke="#6B2B3F" stroke-width="2" stroke-linecap="round"/>
  <path d="M 250,275 L 250,285" stroke="#1F2329" stroke-width="2" fill="none"/>
  <path d="M 250,275 L 250,290" stroke="#E2E6EB" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Mouth -->
  <path d="M 250,290 C 230,295 225,305 215,310" stroke="#1F2329" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M 250,290 C 270,295 275,305 285,310" stroke="#1F2329" stroke-width="2" stroke-linecap="round" fill="none"/>
  
  <path d="M 250,280 C 240,285 225,280 220,270" stroke="#1F2329" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M 250,280 C 260,285 275,280 280,270" stroke="#1F2329" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>

