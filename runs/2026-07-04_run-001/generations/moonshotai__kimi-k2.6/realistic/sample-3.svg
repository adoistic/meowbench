  <path d="M 320,235 C 335,220 350,200 355,180" stroke="#1F2329" stroke-width="3" fill="none" opacity="0.3"/>

  <path d="M 180,255 C 170,235 160,210 160,190" stroke="#8A93A0" stroke-width="2" fill="none" opacity="0.2"/>
  <path d="M 320,255 C 330,235 340,210 340,190" stroke="#8A93A0" stroke-width="2" fill="none" opacity="0.2"/>

  <path d="M 250,100 Q 250,150 250,170" stroke="#8A93A0" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 235,110 Q 245,150 245,165" stroke="#8A93A0" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 265,110 Q 255,150 255,165" stroke="#8A93A0" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Eyes -->
