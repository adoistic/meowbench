  <path d="M 145,240 Q 250,310 355,240" stroke="#1F2329" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M 155,260 Q 250,320 345,260" stroke="#1F2329" stroke-width="2" fill="none" opacity="0.2"/>
  
  <path d="M 320,560 C 280,540 220,540 180,560" stroke="#1F2329" stroke-width="5" fill="none" opacity="0.8"/>
  <path d="M 310,545 C 280,525 220,525 190,545" stroke="#1F2329" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M 300,530 C 270,515 230,515 200,530" stroke="#1F2329" stroke-width="2" fill="none" opacity="0.3"/>

