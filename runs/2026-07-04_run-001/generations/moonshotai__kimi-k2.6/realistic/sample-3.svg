  <path d="M 325,190 C 310,180 290,188 280,200 C 285,192 310,185 325,190 Z" fill="#1E282D"/>
  <path d="M 325,190 C 310,175 290,185 280,200 C 290,210 310,210 325,190 Z" fill="url(#eye-r)"/>

  <!-- Pupils -->
  <ellipse cx="205" cy="196" rx="4" ry="10" fill="#0A0C0E"/>
  <ellipse cx="295" cy="196" rx="4" ry="10" fill="#0A0C0E"/>
  
  <!-- Catchlights -->
  <circle cx="202" cy="190" r="2.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="208" cy="198" r="1" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="292" cy="190" r="2.5" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="298" cy="198" r="1" fill="#FFFFFF" opacity="0.6"/>

  <!-- Eye Outlines and Shadows -->
  <path d="M 175,190 C 190,175 210,185 220,200" stroke="#1E282D" stroke-width="1.5" fill="none"/>
  <path d="M 220,200 C 210,210 190,210 175,190" stroke="#4D6570" stroke-width="1" fill="none"/>
  <path d="M 325,190 C 310,175 290,185 280,200" stroke="#1E282D" stroke-width="1.5" fill="none"/>
  <path d="M 280,200 C 290,210 310,210 325,190" stroke="#4D6570" stroke-width="1" fill="none"/>

