  <path d="M 90,350 C 110,420 130,480 155,480" stroke="#1F2329" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M 90,380 C 120,440 140,470 150,470" stroke="#1F2329" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
  
  <!-- Right Leg (Hind) -->
