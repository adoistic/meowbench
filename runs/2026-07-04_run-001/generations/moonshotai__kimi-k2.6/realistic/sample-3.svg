  <path d="M 85,480 C 70,440 60,390 45,375" stroke="#6A737F" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M 115,515 C 95,500 80,480 65,450" stroke="#6A737F" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>

