  <path d="M 140,565 C 150,562 160,562 170,565 C 180,563 190,565 200,565" stroke="#1F2329" stroke-width="2" fill="none" opacity="0.6"/>
  <ellipse cx="156" cy="595" rx="5" ry="4" fill="#30343C"/>
  <ellipse cx="170" cy="595" rx="4" ry="3" fill="#30343C"/>
  <ellipse cx="184" cy="595" rx="5" ry="4" fill="#30343C"/>
  <path d="M 140,595 Q 170,590 200,595" stroke="#1F2329" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Front Right Paw -->
  <rect x="292" y="545" width="76" height="55" rx="12" fill="url(#cat-grad)"/>
  <path d="M 300,565 C 310,562 320,562 330,565 C 340,563 350,565 360,565" stroke="#1F2329" stroke-width="2" fill="none" opacity="0.6"/>
  <ellipse cx="316" cy="595" rx="5" ry="4" fill="#30343C"/>
  <ellipse cx="330" cy="595" rx="4" ry="3" fill="#30343C"/>
  <ellipse cx="344" cy="595" rx="5" ry="4" fill="#30343C"/>
  <path d="M 300,595 Q 330,590 360,595" stroke="#1F2329" stroke-width="1.5" fill="none" opacity="0.3"/>

