  <path d="M 175,190 C 190,175 210,185 220,200 C 210,210 190,210 175,190 Z" fill="#4D6570"/>
  <path d="M 175,190 C 190,180 210,188 220,200 C 215,192 190,185 175,190 Z" fill="#1E282D"/>
  <path d="M 175,190 C 190,175 210,185 220,200 C 210,210 190,210 175,190 Z" fill="url(#eye-l)"/>
  
  <!-- Right Eye -->
