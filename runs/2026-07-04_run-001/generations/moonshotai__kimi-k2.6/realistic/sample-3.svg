  <path d="M 175,250 Q 135,255 85,250" stroke="#E2E6EB" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 180,260 Q 140,270 90,280" stroke="#E2E6EB" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 180,240 Q 140,220 110,200" stroke="#E2E6EB" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Whiskers (Right) -->
  <path d="M 320,240 Q 360,240 400,230" stroke="#E2E6EB" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 325,250 Q 365,255 415,250" stroke="#E2E6EB" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 320,260 Q 360,270 410,280" stroke="#E2E6EB" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 320,240 Q 360,220 390,200" stroke="#E2E6EB" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Fur tufts / blending lines for lower face -->
