<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700">
  <defs>
    <filter id="fur-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    
    <linearGradient id="cat-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2A2E35"/>
      <stop offset="20%" stop-color="#434B56"/>
      <stop offset="50%" stop-color="#5C6470"/>
      <stop offset="80%" stop-color="#373C45"/>
      <stop offset="100%" stop-color="#1F2329"/>
    </linearGradient>

    <linearGradient id="head-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#434B56"/>
      <stop offset="40%" stop-color="#5C6470"/>
      <stop offset="90%" stop-color="#2A2E35"/>
      <stop offset="100%" stop-color="#1F2329"/>
    </linearGradient>
    
    <radialGradient id="eye-l" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="50%" stop-color="#D4DEE2"/>
      <stop offset="100%" stop-color="#4D6570"/>
    </radialGradient>
    
    <radialGradient id="eye-r" cx="70%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="50%" stop-color="#D4DEE2"/>
      <stop offset="100%" stop-color="#4D6570"/>
    </radialGradient>

    <linearGradient id="chest-grad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7A8088"/>
      <stop offset="40%" stop-color="#5C6470"/>
      <stop offset="80%" stop-color="#373C45"/>
      <stop offset="100%" stop-color="#25282E"/>
    </linearGradient>

    <radialGradient id="nose-grad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFB7D1"/>
      <stop offset="100%" stop-color="#D66D8F"/>
    </radialGradient>

    <linearGradient id="tail-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1F2329"/>
      <stop offset="30%" stop-color="#4C5561"/>
      <stop offset="60%" stop-color="#2A2E35"/>
      <stop offset="100%" stop-color="#1F2329"/>
    </linearGradient>
  </defs>

  <!-- Background -->
