<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8B5A2B"/>
      <stop offset="100%" stop-color="#654321"/>
    </linearGradient>
    <linearGradient id="earGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9999"/>
      <stop offset="100%" stop-color="#CC6666"/>
    </linearGradient>
  </defs>
  
  <!-- Tail group with rotation animation -->
  <g transform="translate(280, 200)">
    <g>
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="-20;20;-20"
        dur="2s"
        repeatCount="indefinite"
        calcMode="spline"
        keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
      />
      <!-- Tail -->
      <path d="M 0 50 Q 80 20 90 -60 Q 95 -90 75 -100 Q 55 -110 45 -80 Q 40 -50 70 20 Q 50 60 0 80 Z" 
            fill="url(#bodyGrad)" stroke="#4A3728" stroke-width="2"/>
      <!-- Tail stripes -->
      <path d="M 75 -75 Q 82 -78 85 -70" stroke="#4A3728" stroke-width="3" fill="none"/>
      <path d="M 80 -50 Q 85 -52 88 -45" stroke="#4A3728" stroke-width="3" fill="none"/>
      <path d="M 65 0 Q 72 3 75 -5" stroke="#4A3728" stroke-width="3" fill="none"/>
      <path d="M 40 40 Q 48 43 52 35" stroke="#4A3728" stroke-width="3" fill="none"/>
    </g>
  </g>
  
  <!-- Body -->
  <ellipse cx="200" cy="250" rx="90" ry="110" fill="url(#bodyGrad)"/>
  
  <!-- Chest/belly lighter area -->
  <ellipse cx="200" cy="270" rx="55" ry="75" fill="#A07040" opacity="0.6"/>
  
  <!-- Body stripes -->
  <path d="M 140 200 Q 160 210 150 220" stroke="#4A3728" stroke-width="4" fill="none"/>
  <path d="M 260 200 Q 240 210 250 220" stroke="#4A3728" stroke-width="4" fill="none"/>
  <path d="M 135 240 Q 155 250 145 260" stroke="#4A3728" stroke-width="4" fill="none"/>
  <path d="M 265 240 Q 245 250 255 260" stroke="#4A3728" stroke-width="4" fill="none"/>
  
  <!-- Front legs -->
  <ellipse cx="160" cy="340" rx="25" ry="35" fill="url(#bodyGrad)"/>
  <ellipse cx="240" cy="340" rx="25" ry="35" fill="url(#bodyGrad)"/>
  
  <!-- Back legs -->
  <ellipse cx="145" cy="330" rx="30" ry="25" fill="url(#bodyGrad)"/>
  <ellipse cx="255" cy="330" rx="30" ry="25" fill="url(#bodyGrad)"/>
  
  <!-- Paws -->
  <ellipse cx="160" cy="365" rx="18" ry="12" fill="#E8D5C4"/>
  <ellipse cx="240" cy="365" rx="18" ry="12" fill="#E8D5C4"/>
  <ellipse cx="140" cy="350" rx="20" ry="15" fill="#E8D5C4"/>
  <ellipse cx="260" cy="350" rx="20" ry="15" fill="#E8D5C4"/>
  
  <!-- Head -->
  <ellipse cx="200" cy="130" rx="85" ry="70" fill="url(#bodyGrad)"/>
  
  <!-- Head stripes -->
  <path d="M 160 90 L 165 110 L 170 95" fill="#4A3728"/>
  <path d="M 240 90 L 235 110 L 230 95" fill="#4A3728"/>
  <path d="M 180 80 L 185 100 L 190 85" fill="#4A3728"/>
  <path d="M 220 80 L 215 100 L 210 85" fill="#4A3728"/>
  
  <!-- Ears -->
  <path d="M 140 85 L 125 30 L 170 70 Z" fill="url(#bodyGrad)"/>
  <path d="M 145 80 L 135 45 L 160 75 Z" fill="url(#earGrad)"/>
  <path d="M 260 85 L 275 30 L 230 70 Z" fill="url(#bodyGrad)"/>
  <path d="M 255 80 L 265 45 L 240 75 Z" fill="url(#earGrad)"/>
  
  <!-- Eyes -->
  <ellipse cx="170" cy="125" rx="22" ry="25" fill="#FFF"/>
  <ellipse cx="230" cy="125" rx="22" ry="25" fill="#FFF"/>
  <ellipse cx="170" cy="125" rx="15" ry="18" fill="#228B22"/>
  <ellipse cx="230" cy="125" rx="15" ry="18" fill="#228B22"/>
  <ellipse cx="170" cy="125" rx="8" ry="10" fill="#000"/>
  <ellipse cx="230" cy="125" rx="8" ry="10" fill="#000"/>
  <circle cx="174" cy="118" r="3" fill="#FFF"/>
  <circle cx="234" cy="118" r="3" fill="#FFF"/>
  
  <!-- Blink animation -->
  <g>
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.45;0.5;0.55;1" dur="4s" repeatCount="indefinite"/>
    <rect x="140" y="95" width="60" height="60" fill="#8B5A2B"/>
    <rect x="200" y="95" width="60" height="60" fill="#8B5A2B"/>
  </g>
  
  <!-- Nose -->
  <path d="M 192 155 Q 200 150 208 155 L 200 168 Z" fill="#FFB6C1"/>
  
  <!-- Mouth -->
  <path d="M 200 168 Q 190 180 180 170" stroke="#4A3728" stroke-width="2" fill="none"/>
  <path d="M 200 168 Q 210 180 220 170" stroke="#4A3728" stroke-width="2" fill="none"/>
  
  <!-- Whiskers -->
  <g stroke="#333" stroke-width="1" fill="none">
    <path d="M 150 160 L 100 150"/>
    <path d="M 150 168 L 95 170"/>
    <path d="M 150 176 L 100 190"/>
    <path d="M 250 160 L 300 150"/>
    <path d="M 250 168 L 305 170"/>
    <path d="M 250 176 L 300 190"/>
  </g>
</svg>