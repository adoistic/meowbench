<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Cat body -->
  <g id="body">
    <path d="M50,60 C35,50 30,40 30,30 C30,20 38,15 50,15 C62,15 70,20 70,30 C70,40 65,50 50,60 Z" fill="#666666" />
    <!-- Cat face -->
    <ellipse cx="50" cy="30" rx="20" ry="25" fill="#666666" />
    <!-- Ears -->
    <path d="M30,20 L35,10 L40,20 Z" fill="#666666" />
    <path d="M60,20 L65,10 L70,20 Z" fill="#666666" />
    <!-- Eyes -->
    <circle cx="43" cy="30" r="3" fill="#333333" />
    <circle cx="57" cy="30" r="3" fill="#333333" />
    <!-- Nose -->
    <circle cx="50" cy="35" r="2" fill="#333333" />
  </g>

  <!-- Fur shading -->
  <defs>
    <radialGradient id="furGradient" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#666666" />
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="100" height="100" fill="url(#furGradient)" />
</svg>