<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="100" cy="120" rx="50" ry="50" fill="grey"/> <!-- body -->
  <circle cx="100" cy="70" r="30" fill="grey"/> <!-- head -->
  <circle cx="85" cy="65" r="5" fill="black"/> <!-- left eye -->
  <circle cx="115" cy="65" r="5" fill="black"/> <!-- right eye -->
