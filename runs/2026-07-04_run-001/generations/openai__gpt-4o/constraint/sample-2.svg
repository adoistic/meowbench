  <polygon points="130,60 115,40 100,60" fill="grey" /> <!-- right ear -->
  <ellipse cx="100" cy="170" rx="15" ry="5" fill="grey"/> <!-- left foot -->
  <ellipse cx="130" cy="170" rx="15" ry="5" fill="grey"/> <!-- right foot -->
