<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="furGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgb(200,160,130);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(130,85,60);stop-opacity:1" />
    </radialGradient>
    <filter id="furry" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="8" result="noise" />
      <feDisplacementMap in2="noise" in="SourceGraphic" scale="2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
  <g filter="url(#furry)">
    <ellipse cx="200" cy="250" rx="80" ry="120" fill="url(#furGradient)" />
    <circle cx="200" cy="150" r="50" fill="url(#furGradient)" />
    <ellipse cx="160" cy="140" rx="12" ry="18" fill="white" />
    <ellipse cx="240" cy="140" rx="12" ry="18" fill="white" />
    <circle cx="160" cy="140" r="6" fill="black" />
    <circle cx="240" cy="140" r="6" fill="black" />
    <path d="M200,180 Q220,160 240,180" stroke="black" stroke-width="2" fill="none" />
    <path d="M200,180 Q180,160 160,180" stroke="black" stroke-width="2" fill="none" />
    <path d="M190,190 Q200,200 210,190" stroke="black" stroke-width="2" fill="none" />
    <polygon points="170,90 200,60 230,90" fill="url(#furGradient)" />
    <ellipse cx="140" cy="280" rx="30" ry="15" fill="url(#furGradient)" />
    <ellipse cx="260" cy="280" rx="30" ry="15" fill="url(#furGradient)" />
    <path d="M120,290 C120,270 140,270 140,290 Z" fill="url(#furGradient)" />
    <path d="M280,290 C280,270 260,270 260,290 Z" fill="url(#furGradient)" />
  </g>
</svg>