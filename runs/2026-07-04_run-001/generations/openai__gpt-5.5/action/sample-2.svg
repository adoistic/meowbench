      <stop offset="100%" stop-color="#43b649"/>
    </linearGradient>
    <radialGradient id="wheelShine" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#e9f7ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d7ecf7" stop-opacity="0.15"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
