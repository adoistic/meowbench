      <circle cx="552" cy="415" r="86" fill="none" stroke-width="9"/>
      <circle cx="250" cy="415" r="9" fill="#283747" stroke="none"/>
      <circle cx="552" cy="415" r="9" fill="#283747" stroke="none"/>
      <g stroke-width="2.2" opacity="0.65">
        <line x1="250" y1="415" x2="250" y2="329"/>
        <line x1="250" y1="415" x2="250" y2="501"/>
        <line x1="250" y1="415" x2="164" y2="415"/>
        <line x1="250" y1="415" x2="336" y2="415"/>
        <line x1="250" y1="415" x2="189" y2="354"/>
        <line x1="250" y1="415" x2="311" y2="354"/>
        <line x1="250" y1="415" x2="189" y2="476"/>
        <line x1="250" y1="415" x2="311" y2="476"/>
        <line x1="552" y1="415" x2="552" y2="329"/>
        <line x1="552" y1="415" x2="552" y2="501"/>
        <line x1="552" y1="415" x2="466" y2="415"/>
        <line x1="552" y1="415" x2="638" y2="415"/>
        <line x1="552" y1="415" x2="491" y2="354"/>
        <line x1="552" y1="415" x2="613" y2="354"/>
        <line x1="552" y1="415" x2="491" y2="476"/>
        <line x1="552" y1="415" x2="613" y2="476"/>
      </g>
    </g>

