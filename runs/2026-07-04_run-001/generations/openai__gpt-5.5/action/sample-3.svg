<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="A cheerful cat riding a bicycle">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfefff"/>
      <stop offset="100%" stop-color="#f5fbff"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ee082"/>
      <stop offset="100%" stop-color="#55bd5c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#27463a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>
  <circle cx="660" cy="92" r="42" fill="#ffd76a"/>
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="145" cy="105" rx="55" ry="22"/>
    <ellipse cx="185" cy="103" rx="42" ry="18"/>
    <ellipse cx="106" cy="110" rx="35" ry="16"/>
    <ellipse cx="550" cy="145" rx="62" ry="23"/>
    <ellipse cx="594" cy="145" rx="42" ry="18"/>
    <ellipse cx="510" cy="150" rx="35" ry="15"/>
  </g>

  <path d="M0 455 C115 430 198 456 300 438 C412 418 511 441 625 426 C700 416 750 425 800 410 L800 600 L0 600 Z" fill="url(#grass)"/>
  <path d="M0 494 C150 470 270 492 405 476 C555 459 675 477 800 456 L800 600 L0 600 Z" fill="#3ea94f" opacity="0.35"/>

  <g filter="url(#shadow)">
