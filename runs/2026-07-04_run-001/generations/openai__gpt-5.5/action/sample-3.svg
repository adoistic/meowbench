    <ellipse cx="395" cy="306" rx="43" ry="54" transform="rotate(-9 395 306)" fill="#ffd39a" opacity="0.95"/>

    <!-- Hind leg to pedal -->
    <path d="M371 356 C388 386 416 400 444 415" fill="none" stroke="#f4a259" stroke-width="24" stroke-linecap="round"/>
    <path d="M444 415 C457 425 469 434 486 443" fill="none" stroke="#f4a259" stroke-width="18" stroke-linecap="round"/>
    <ellipse cx="492" cy="446" rx="20" ry="12" transform="rotate(25 492 446)" fill="#fff3d6" stroke="#8d5524" stroke-width="4"/>

    <!-- Front leg to handlebar -->
    <path d="M426 256 C462 262 489 276 512 285" fill="none" stroke="#f4a259" stroke-width="21" stroke-linecap="round"/>
    <ellipse cx="516" cy="285" rx="18" ry="12" transform="rotate(15 516 285)" fill="#fff3d6" stroke="#8d5524" stroke-width="4"/>

    <!-- Other legs -->
    <path d="M337 343 C321 368 309 391 302 417" fill="none" stroke="#df8d45" stroke-width="20" stroke-linecap="round"/>
    <ellipse cx="300" cy="423" rx="18" ry="11" transform="rotate(100 300 423)" fill="#fff3d6" stroke="#8d5524" stroke-width="4"/>
    <path d="M344 252 C329 284 323 309 315 337" fill="none" stroke="#df8d45" stroke-width="20" stroke-linecap="round"/>
    <ellipse cx="314" cy="341" rx="17" ry="11" transform="rotate(100 314 341)" fill="#fff3d6" stroke="#8d5524" stroke-width="4"/>

