    <path d="M303 272 C239 232 202 282 217 325 C229 359 277 348 271 318 C267 296 239 300 245 322" fill="none" stroke="#f4a259" stroke-width="28" stroke-linecap="round"/>
    <path d="M303 272 C239 232 202 282 217 325 C229 359 277 348 271 318 C267 296 239 300 245 322" fill="none" stroke="#c7773c" stroke-width="5" stroke-linecap="round" opacity="0.6"/>

