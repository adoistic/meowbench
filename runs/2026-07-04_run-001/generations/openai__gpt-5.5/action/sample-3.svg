      <line x1="444" y1="415" x2="484" y2="442" stroke="#283747" stroke-width="8"/>
      <line x1="444" y1="415" x2="404" y2="388" stroke="#283747" stroke-width="8"/>
      <circle cx="486" cy="443" r="8" fill="#283747"/>
      <circle cx="402" cy="387" r="8" fill="#283747"/>
