      <path d="M432 169 L467 110 L482 181 Z" fill="#f4a259" stroke="#8d5524" stroke-width="5" stroke-linejoin="round"/>
      <path d="M318 151 L309 126 L335 149 Z" fill="#ffb0a6"/>
      <path d="M450 160 L462 134 L468 169 Z" fill="#ffb0a6"/>
      <ellipse cx="391" cy="188" rx="91" ry="73" transform="rotate(7 391 188)" fill="#f4a259" stroke="#8d5524" stroke-width="5"/>
      <ellipse cx="386" cy="209" rx="49" ry="35" fill="#fff3d6"/>
      <circle cx="354" cy="183" r="10" fill="#1f2933"/>
      <circle cx="426" cy="188" r="10" fill="#1f2933"/>
      <circle cx="358" cy="179" r="3.5" fill="#ffffff"/>
      <circle cx="430" cy="184" r="3.5" fill="#ffffff"/>
      <path d="M391 198 L379 211 L402 213 Z" fill="#e85d75"/>
      <path d="M391 212 C386 224 372 226 364 217" fill="none" stroke="#6b3e26" stroke-width="4" stroke-linecap="round"/>
      <path d="M391 212 C396 225 411 228 421 219" fill="none" stroke="#6b3e26" stroke-width="4" stroke-linecap="round"/>
      <g stroke="#6b3e26" stroke-width="3" stroke-linecap="round">
        <line x1="347" y1="209" x2="302" y2="194"/>
        <line x1="348" y1="219" x2="300" y2="219"/>
        <line x1="350" y1="229" x2="307" y2="242"/>
        <line x1="431" y1="214" x2="477" y2="202"/>
        <line x1="430" y1="224" x2="479" y2="226"/>
        <line x1="427" y1="233" x2="469" y2="250"/>
      </g>
      <path d="M346 144 C363 132 388 129 407 137" fill="none" stroke="#8d5524" stroke-width="4" stroke-linecap="round"/>
      <path d="M337 165 C351 157 369 156 382 162" fill="none" stroke="#c7773c" stroke-width="5" stroke-linecap="round"/>
      <path d="M411 165 C427 159 443 162 455 172" fill="none" stroke="#c7773c" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- Cat stripes on body -->
    <g fill="none" stroke="#c7773c" stroke-width="6" stroke-linecap="round" opacity="0.8">
      <path d="M339 235 C358 246 381 248 402 240"/>
      <path d="M321 277 C340 287 359 291 378 286"/>
      <path d="M432 266 C416 277 405 291 402 309"/>
      <path d="M430 331 C409 343 386 349 361 344"/>
    </g>

    <!-- Scarf -->
    <path d="M322 236 C365 257 419 258 456 236" fill="none" stroke="#3a86ff" stroke-width="16" stroke-linecap="round"/>
    <path d="M443 242 C462 262 487 268 514 259" fill="none" stroke="#3a86ff" stroke-width="14" stroke-linecap="round"/>
    <path d="M463 251 L493 285 L451 277 Z" fill="#3a86ff" stroke="#1d5ec7" stroke-width="3" stroke-linejoin="round"/>

    <!-- Motion accents -->
    <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85">
      <path d="M105 352 H174"/>
      <path d="M87 388 H144"/>
      <path d="M632 332 H704"/>
      <path d="M656 369 H735"/>
    </g>
  </g>

  <g fill="#2f8f46" opacity="0.75">
    <path d="M94 512 C92 495 105 482 117 501 C113 487 126 475 137 494 C141 479 158 479 154 506 Z"/>
    <path d="M681 515 C679 498 692 485 704 504 C700 490 713 478 724 497 C728 482 745 482 741 509 Z"/>
    <path d="M33 535 C31 522 41 511 51 526 C49 515 60 506 69 522 C73 510 86 510 83 532 Z"/>
  </g>
</svg>