    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M250 415 L352 306 L444 415 Z" stroke="#e84a5f" stroke-width="14"/>
      <path d="M352 306 L552 415 L444 415 L352 306" stroke="#e84a5f" stroke-width="14"/>
      <path d="M444 415 L491 314" stroke="#e84a5f" stroke-width="14"/>
      <path d="M552 415 L512 285" stroke="#e84a5f" stroke-width="14"/>
      <path d="M512 285 C535 277 560 278 582 290" stroke="#283747" stroke-width="10"/>
      <path d="M352 306 L337 269" stroke="#283747" stroke-width="10"/>
      <path d="M312 266 L365 266" stroke="#283747" stroke-width="12"/>
