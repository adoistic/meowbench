<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Animated cat with a continuously swaying tail">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#fff8dd"/>
      <stop offset="100%" stop-color="#ffd7b8"/>
    </radialGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7a64a"/>
      <stop offset="100%" stop-color="#dd7928"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe1b3"/>
      <stop offset="100%" stop-color="#ffc37b"/>
    </linearGradient>
    <style>
      .outline {
        stroke: #5b321d;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .thin {
        stroke: #5b321d;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .tail {
        transform-origin: 326px 321px;
        transform-box: view-box;
        animation: tailSway 2.1s ease-in-out infinite;
      }
      @keyframes tailSway {
        0%, 100% { transform: rotate(-13deg); }
        50% { transform: rotate(16deg); }
      }
    </style>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <ellipse cx="256" cy="444" rx="150" ry="30" fill="#d9854a" opacity="0.25"/>

