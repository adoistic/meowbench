<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Origami-style cat with geometric folds">
  <defs>
    <linearGradient id="paperBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8ed"/>
      <stop offset="1" stop-color="#efe2d4"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10" result="offset"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.22"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .edge{stroke:#8b5b39;stroke-width:2.2;stroke-linejoin:round;stroke-linecap:round;stroke-opacity:.33}
      .fold{fill:none;stroke:#6b432a;stroke-width:2;stroke-linecap:round;stroke-opacity:.26}
      .crease{fill:none;stroke:#ffffff;stroke-width:2;stroke-linecap:round;stroke-opacity:.45}
      .face{stroke:#3f2a1d;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="800" height="800" fill="url(#paperBg)"/>
