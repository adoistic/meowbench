<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-labelledby="title desc">
  <title id="title">Origami-style geometric cat</title>
  <desc id="desc">A seated cat made from angular paper-like facets, folded triangles, crease lines, pointed ears, and an angular tail.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#e7eef7"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#23344d" flood-opacity="0.18"/>
    </filter>

    <clipPath id="tailClip">
      <path d="M500 458 L612 380 L704 438 L686 555 L592 622 L516 561 L604 516 L618 464 L524 526 Z"/>
    </clipPath>

    <clipPath id="bodyClip">
      <path d="M400 360 L286 417 L236 672 L564 672 L514 417 Z"/>
    </clipPath>

    <clipPath id="headClip">
      <path d="M260 85 L322 188 L400 155 L478 188 L540 85 L526 262 L485 376 L400 410 L315 376 L274 262 Z"/>
    </clipPath>

    <style>
      .outline{fill:none;stroke:#26364d;stroke-width:5;stroke-linejoin:round;stroke-linecap:round}
      .crease{fill:none;stroke:#ffffff;stroke-width:3;stroke-linejoin:round;stroke-linecap:round;opacity:.78}
      .valley{fill:none;stroke:#26364d;stroke-width:2;stroke-linejoin:round;stroke-linecap:round;opacity:.28;stroke-dasharray:7 8}
      .detail{fill:none;stroke:#26364d;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>
  <circle cx="400" cy="420" r="310" fill="#ffffff" opacity="0.46"/>

  <g filter="url(#softShadow)">
    <g clip-path="url(#tailClip)">
      <rect x="480" y="350" width="245" height="300" fill="#d6874f"/>
      <polygon points="500,458 612,380 618,464 524,526" fill="#e1995c"/>
      <polygon points="612,380 704,438 618,464" fill="#f0b174"/>
      <polygon points="704,438 686,555 604,516 618,464" fill="#c97943"/>
      <polygon points="604,516 686,555 592,622 516,561" fill="#de8f53"/>
      <polygon points="516,561 524,526 604,516" fill="#f2bd82"/>
      <polygon points="500,458 524,526 516,561" fill="#b9683d"/>
      <polygon points="618,464 604,516 524,526" fill="#d4824b"/>
    </g>
    <path class="outline" d="M500 458 L612 380 L704 438 L686 555 L592 622 L516 561 L604 516 L618 464 L524 526 Z"/>
    <path class="crease" d="M612 380 L618 464 L524 526 L500 458"/>
    <path class="crease" d="M618 464 L704 438"/>
    <path class="crease" d="M618 464 L604 516 L686 555"/>
    <path class="valley" d="M516 561 L604 516 L592 622"/>

    <g clip-path="url(#bodyClip)">
      <rect x="220" y="340" width="360" height="350" fill="#da8b52"/>
      <polygon points="400,360 286,417 400,480" fill="#f0aa6a"/>
      <polygon points="400,360 514,417 400,480" fill="#cf7444"/>
      <polygon points="286,417 236,672 350,555 400,480" fill="#e69457"/>
      <polygon points="514,417 564,672 450,555 400,480" fill="#bd653d"/>
      <polygon points="400,480 350,555 400,672 450,555" fill="#f5bc7d"/>
      <polygon points="236,672 350,555 400,672" fill="#c97646"/>
      <polygon points="564,672 450,555 400,672" fill="#df8a50"/>
      <polygon points="286,417 350,555 236,672" fill="#d5804c"/>
      <polygon points="514,417 450,555 564,672" fill="#a95736"/>
    </g>
    <path class="outline" d="M400 360 L286 417 L236 672 L564 672 L514 417 Z"/>
    <path class="crease" d="M400 360 L400 480 L350 555 L400 672 L450 555 L400 480 L514 417"/>
    <path class="crease" d="M286 417 L350 555 L236 672"/>
    <path class="crease" d="M514 417 L450 555 L564 672"/>
    <path class="valley" d="M286 417 L400 672 L514 417"/>

    <ellipse cx="324" cy="676" rx="78" ry="22" fill="#26364d" opacity="0.12"/>
    <ellipse cx="476" cy="676" rx="78" ry="22" fill="#26364d" opacity="0.12"/>

    <g clip-path="url(#headClip)">
      <rect x="235" y="70" width="330" height="360" fill="#e89b5e"/>
      <polygon points="260,85 322,188 274,262" fill="#d87f4b"/>
      <polygon points="260,85 292,210 322,188" fill="#f3b16f"/>
      <polygon points="540,85 478,188 526,262" fill="#c97043"/>
      <polygon points="540,85 508,210 478,188" fill="#e9985b"/>
      <polygon points="322,188 400,155 400,240" fill="#f7bd80"/>
      <polygon points="478,188 400,155 400,240" fill="#dd854f"/>
      <polygon points="274,262 322,188 400,240 350,318 315,376" fill="#efa362"/>
      <polygon points="526,262 478,188 400,240 450,318 485,376" fill="#c66b40"/>
      <polygon points="350,318 400,240 450,318 400,410" fill="#f6b879"/>
      <polygon points="315,376 350,318 400,410" fill="#d9824d"/>
      <polygon points="485,376 450,318 400,410" fill="#e59659"/>
      <polygon points="274,262 315,376 350,318" fill="#bf6540"/>
      <polygon points="526,262 485,376 450,318" fill="#b85c3b"/>
      <polygon points="306,150 292,232 322,188" fill="#f6c2a6" opacity=".8"/>
      <polygon points="494,150 508,232 478,188" fill="#eeb091" opacity=".8"/>
    </g>

    <path class="outline" d="M260 85 L322 188 L400 155 L478 188 L540 85 L526 262 L485 376 L400 410 L315 376 L274 262 Z"/>
    <path class="crease" d="M260 85 L322 188 L274 262"/>
    <path class="crease" d="M540 85 L478 188 L526 262"/>
    <path class="crease" d="M322 188 L400 240 L478 188"/>
    <path class="crease" d="M400 155 L400 240 L350 318 L400 410 L450 318 L400 240"/>
    <path class="crease" d="M274 262 L350 318 L315 376"/>
    <path class="crease" d="M526 262 L450 318 L485 376"/>
    <path class="valley" d="M322 188 L485 376"/>
    <path class="valley" d="M478 188 L315 376"/>

    <polygon points="339,275 368,267 359,292" fill="#26364d"/>
    <polygon points="461,275 432,267 441,292" fill="#26364d"/>
    <polygon points="400,309 383,329 417,329" fill="#26364d"/>
    <path class="detail" d="M400 329 L400 351"/>
    <path class="detail" d="M400 351 Q382 365 365 350"/>
    <path class="detail" d="M400 351 Q418 365 435 350"/>

    <path class="detail" d="M330 326 L255 305"/>
    <path class="detail" d="M331 344 L248 350"/>
    <path class="detail" d="M333 362 L265 396"/>
    <path class="detail" d="M470 326 L545 305"/>
    <path class="detail" d="M469 344 L552 350"/>
    <path class="detail" d="M467 362 L535 396"/>
  </g>
</svg>