<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Cat Riding a Bicycle</title>
  <desc id="desc">An orange cat with stripes rides a blue bicycle with two large wheels on a simple ground, holding the handlebar and placing paws on the pedals.</desc>

  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfeffd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="hubGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#bbb"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="500" fill="url(#skyGrad)"/>
  <rect x="0" y="440" width="800" height="60" fill="#e9f2e1"/>
  <path d="M0,440 H800" stroke="#b8c9b0" stroke-width="3" fill="none"/>

  <!-- Wheels -->
  <g id="rearWheel" transform="translate(240,360)">
    <circle r="84" fill="none" stroke="#1e1e1e" stroke-width="14"/>
    <circle r="66" fill="none" stroke="#bfbfbf" stroke-width="6"/>
    <g stroke="#bfbfbf" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-66"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(30)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(60)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(90)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(120)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(150)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(180)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(210)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(240)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(270)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(300)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(330)"/>
    </g>
    <circle r="10" fill="url(#hubGrad)" stroke="#8a8a8a" stroke-width="2"/>
  </g>

  <g id="frontWheel" transform="translate(520,360)">
    <circle r="84" fill="none" stroke="#1e1e1e" stroke-width="14"/>
    <circle r="66" fill="none" stroke="#bfbfbf" stroke-width="6"/>
    <g stroke="#bfbfbf" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-66"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(30)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(60)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(90)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(120)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(150)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(180)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(210)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(240)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(270)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(300)"/>
      <line x1="0" y1="0" x2="0" y2="-66" transform="rotate(330)"/>
    </g>
    <circle r="10" fill="url(#hubGrad)" stroke="#8a8a8a" stroke-width="2"/>
  </g>

  <!-- Bicycle frame -->
  <g id="bike" stroke-linecap="round" stroke-linejoin="round">
    <!-- tubes -->
    <g stroke="#2e86de" stroke-width="10" fill="none">
      <line x1="240" y1="360" x2="380" y2="345"/> <!-- chainstay -->
      <line x1="380" y1="345" x2="370" y2="270"/> <!-- seat tube -->
      <line x1="370" y1="270" x2="540" y2="280"/> <!-- top tube -->
      <line x1="540" y1="280" x2="380" y2="345"/> <!-- down tube -->
      <line x1="240" y1="360" x2="370" y2="270"/> <!-- seat stay -->
    </g>
    <!-- fork -->
    <g stroke="#2e86de" stroke-width="9" fill="none">
      <line x1="540" y1="280" x2="515" y2="360"/>
      <line x1="548" y1="282" x2="525" y2="360"/>
    </g>
    <!-- handlebar stem and bar -->
    <g stroke="#2b2b2b" fill="none">
      <line x1="540" y1="280" x2="552" y2="255" stroke-width="6"/>
      <path d="M515,245 Q542,230 570,245" stroke-width="8" stroke-linecap="round"/>
      <circle cx="515" cy="245" r="6" fill="#2b2b2b"/>
      <circle cx="570" cy="245" r="6" fill="#2b2b2b"/>
    </g>
    <!-- seat and post -->
    <g>
      <line x1="370" y1="270" x2="370" y2="258" stroke="#2b2b2b" stroke-width="6"/>
      <path d="M355,258 C365,248 392,248 400,258 C392,268 360,268 355,258 Z" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="2"/>
    </g>
    <!-- crankset and pedals -->
    <g id="cranks">
      <circle cx="380" cy="345" r="18" fill="#444" stroke="#222" stroke-width="3"/>
      <!-- right crank arm -->
      <line x1="380" y1="345" x2="416.3" y2="328.1" stroke="#444" stroke-width="8"/>
      <g transform="translate(416.3,328.1) rotate(-25)">
        <rect x="0" y="-4.5" width="26" height="9" rx="3" ry="3" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="1.5"/>
      </g>
      <!-- left crank arm -->
      <line x1="380" y1="345" x2="343.7" y2="361.9" stroke="#777" stroke-width="8"/>
      <g transform="translate(343.7,361.9) rotate(155)">
        <rect x="0" y="-4.5" width="26" height="9" rx="3" ry="3" fill="#2b2b2b" stroke="#1a1a1a" stroke-width="1.5"/>
      </g>
      <!-- simple chain line -->
      <path d="M365,353 L258,352" stroke="#555" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Cat -->
  <g id="cat" stroke-linecap="round" stroke-linejoin="round">
    <!-- tail behind -->
    <path d="M350,275 Q315,260 335,235 Q370,205 395,222" fill="none" stroke="#C96B2C" stroke-width="12"/>
    <!-- body -->
    <ellipse cx="420" cy="270" rx="72" ry="48" fill="#F7A85A" stroke="#C96B2C" stroke-width="4"/>
    <!-- back stripes -->
    <path d="M390,248 l-18,-10 l10,20 Z" fill="#e07c3a" opacity="0.9"/>
    <path d="M415,240 l-20,-9 l9,22 Z" fill="#e07c3a" opacity="0.9"/>
    <path d="M442,246 l-18,-10 l8,20 Z" fill="#e07c3a" opacity="0.9"/>

    <!-- head -->
    <g>
      <circle cx="470" cy="205" r="36" fill="#F7A85A" stroke="#C96B2C" stroke-width="4"/>
      <!-- ears -->
      <path d="M450,178 L460,160 L470,182 Z" fill="#F7A85A" stroke="#C96B2C" stroke-width="3"/>
      <path d="M487,178 L477,160 L467,182 Z" fill="#F7A85A" stroke="#C96B2C" stroke-width="3"/>
      <path d="M459,174 L463,168 L468,178 Z" fill="#f6b4c6" opacity="0.9"/>
      <path d="M479,174 L475,168 L470,178 Z" fill="#f6b4c6" opacity="0.9"/>
      <!-- face -->
      <ellipse cx="459" cy="197" rx="7.5" ry="6.5" fill="#fff" stroke="#C96B2C" stroke-width="2"/>
      <ellipse cx="482" cy="197" rx="7.5" ry="6.5" fill="#fff" stroke="#C96B2C" stroke-width="2"/>
      <circle cx="459" cy="198" r="3" fill="#2b2b2b"/>
      <circle cx="482" cy="198" r="3" fill="#2b2b2b"/>
      <path d="M471,206 l-6,6 l6,0" stroke="#C96B2C" stroke-width="2" fill="none"/>
      <path d="M471,206 l6,6 l-6,0" stroke="#C96B2C" stroke-width="2" fill="none"/>
      <path d="M470,202 q0,3 0,4" stroke="#C96B2C" stroke-width="2" fill="none"/>
      <circle cx="470" cy="204" r="2.4" fill="#f48aa4" stroke="#C96B2C" stroke-width="1"/>
      <!-- whiskers -->
      <g stroke="#C96B2C" stroke-width="2">
        <line x1="448" y1="205" x2="430" y2="201"/>
        <line x1="448" y1="210" x2="430" y2="214"/>
        <line x1="492" y1="205" x2="510" y2="201"/>
        <line x1="492" y1="210" x2="510" y2="214"/>
      </g>
    </g>

    <!-- arms to handlebar -->
    <path d="M405,255 Q460,235 520,245" stroke="#C96B2C" stroke-width="10" fill="none"/>
    <circle cx="520" cy="245" r="10" fill="#F7A85A" stroke="#C96B2C" stroke-width="3"/>
    <path d="M445,255 Q505,230 565,245" stroke="#C96B2C" stroke-width="10" fill="none"/>
    <circle cx="565" cy="245" r="10" fill="#F7A85A" stroke="#C96B2C" stroke-width="3"/>

    <!-- legs to pedals -->
    <path d="M420,295 Q445,330 416.3,328.1" stroke="#C96B2C" stroke-width="12" fill="none"/>
    <g transform="translate(416.3,328.1) rotate(-25)">
      <ellipse cx="12" cy="0" rx="11" ry="7" fill="#F7A85A" stroke="#C96B2C" stroke-width="3"/>
      <circle cx="14" cy="0" r="2.5" fill="#f4a6b8"/>
    </g>
    <path d="M395,300 Q360,340 343.7,361.9" stroke="#C96B2C" stroke-width="12" fill="none"/>
    <g transform="translate(343.7,361.9) rotate(155)">
      <ellipse cx="12" cy="0" rx="11" ry="7" fill="#F7A85A" stroke="#C96B2C" stroke-width="3"/>
      <circle cx="14" cy="0" r="2.5" fill="#f4a6b8"/>
    </g>

    <!-- little belly highlight -->
    <ellipse cx="420" cy="280" rx="36" ry="24" fill="#ffd1a6" opacity="0.6"/>
  </g>

  <!-- Simple wheel shadows -->
  <ellipse cx="240" cy="444" rx="78" ry="10" fill="#cfd8cf" opacity="0.6"/>
  <ellipse cx="520" cy="444" rx="78" ry="10" fill="#cfd8cf" opacity="0.6"/>
</svg>