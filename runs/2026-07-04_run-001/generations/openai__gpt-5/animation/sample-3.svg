<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eaf4ff"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- ground shadow -->
  <ellipse cx="210" cy="260" rx="120" ry="18" fill="#000" opacity="0.08"/>

  <!-- TAIL (behind the body) -->
  <g id="tail">
    <!-- outline -->
    <path d="M330 190
             C 388 140 388 70 338 80
             C 300 88 322 138 356 150" 
          fill="none" stroke="#6b3f26" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- fur -->
    <path d="M330 190
             C 388 140 388 70 338 80
             C 300 88 322 138 356 150" 
          fill="none" stroke="#f5c37a" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- subtle stripes -->
    <path d="M360 110 q12 -12 28 -6" fill="none" stroke="#e2a95e" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
    <path d="M350 132 q10 -10 24 -5" fill="none" stroke="#e2a95e" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
    <animateTransform attributeName="transform" type="rotate"
      values="-18 330 190; 16 330 190; -18 330 190"
      keyTimes="0;0.5;1"
      calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1"
      dur="3.8s" repeatCount="indefinite"/>
  </g>

  <!-- BODY -->
  <ellipse cx="220" cy="190" rx="120" ry="80" fill="#f5c37a" stroke="#6b3f26" stroke-width="4"/>
  <!-- belly patch -->
  <ellipse cx="215" cy="205" rx="65" ry="45" fill="#f8ddb4" opacity="0.9"/>

  <!-- back stripes -->
  <path d="M240 145 q35 -18 70 -6" fill="none" stroke="#e2a95e" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <path d="M230 165 q40 -16 78 -4" fill="none" stroke="#e2a95e" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- hind paw -->
  <ellipse cx="285" cy="245" rx="30" ry="18" fill="#f5c37a" stroke="#6b3f26" stroke-width="3"/>
  <!-- front paws -->
  <ellipse cx="175" cy="248" rx="20" ry="14" fill="#f5c37a" stroke="#6b3f26" stroke-width="3"/>
  <ellipse cx="205" cy="248" rx="20" ry="14" fill="#f5c37a" stroke="#6b3f26" stroke-width="3"/>

  <!-- HEAD -->
  <circle cx="150" cy="120" r="55" fill="#f5c37a" stroke="#6b3f26" stroke-width="4"/>
  <!-- ears -->
  <polygon points="105,98 134,56 154,100" fill="#f5c37a" stroke="#6b3f26" stroke-width="4" stroke-linejoin="round"/>
  <polygon points="162,100 187,56 210,95" fill="#f5c37a" stroke="#6b3f26" stroke-width="4" stroke-linejoin="round"/>
  <!-- inner ears -->
  <polygon points="118,98 134,70 147,98" fill="#f7c8b8" opacity="0.9"/>
  <polygon points="171,98 187,70 200,95" fill="#f7c8b8" opacity="0.9"/>

  <!-- face -->
  <ellipse cx="133" cy="125" rx="8" ry="12" fill="#2f2f2f"/>
  <ellipse cx="167" cy="125" rx="8" ry="12" fill="#2f2f2f"/>
  <circle cx="136" cy="121" r="2.2" fill="#fff" opacity="0.8"/>
  <circle cx="170" cy="121" r="2.2" fill="#fff" opacity="0.8"/>

  <polygon points="150,135 143,145 157,145" fill="#ef8fa1"/>

  <path d="M143 150 q7 6 14 0" fill="none" stroke="#6b3f26" stroke-width="3" stroke-linecap="round"/>
  <path d="M150 150 q-8 10 -18 8" fill="none" stroke="#6b3f26" stroke-width="3" stroke-linecap="round"/>
  <path d="M150 150 q8 10 18 8" fill="none" stroke="#6b3f26" stroke-width="3" stroke-linecap="round"/>

  <!-- whiskers -->
  <path d="M112 144 h-32" stroke="#6b3f26" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M115 150 h-36" stroke="#6b3f26" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M188 144 h32" stroke="#6b3f26" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M185 150 h36" stroke="#6b3f26" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- neck fluff -->
  <path d="M180 150 q-12 22 -42 24" fill="none" stroke="#e2a95e" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

  <!-- little connection patch to hide tail joint -->
  <circle cx="330" cy="190" r="12" fill="#f5c37a" opacity="0.95"/>
</svg>