<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="paperGrad" x1="25%" y1="15%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#f3e8d6"/>
      <stop offset="55%" stop-color="#e8d6bb"/>
      <stop offset="100%" stop-color="#d4bea0"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="4" in="SourceAlpha" result="off"/>
      <feGaussianBlur in="off" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.08  0 0 0 0.45 0" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="groundBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="catClip">
      <path d="M515,510
               L470,505
               L430,495
               L420,490
               L405,460
               L410,420
               L430,380
               L470,380
               L560,340
               L610,320
               L470,260
               L390,300
               L440,270
               L470,255
               L495,210
               L525,225
               L560,220
               L530,260
               L480,280
               L470,300
               L455,330
               L470,360
               L490,400
               L505,450 Z"/>
    </clipPath>
    <style>
      .facet0{fill:#f3e8d6}
      .facet1{fill:#ead8bd}
      .facet2{fill:#d7bea0}
      .facet3{fill:#c9b094}
      .facet4{fill:#b89e81}
      .base{fill:url(#paperGrad)}
      .fold{fill:none; stroke:#6a5945; stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round; opacity:.8}
      .dash{stroke-dasharray:7 5; opacity:.65}
      .lightfold{fill:none; stroke:#ffffff; stroke-width:1; stroke-dasharray:5 4; opacity:.55}
    </style>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="470" cy="525" rx="150" ry="20" fill="#000000" opacity="0.18" filter="url(#groundBlur)"/>

  <g filter="url(#dropShadow)">
    <!-- Silhouette base -->
    <path class="base" d="M515,510
               L470,505
               L430,495
               L420,490
               L405,460
               L410,420
               L430,380
               L470,380
               L560,340
               L610,320
               L470,260
               L390,300
               L440,270
               L470,255
               L495,210
               L525,225
               L560,220
               L530,260
               L480,280
               L470,300
               L455,330
               L470,360
               L490,400
               L505,450 Z"/>

    <!-- Facets clipped to silhouette -->
    <g clip-path="url(#catClip)">
      <!-- Head facets -->
      <polygon class="facet2" points="480,280 530,260 525,225"/>
      <polygon class="facet3" points="480,280 525,225 495,210"/>
      <polygon class="facet1" points="530,260 560,220 525,225"/>

      <!-- Neck and shoulder -->
      <polygon class="facet2" points="440,270 480,280 470,300"/>
      <polygon class="facet4" points="440,270 470,260 480,280"/>

      <!-- Back ridge -->
      <polygon class="facet3" points="440,270 390,300 470,260"/>
      <polygon class="facet2" points="390,300 430,380 470,260"/>

      <!-- Tail planes -->
      <polygon class="facet3" points="470,260 520,300 560,340"/>
      <polygon class="facet4" points="520,300 560,340 470,380"/>
      <polygon class="facet1" points="560,340 610,320 570,315"/>

      <!-- Body center facets -->
      <polygon class="facet0" points="470,300 470,360 430,380"/>
      <polygon class="facet2" points="470,360 470,480 430,380"/>
      <polygon class="facet3" points="470,480 515,510 470,360"/>
      <polygon class="facet4" points="470,480 420,490 430,380"/>

      <!-- Front leg facets -->
      <polygon class="facet2" points="470,360 490,400 505,450"/>
      <polygon class="facet1" points="470,360 505,450 515,510"/>

      <!-- Chest highlight -->
      <polygon class="facet0" points="470,300 455,330 480,320"/>

      <!-- Subtle paper texture bands (semi-transparent overlays) -->
      <rect x="360" y="200" width="280" height="360" fill="#ffffff" opacity="0.03"/>
      <rect x="360" y="200" width="280" height="180" fill="#000000" opacity="0.025"/>
    </g>

    <!-- Crease lines -->
    <g clip-path="url(#catClip)">
      <!-- Head creases -->
      <polyline class="fold" points="480,280 525,225 530,260 480,280"/>
      <line class="fold dash" x1="525" y1="225" x2="495" y2="210"/>

      <!-- Neck/back creases -->
      <line class="fold" x1="440" y1="270" x2="470" y2="260"/>
      <line class="fold dash" x1="440" y1="270" x2="480" y2="280"/>

      <!-- Spine and body creases -->
      <polyline class="fold" points="470,260 470,300 470,360 470,480"/>
      <line class="fold dash" x1="390" y1="300" x2="430" y2="380"/>
      <line class="fold" x1="470" y1="300" x2="430" y2="380"/>
      <line class="fold dash" x1="470" y1="380" x2="560" y2="340"/>

      <!-- Tail creases -->
      <line class="fold" x1="520" y1="300" x2="560" y2="340"/>
      <line class="fold dash" x1="560" y1="340" x2="610" y2="320"/>

      <!-- Leg creases -->
      <polyline class="fold" points="470,360 490,400 505,450 515,510"/>
      <line class="lightfold" x1="470" y1="480" x2="420" y2="490"/>
      <line class="lightfold" x1="470" y1="505" x2="430" y2="495"/>

      <!-- Facial detail (nose fold) -->
      <line class="lightfold" x1="530" y1="260" x2="560" y2="220"/>
    </g>
  </g>
</svg>