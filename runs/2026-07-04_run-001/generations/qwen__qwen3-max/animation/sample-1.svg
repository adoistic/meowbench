<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cat body -->
  <ellipse cx="100" cy="130" rx="30" ry="20" fill="#8B4513"/>
  
  <!-- Cat head -->
  <circle cx="100" cy="90" r="25" fill="#8B4513"/>
  
  <!-- Ears -->
  <polygon points="85,70 80,50 95,60" fill="#8B4513"/>
  <polygon points="115,70 120,50 105,60" fill="#8B4513"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="85" r="5" fill="white"/>
  <circle cx="110" cy="85" r="5" fill="white"/>
  <circle cx="90" cy="85" r="2.5" fill="black"/>
  <circle cx="110" cy="85" r="2.5" fill="black"/>
  
  <!-- Nose -->
  <path d="M98,95 Q100,97 102,95" stroke="black" stroke-width="2" fill="none"/>
  
  <!-- Mouth -->
  <path d="M95,100 Q100,105 105,100" stroke="black" stroke-width="1.5" fill="none"/>
  
  <!-- Legs -->
  <rect x="85" y="145" width="6" height="20" fill="#8B4513"/>
  <rect x="109" y="145" width="6" height="20" fill="#8B4513"/>
  
  <!-- Tail - animated using SMIL -->
  <path d="M70,130 Q60,120 50,110" fill="none" stroke="#8B4513" stroke-width="6" stroke-linecap="round">
    <animate
      attributeName="d"
      values="
        M70,130 Q60,120 50,110;
        M70,130 Q55,135 50,150;
        M70,130 Q60,120 50,110;
        M70,130 Q65,100 55,90;
        M70,130 Q60,120 50,110"
      dur="2s"
      repeatCount="indefinite"
    />
  </path>
</svg>