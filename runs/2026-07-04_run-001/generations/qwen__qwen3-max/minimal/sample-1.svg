<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Head -->
  <circle cx="50" cy="40" r="20" fill="#cccccc"/>
  
  <!-- Ears -->
  <polygon points="35,25 30,10 40,20" fill="#cccccc"/>
  <polygon points="65,25 70,10 60,20" fill="#cccccc"/>
  
  <!-- Eyes -->
  <circle cx="42" cy="35" r="3" fill="#333333"/>
  <circle cx="58" cy="35" r="3" fill="#333333"/>
  
  <!-- Nose -->
  <path d="M50,42 L47,46 L53,46 Z" fill="#ff9999"/>
  
  <!-- Mouth -->
  <path d="M47,48 Q50,50 53,48" stroke="#333333" stroke-width="1" fill="none"/>
  
  <!-- Body -->
  <ellipse cx="50" cy="70" rx="15" ry="20" fill="#cccccc"/>
  
  <!-- Tail -->
  <path d="M65,65 Q80,60 75,45" stroke="#cccccc" stroke-width="8" stroke-linecap="round"/>
</svg>