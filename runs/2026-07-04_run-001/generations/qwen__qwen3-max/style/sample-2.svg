<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cat head (diamond shape) -->
  <polygon points="100,20 150,70 100,120 50,70" fill="#ccc" stroke="#333" stroke-width="1"/>
  
  <!-- Left ear -->
  <polygon points="70,50 90,65 60,70" fill="#bbb" stroke="#333" stroke-width="1"/>
  
  <!-- Right ear -->
  <polygon points="130,50 110,65 140,70" fill="#bbb" stroke="#333" stroke-width="1"/>
  
  <!-- Left eye -->
  <polygon points="80,75 90,70 90,80" fill="#333"/>
  
  <!-- Right eye -->
  <polygon points="120,75 110,70 110,80" fill="#333"/>
  
  <!-- Nose -->
  <polygon points="100,90 95,95 105,95" fill="#333"/>
  
  <!-- Whiskers left -->
  <line x1="80" y1="90" x2="60" y2="88" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="95" x2="60" y2="95" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="100" x2="60" y2="102" stroke="#333" stroke-width="1"/>
  
  <!-- Whiskers right -->
  <line x1="120" y1="90" x2="140" y2="88" stroke="#333" stroke-width="1"/>
  <line x1="120" y1="95" x2="140" y2="95" stroke="#333" stroke-width="1"/>
  <line x1="120" y1="100" x2="140" y2="102" stroke="#333" stroke-width="1"/>
  
  <!-- Body (folded triangle) -->
  <polygon points="100,120 140,160 60,160" fill="#ccc" stroke="#333" stroke-width="1"/>
  
  <!-- Front left leg -->
  <polygon points="70,160 65,180 75,180" fill="#ccc" stroke="#333" stroke-width="1"/>
  
  <!-- Front right leg -->
  <polygon points="130,160 125,180 135,180" fill="#ccc" stroke="#333" stroke-width="1"/>
  
  <!-- Tail -->
  <polygon points="100,120 120,100 125,105 105,125" fill="#ccc" stroke="#333" stroke-width="1"/>
  
  <!-- Fold lines (optional, for origami effect) -->
  <line x1="100" y1="20" x2="100" y2="120" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="50" y1="70" x2="150" y2="70" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="100" y1="120" x2="100" y2="160" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
</svg>