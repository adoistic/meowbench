<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="#e0c097">
  <!-- Body -->
  <polygon points="60,150 140,150 120,110 80,110" />

  <!-- Head -->
  <polygon points="80,110 120,110 130,80 110,60 90,60 70,80" />

  <!-- Left Ear -->
  <polygon points="90,60 70,80 80,70" fill="#d2a47a" />
  
  <!-- Right Ear -->
  <polygon points="110,60 130,80 120,70" fill="#d2a47a" />

  <!-- Tail -->
  <polygon points="140,150 160,130 150,120 135,135" />

  <!-- Front Legs -->
  <polygon points="80,150 85,170 75,170" />
  <polygon points="115,150 120,170 110,170" />

  <!-- Facial Features -->
  <!-- Eyes -->
  <circle cx="90" cy="85" r="3" fill="#333" />
  <circle cx="110" cy="85" r="3" fill="#333" />
  
  <!-- Nose -->
  <polygon points="100,95 95,100 105,100" fill="#c26b6b" />

  <!-- Whiskers -->
  <line x1="85" y1="95" x2="70" y2="92" stroke="#333" stroke-width="1" />
  <line x1="85" y1="100" x2="70" y2="100" stroke="#333" stroke-width="1" />
  <line x1="115" y1="95" x2="130" y2="92" stroke="#333" stroke-width="1" />
  <line x1="115" y1="100" x2="130" y2="100" stroke="#333" stroke-width="1" />

  <!-- Fold lines (optional subtle lines for origami effect) -->
  <line x1="100" y1="110" x2="100" y2="150" stroke="#b3916a" stroke-width="0.5" stroke-linecap="round" />
  <line x1="80" y1="110" x2="60" y2="150" stroke="#b3916a" stroke-width="0.5" stroke-linecap="round" />
  <line x1="120" y1="110" x2="140" y2="150" stroke="#b3916a" stroke-width="0.5" stroke-linecap="round" />
</svg>