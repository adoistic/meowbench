<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Sky background -->
  <rect width="400" height="300" fill="#d4ecff"/>
  <!-- Ground -->
  <rect y="260" width="400" height="40" fill="#8bc34a"/>
  <!-- Sun -->
  <circle cx="350" cy="45" r="22" fill="#ffd54f"/>
  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="60" cy="50" rx="22" ry="10"/>
    <ellipse cx="80" cy="45" rx="18" ry="9"/>
    <ellipse cx="180" cy="70" rx="25" ry="11"/>
  </g>
  <!-- Motion lines -->
  <g stroke="#90a4ae" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <line x1="40" y1="210" x2="70" y2="210"/>
    <line x1="30" y1="230" x2="65" y2="230"/>
    <line x1="45" y1="195" x2="75" y2="195"/>
  </g>

  <!-- Bicycle -->
  <g>
    <!-- Rear wheel -->
    <circle cx="130" cy="230" r="42" fill="none" stroke="#263238" stroke-width="4"/>
    <circle cx="130" cy="230" r="5" fill="#263238"/>
    <g stroke="#455a64" stroke-width="2">
      <line x1="130" y1="192" x2="130" y2="268"/>
      <line x1="92" y1="230" x2="168" y2="230"/>
      <line x1="103" y1="203" x2="157" y2="257"/>
      <line x1="157" y1="203" x2="103" y2="257"/>
    </g>
    <!-- Front wheel -->
    <circle cx="280" cy="230" r="42" fill="none" stroke="#263238" stroke-width="4"/>
    <circle cx="280" cy="230" r="5" fill="#263238"/>
    <g stroke="#455a64" stroke-width="2">
      <line x1="280" y1="192" x2="280" y2="268"/>
      <line x1="242" y1="230" x2="318" y2="230"/>
      <line x1="253" y1="203" x2="307" y2="257"/>
      <line x1="307" y1="203" x2="253" y2="257"/>
    </g>

    <!-- Frame -->
    <g stroke="#e53935" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="130" y1="230" x2="200" y2="220"/>
      <line x1="200" y1="220" x2="260" y2="170"/>
      <line x1="260" y1="170" x2="280" y2="230"/>
      <line x1="200" y1="220" x2="220" y2="160"/>
      <line x1="130" y1="230" x2="220" y2="160"/>
    </g>
    <!-- Seat post + seat -->
    <line x1="220" y1="160" x2="220" y2="135" stroke="#424242" stroke-width="3"/>
    <ellipse cx="220" cy="132" rx="18" ry="5" fill="#3e2723"/>
    <!-- Handlebar stem -->
    <line x1="260" y1="170" x2="265" y2="140" stroke="#424242" stroke-width="4"/>
    <!-- Handlebars -->
    <path d="M245 140 Q265 125 290 140" stroke="#263238" stroke-width="5" fill="none" stroke-linecap="round"/>
    <circle cx="245" cy="140" r="4" fill="#263238"/>
    <circle cx="290" cy="140" r="4" fill="#263238"/>
    <!-- Pedal crank -->
    <circle cx="200" cy="220" r="6" fill="#263238"/>
    <line x1="200" y1="220" x2="185" y2="240" stroke="#263238" stroke-width="4"/>
    <rect x="175" y="238" width="16" height="5" fill="#757575"/>
  </g>

  <!-- Cat -->
  <g>
    <!-- Tail -->
    <path d="M200 150 Q160 140 155 105 Q160 90 175 95" 
          stroke="#e0a04a" stroke-width="11" fill="none" stroke-linecap="round"/>
    <!-- Back body -->
    <ellipse cx="215" cy="145" rx="30" ry="22" fill="#f2b658"/>
    <!-- Front body / chest -->
    <ellipse cx="240" cy="135" rx="22" ry="20" fill="#f2b658"/>
    <!-- Stripes -->
    <g stroke="#b87a25" stroke-width="2.5" stroke-linecap="round" fill="none">
      <path d="M205 132 Q215 128 225 133"/>
      <path d="M208 145 Q220 140 232 146"/>
      <path d="M235 122 Q242 118 250 123"/>
    </g>
    <!-- Back leg -->
    <path d="M195 160 Q190 185 205 195" stroke="#f2b658" stroke-width="10" fill="none" stroke-linecap="round"/>
    <ellipse cx="205" cy="198" rx="8" ry="5" fill="#f2b658"/>
    <!-- Front leg reaching to handlebars -->
    <path d="M250 145 Q270 145 285 141" stroke="#f2b658" stroke-width="9" fill="none" stroke-linecap="round"/>
    <ellipse cx="288" cy="141" rx="7" ry="5" fill="#f2b658"/>
    <!-- Other front leg -->
    <path d="M245 148 Q255 155 260 150" stroke="#d99334" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- Head -->
    <circle cx="255" cy="105" r="24" fill="#f2b658"/>
    <!-- Ears -->
    <polygon points="238,88 240,70 252,85" fill="#f2b658"/>
    <polygon points="268,85 278,70 272,90" fill="#f2b658"/>
    <polygon points="241,86 243,75 249,84" fill="#ff8a80"/>
    <polygon points="270,87 276,77 272,89" fill="#ff8a80"/>
    <!-- Head stripes -->
    <path d="M252 85 L255 95 M258 85 L258 95" stroke="#b87a25" stroke-width="2" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="248" cy="105" rx="3" ry="4" fill="#1b5e20"/>
    <ellipse cx="264" cy="105" rx="3" ry="4" fill="#1b5e20"/>
    <circle cx="248" cy="104" r="1" fill="#fff"/>
    <circle cx="264" cy="104" r="1" fill="#fff"/>
    <!-- Nose -->
    <polygon points="254,113 258,113 256,116" fill="#e91e63"/>
    <!-- Mouth -->
    <path d="M256 116 Q252 121 250 119 M256 116 Q260 121 262 119" stroke="#3e2723" stroke-width="1.5" fill="none"/>
    <!-- Whiskers -->
    <g stroke="#3e2723" stroke-width="0.8">
      <line x1="245" y1="115" x2="232" y2="113"/>
      <line x1="245" y1="118" x2="232" y2="120"/>
      <line x1="267" y1="115" x2="280" y2="113"/>
      <line x1="267" y1="118" x2="280" y2="120"/>
    </g>
    <!-- Cheek blush -->
    <circle cx="243" cy="113" r="3" fill="#ff8a80" opacity="0.5"/>
    <circle cx="269" cy="113" r="3" fill="#ff8a80" opacity="0.5"/>
  </g>
</svg>