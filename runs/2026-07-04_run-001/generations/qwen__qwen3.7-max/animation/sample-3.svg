<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @keyframes sway {
      0%   { transform: rotate(-15deg); }
      50%  { transform: rotate(15deg); }
      100% { transform: rotate(-15deg); }
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95%           { transform: scaleY(0.1); }
    }
    #tail {
      transform-origin: 130px 280px;
      animation: sway 2s ease-in-out infinite;
    }
    .eye {
      transform-origin: center;
      animation: blink 4s ease-in-out infinite;
    }
    .eye-right {
      animation-delay: 0.1s;
    }
  </style>

  <!-- Background -->
  <rect width="400" height="400" fill="#f0e6d3" rx="20"/>

  <!-- Shadow -->
  <ellipse cx="220" cy="360" rx="100" ry="12" fill="rgba(0,0,0,0.1)"/>

  <!-- Tail -->
  <g id="tail">
    <path d="M130,280 Q80,250 60,210 Q45,180 60,150 Q70,130 85,135"
          stroke="#4a3728" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M130,280 Q80,250 60,210 Q45,180 60,150 Q70,130 85,135"
          stroke="#6b4c35" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Back legs -->
  <ellipse cx="160" cy="330" rx="22" ry="30" fill="#6b4c35"/>
  <ellipse cx="200" cy="335" rx="20" ry="25" fill="#6b4c35"/>

  <!-- Body -->
  <ellipse cx="200" cy="290" rx="85" ry="55" fill="#6b4c35"/>
  <ellipse cx="200" cy="290" rx="75" ry="45" fill="#7a5a42"/>

  <!-- Chest/belly patch -->
  <ellipse cx="230" cy="300" rx="35" ry="35" fill="#c4a882"/>
  <ellipse cx="225" cy="280" rx="25" ry="30" fill="#c4a882"/>

  <!-- Front legs -->
  <rect x="240" y="300" width="22" height="50" rx="11" fill="#6b4c35"/>
  <rect x="270" y="305" width="20" height="45" rx="10" fill="#7a5a42"/>

  <!-- Paws -->
  <ellipse cx="251" cy="350" rx="14" ry="8" fill="#c4a882"/>
  <ellipse cx="280" cy="350" rx="13" ry="7" fill="#c4a882"/>

  <!-- Neck -->
  <ellipse cx="260" cy="250" rx="35" ry="30" fill="#6b4c35"/>

  <!-- Head -->
  <ellipse cx="280" cy="210" rx="50" ry="45" fill="#6b4c35"/>

  <!-- Head inner -->
  <ellipse cx="280" cy="215" rx="42" ry="38" fill="#7a5a42"/>

  <!-- Left ear -->
  <polygon points="245,180 235,130 265,165" fill="#6b4c35"/>
  <polygon points="248,175 240,140 262,168" fill="#d4917a"/>

  <!-- Right ear -->
  <polygon points="310,175 325,128 330,170" fill="#6b4c35"/>
  <polygon points="312,170 323,138 327,168" fill="#d4917a"/>

  <!-- Face patch -->
  <ellipse cx="280" cy="225" rx="30" ry="25" fill="#c4a882"/>

  <!-- Eyes -->
  <g class="eye">
    <ellipse cx="263" cy="208" rx="10" ry="11" fill="white"/>
    <ellipse cx="265" cy="209" rx="6" ry="7" fill="#3d6b4f"/>
    <ellipse cx="266" cy="208" rx="3" ry="3.5" fill="#1a1a1a"/>
    <ellipse cx="267" cy="206" rx="1.5" ry="1.5" fill="white"/>
  </g>

  <g class="eye eye-right">
    <ellipse cx="297" cy="208" rx="10" ry="11" fill="white"/>
    <ellipse cx="299" cy="209" rx="6" ry="7" fill="#3d6b4f"/>
    <ellipse cx="300" cy="208" rx="3" ry="3.5" fill="#1a1a1a"/>
    <ellipse cx="301" cy="206" rx="1.5" ry="1.5" fill="white"/>
  </g>

  <!-- Nose -->
  <path d="M276,224 L280,220 L284,224 Z" fill="#d4756a"/>

  <!-- Mouth -->
  <path d="M280,225 Q275,232 270,230" stroke="#4a3728" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M280,225 Q285,232 290,230" stroke="#4a3728" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="260" y1="222" x2="220" y2="215" stroke="#4a3728" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="260" y1="226" x2="218" y2="226" stroke="#4a3728" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="260" y1="230" x2="222" y2="237" stroke="#4a3728" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Whiskers right -->
  <line x1="300" y1="222" x2="340" y2="215" stroke="#4a3728" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="300" y1="226" x2="342" y2="226" stroke="#4a3728" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="300" y1="230" x2="338" y2="237" stroke="#4a3728" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Tabby stripes on head -->
  <path d="M270,190 Q275,185 280,190" stroke="#5a3f2a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M275,186 Q280,180 285,186" stroke="#5a3f2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Tabby stripes on body -->
  <path d="M170,270 Q175,260 180,270" stroke="#5a3f2a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M190,265 Q195,255 200,265" stroke="#5a3f2a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M210,268 Q215,258 220,268" stroke="#5a3f2a" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>