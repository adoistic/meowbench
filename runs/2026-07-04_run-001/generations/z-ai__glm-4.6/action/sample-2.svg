<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#e6f3ff"/>
  
  <!-- Ground line -->
  <line x1="0" y1="250" x2="400" y2="250" stroke="#95a99c" stroke-width="2"/>
  
  <!-- Bicycle -->
  <!-- Back wheel -->
  <circle cx="120" cy="230" r="35" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <circle cx="120" cy="230" r="30" fill="none" stroke="#34495e" stroke-width="2"/>
  <circle cx="120" cy="230" r="4" fill="#2c3e50"/>
  
  <!-- Front wheel -->
  <circle cx="280" cy="230" r="35" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <circle cx="280" cy="230" r="30" fill="none" stroke="#34495e" stroke-width="2"/>
  <circle cx="280" cy="230" r="4" fill="#2c3e50"/>
  
  <!-- Bicycle frame -->
  <line x1="120" y1="230" x2="200" y2="180" stroke="#e74c3c" stroke-width="4"/>
  <line x1="200" y1="180" x2="280" y2="230" stroke="#e74c3c" stroke-width="4"/>
  <line x1="200" y1="180" x2="200" y2="140" stroke="#e74c3c" stroke-width="4"/>
  <line x1="200" y1="180" x2="190" y2="210" stroke="#e74c3c" stroke-width="4"/>
  <line x1="190" y1="210" x2="120" y2="230" stroke="#e74c3c" stroke-width="4"/>
  
  <!-- Seat -->
  <ellipse cx="200" cy="135" rx="25" ry="8" fill="#8b4513"/>
  
  <!-- Handlebars -->
  <line x1="280" y1="230" x2="270" y2="160" stroke="#34495e" stroke-width="3"/>
  <path d="M 255 155 Q 265 145 285 155" fill="none" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- Pedals -->
  <line x1="190" y1="210" x2="185" y2="225" stroke="#34495e" stroke-width="2"/>
  <line x1="190" y1="210" x2="195" y2="195" stroke="#34495e" stroke-width="2"/>
  <rect x="180" y="223" width="10" height="4" rx="2" fill="#34495e"/>
  <rect x="190" y="193" width="10" height="4" rx="2" fill="#34495e"/>
  
  <!-- Cat -->
  <!-- Cat body -->
  <ellipse cx="185" cy="115" rx="35" ry="25" fill="#ff8c69"/>
  
  <!-- Cat head -->
  <ellipse cx="145" cy="100" rx="25" ry="22" fill="#ff8c69"/>
  
  <!-- Cat ears -->
  <path d="M 125 85 L 120 70 L 135 78 Z" fill="#ff8c69"/>
  <path d="M 155 78 L 170 70 L 165 85 Z" fill="#ff8c69"/>
  <path d="M 125 77 L 123 72 L 133 76 Z" fill="#ffb3a1"/>
  <path d="M 157 76 L 167 72 L 165 77 Z" fill="#ffb3a1"/>
  
  <!-- Cat eyes -->
  <ellipse cx="135" cy="98" rx="4" ry="6" fill="#2c3e50"/>
  <ellipse cx="154" cy="98" rx="4" ry="6" fill="#2c3e50"/>
  <ellipse cx="136" cy="97" rx="2" ry="3" fill="white"/>
  <ellipse cx="155" cy="97" rx="2" ry="3" fill="white"/>
  
  <!-- Cat nose -->
  <path d="M 145 105 L 142 108 L 148 108 Z" fill="#d4625b"/>
  
  <!-- Cat mouth -->
  <path d="M 145 108 Q 140 112 138 108" fill="none" stroke="#d4625b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 145 108 Q 150 112 152 108" fill="none" stroke="#d4625b" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Cat whiskers -->
  <line x1="130" y1="105" x2="115" y2="103" stroke="#2c3e50" stroke-width="1" opacity="0.6"/>
  <line x1="130" y1="108" x2="115" y2="108" stroke="#2c3e50" stroke-width="1" opacity="0.6"/>
  <line x1="160" y1="105" x2="175" y2="103" stroke="#2c3e50" stroke-width="1" opacity="0.6"/>
  <line x1="160" y1="108" x2="175" y2="108" stroke="#2c3e50" stroke-width="1" opacity="0.6"/>
  
  <!-- Cat front paws holding handlebars -->
  <ellipse cx="270" cy="150" rx="8" ry="12" fill="#ff8c69" transform="rotate(-30 270 150)"/>
  <ellipse cx="260" cy="152" rx="8" ry="12" fill="#ff8c69" transform="rotate(-40 260 152)"/>
  
  <!-- Cat tail -->
  <path d="M 215 115 Q 240 100 245 120 Q 248 130 240 135" fill="none" stroke="#ff8c69" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Stripes on cat -->
  <path d="M 165 110 Q 170 105 175 110" fill="none" stroke="#d4625b" stroke-width="2" opacity="0.5"/>
  <path d="M 170 118 Q 175 113 180 118" fill="none" stroke="#d4625b" stroke-width="2" opacity="0.5"/>
  <path d="M 175 125 Q 180 120 185 125" fill="none" stroke="#d4625b" stroke-width="2" opacity="0.5"/>
  
  <!-- Motion lines -->
  <line x1="90" y1="230" x2="60" y2="230" stroke="#95a99c" stroke-width="2" opacity="0.3"/>
  <line x1="95" y1="220" x2="65" y2="220" stroke="#95a99c" stroke-width="2" opacity="0.3"/>
  <line x1="95" y1="240" x2="65" y2="240" stroke="#95a99c" stroke-width="2" opacity="0.3"/>
</svg>