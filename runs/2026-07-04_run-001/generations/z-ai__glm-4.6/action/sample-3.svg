<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Bicycle frame -->
  <g stroke="#333" stroke-width="3" fill="none">
    <!-- Main frame triangle -->
    <line x1="150" y1="200" x2="200" y2="120" stroke-width="4"/>
    <line x1="200" y1="120" x2="280" y2="200" stroke-width="4"/>
    <line x1="150" y1="200" x2="210" y2="200" stroke-width="4"/>
    
    <!-- Fork and handlebars -->
    <line x1="280" y1="200" x2="290" y2="100" stroke-width="3"/>
    <line x1="280" y1="100" x2="320" y2="90" stroke-width="3"/>
    <circle cx="280" cy="100" r="15" fill="none"/>
    <line x1="265" y1="100" x2="295" y2="100" stroke-width="3"/>
    
    <!-- Seat post and seat -->
    <line x1="200" y1="120" x2="210" y2="100" stroke-width="3"/>
    <ellipse cx="220" cy="95" rx="25" ry="8" fill="#8B4513" stroke="#333" stroke-width="2"/>
    
    <!-- Pedals and crank -->
    <circle cx="180" cy="200" r="12" fill="none"/>
    <line x1="168" y1="200" x2="192" y2="200" stroke-width="2"/>
    <line x1="180" y1="188" x2="180" y2="212" stroke-width="2"/>
  </g>
  
  <!-- Wheels -->
  <g fill="none" stroke="#333" stroke-width="3">
    <circle cx="150" cy="200" r="35"/>
    <circle cx="280" cy="200" r="35"/>
    <!-- Spokes -->
    <g stroke="#666" stroke-width="1">
      <line x1="150" y1="165" x2="150" y2="235"/>
      <line x1="115" y1="200" x2="185" y2="200"/>
      <line x1="125" y1="175" x2="175" y2="225"/>
      <line x1="175" y1="175" x2="125" y2="225"/>
      
      <line x1="280" y1="165" x2="280" y2="235"/>
      <line x1="245" y1="200" x2="315" y2="200"/>
      <line x1="255" y1="175" x2="305" y2="225"/>
      <line x1="305" y1="175" x2="255" y2="225"/>
    </g>
  </g>
  
  <!-- Cat -->
  <g transform="translate(200, 80)">
    <!-- Body -->
    <ellipse cx="20" cy="20" rx="28" ry="22" fill="#FFA500"/>
    
    <!-- Head -->
    <ellipse cx="5" cy="10" rx="18" ry="16" fill="#FFA500"/>
    
    <!-- Ears -->
    <path d="M -8 2 L -12 -8 L -3 0 Z" fill="#FFA500"/>
    <path d="M 18 2 L 14 -8 L 23 0 Z" fill="#FFA500"/>
    <path d="M -7 0 L -10 -5 L -5 -2 Z" fill="#FFB6C1"/>
    <path d="M 19 0 L 16 -5 L 21 -2 Z" fill="#FFB6C1"/>
    
    <!-- Eyes -->
    <ellipse cx="-2" cy="10" rx="3" ry="4" fill="#000"/>
    <ellipse cx="8" cy="10" rx="3" ry="4" fill="#000"/>
    <ellipse cx="-1" cy="9" rx="1" ry="1.5" fill="#FFF"/>
    <ellipse cx="9" cy="9" rx="1" ry="1.5" fill="#FFF"/>
    
    <!-- Nose -->
    <path d="M 3 15 L 1 17 L 5 17 Z" fill="#FF69B4"/>
    
    <!-- Mouth -->
    <path d="M 3 17 Q 0 19 -2 17" stroke="#333" stroke-width="1" fill="none"/>
    <path d="M 3 17 Q 6 19 8 17" stroke="#333" stroke-width="1" fill="none"/>
    
    <!-- Whiskers -->
    <line x1="-10" y1="13" x2="-20" y2="11" stroke="#333" stroke-width="0.5"/>
    <line x1="-10" y1="16" x2="-20" y2="16" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="13" x2="20" y2="11" stroke="#333" stroke-width="0.5"/>
    <line x1="10" y1="16" x2="20" y2="16" stroke="#333" stroke-width="0.5"/>
    
    <!-- Front paws on handlebars -->
    <ellipse cx="40" cy="25" rx="6" ry="8" fill="#FFA500" transform="rotate(-20 40 25)"/>
    <ellipse cx="50" cy="22" rx="6" ry="8" fill="#FFA500" transform="rotate(-15 50 22)"/>
    
    <!-- Stripes -->
    <path d="M 5 5 Q 0 8 2 10" stroke="#FF6500" stroke-width="2" fill="none"/>
    <path d="M 12 4 Q 17 8 14 10" stroke="#FF6500" stroke-width="2" fill="none"/>
    <path d="M 10 15 Q 5 18 8 20" stroke="#FF6500" stroke-width="2" fill="none"/>
    
    <!-- Tail -->
    <path d="M -5 30 Q -15 35 -18 45 Q -20 55 -15 60" stroke="#FFA500" stroke-width="8" fill="none"/>
    <path d="M -5 30 Q -15 35 -18 45 Q -20 55 -15 60" stroke="#FF6500" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Motion lines for speed -->
  <g stroke="#87CEEB" stroke-width="2" opacity="0.6">
    <line x1="50" y1="180" x2="30" y2="180"/>
    <line x1="50" y1="190" x2="25" y2="190"/>
    <line x1="50" y1="200" x2="30" y2="200"/>
    <line x1="50" y1="210" x2="25" y2="210"/>
  </g>
</svg>