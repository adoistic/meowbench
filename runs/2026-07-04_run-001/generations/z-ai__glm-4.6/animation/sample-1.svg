<svg width="300" height="250" viewBox="0 0 300 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes sway {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      50% { transform: rotate(-5deg); }
      75% { transform: rotate(12deg); }
      100% { transform: rotate(0deg); }
    }
    
    .tail {
      animation: sway 2.5s ease-in-out infinite;
      transform-origin: 170px 160px;
    }
    
    .eye-blink {
      animation: blink 3s infinite;
    }
    
    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0; }
    }
  </style>
  
  <!-- Shadow -->
  <ellipse cx="150" cy="230" rx="60" ry="15" fill="rgba(0,0,0,0.2)"/>
  
  <!-- Body -->
  <ellipse cx="150" cy="160" rx="50" ry="35" fill="#FFA500" stroke="#E89500" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="150" cy="110" r="35" fill="#FFA500" stroke="#E89500" stroke-width="2"/>
  
  <!-- Ears -->
  <path d="M 120 95 L 115 75 L 130 85 Z" fill="#FFA500" stroke="#E89500" stroke-width="2"/>
  <path d="M 170 85 L 185 75 L 180 95 Z" fill="#FFA500" stroke="#E89500" stroke-width="2"/>
  
  <!-- Inner ears -->
  <path d="M 122 88 L 120 80 L 127 83 Z" fill="#FFB366"/>
  <path d="M 173 83 L 180 80 L 178 88 Z" fill="#FFB366"/>
  
  <!-- Eyes -->
  <circle cx="135" cy="105" r="8" fill="#2C3E50"/>
  <circle cx="165" cy="105" r="8" fill="#2C3E50"/>
  
  <!-- Eye highlights -->
  <circle cx="137" cy="103" r="3" fill="white"/>
  <circle cx="167" cy="103" r="3" fill="white"/>
  
  <!-- Eye lids for blinking -->
  <rect class="eye-blink" x="128" y="100" width="14" height="10" fill="#FFA500"/>
  <rect class="eye-blink" x="158" y="100" width="14" height="10" fill="#FFA500"/>
  
  <!-- Nose -->
  <path d="M 150 115 L 145 120 L 155 120 Z" fill="#E89500"/>
  
  <!-- Mouth -->
  <path d="M 150 120 Q 140 125 135 120" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 150 120 Q 160 125 165 120" fill="none" stroke="#8B4513" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Whiskers -->
  <line x1="90" y1="115" x2="120" y2="110" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
  <line x1="90" y1="125" x2="120" y2="120" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
  <line x1="180" y1="110" x2="210" y2="115" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
  <line x1="180" y1="120" x2="210" y2="125" stroke="#8B4513" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Front legs -->
  <ellipse cx="125" cy="185" rx="12" ry="20" fill="#FFA500" stroke="#E89500" stroke-width="2"/>
  <ellipse cx="175" cy="185" rx="12" ry="20" fill="#FFA500" stroke="#E89500" stroke-width="2"/>
  
  <!-- Paws -->
  <ellipse cx="125" cy="200" rx="15" ry="10" fill="#FFB366" stroke="#E89500" stroke-width="1.5"/>
  <ellipse cx="175" cy="200" rx="15" ry="10" fill="#FFB366" stroke="#E89500" stroke-width="1.5"/>
  
  <!-- Animated Tail -->
  <g class="tail">
    <path d="M 170 160 Q 200 170, 220 150 Q 240 130, 230 100" 
          fill="none" 
          stroke="#FFA500" 
          stroke-width="20" 
          stroke-linecap="round"/>
    <path d="M 170 160 Q 200 170, 220 150 Q 240 130, 230 100" 
          fill="none" 
          stroke="#E89500" 
          stroke-width="18" 
          stroke-linecap="round"/>
    
    <!-- Tail tip -->
    <circle cx="230" cy="100" r="10" fill="#FFA500" stroke="#E89500" stroke-width="2"/>
  </g>
  
  <!-- Stripes on body -->
  <path d="M 130 150 Q 140 155, 150 150" fill="none" stroke="#E89500" stroke-width="2" opacity="0.6"/>
  <path d="M 135 160 Q 145 165, 155 160" fill="none" stroke="#E89500" stroke-width="2" opacity="0.6"/>
  <path d="M 140 170 Q 150 175, 160 170" fill="none" stroke="#E89500" stroke-width="2" opacity="0.6"/>
</svg>