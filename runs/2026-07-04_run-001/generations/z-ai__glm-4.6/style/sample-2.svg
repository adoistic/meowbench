<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <defs>
    <!-- Gradients for paper texturing -->
    <linearGradient id="paperFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F0F0F0" />
    </linearGradient>
    <linearGradient id="paperMid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F0F0" />
      <stop offset="100%" stop-color="#E0E0E0" />
    </linearGradient>
    <linearGradient id="paperBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0" />
      <stop offset="100%" stop-color="#D0D0D0" />
    </linearGradient>
    <!-- Drop shadow for depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="150" cy="180" r="140" fill="#546E7A" />

  <!-- Main Group -->
  <g transform="translate(150, 160)" filter="url(#dropShadow)">
    
    <!-- Chest/Body -->
    <polygon points="-40,50 40,50 60,160 -60,160" fill="url(#paperMid)" />
    
    <!-- Back (Right side - in shadow) -->
    <polygon points="0,-60 60,-90 50,20 10,40" fill="url(#paperBack)" />
    <polygon points="0,-60 60,-90 80,10" fill="url(#paperMid)" opacity="0.8"/> <!-- Right Ear outer flap -->

    <!-- Head Back (Right Face) -->
    <polygon points="0,-60 50,20 80,60 0,80" fill="url(#paperBack)" />
    
    <!-- Snout (Shadow side) -->
    <polygon points="0,80 80,60 0,120" fill="url(#paperBack)" />

    <!-- Front (Left side - in light) -->
    
    <!-- Left Face -->
    <polygon points="0,-60 -50,20 -80,60 0,80" fill="url(#paperFront)" />
    
    <!-- Snout (Light side) -->
    <polygon points="0,80 -80,60 0,120" fill="url(#paperFront)" />
    
    <!-- Left Ear -->
    <polygon points="0,-60 -60,-90 -50,20" fill="url(#paperFront)" />
    
    <!-- Abstract Nose -->
    <polygon points="-10,90 10,90 0,105" fill="#FF8A80" />

    <!-- Geometric Eyes -->
    <!-- Left Eye -->
    <path d="M-40,20 L-10,20 L-25,40 Z" fill="#37474F" />
    <!-- Right Eye -->
    <path d="M10,20 L40,20 L25,40 Z" fill="#263238" />

    <!-- Geometric Whiskers -->
    <g stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.6" stroke-linecap="round">
       <line x1="-80" y1="60" x2="-120" y2="50" />
       <line x1="-80" y1="70" x2="-120" y2="80" />
       <line x1="80" y1="60" x2="120" y2="50" />
       <line x1="80" y1="70" x2="120" y2="80" />
    </g>

    <!-- Contrast Fold Lines (Subtle) -->
    <path d="M0,-60 L0,120" stroke="#000000" stroke-width="0.5" stroke-opacity="0.1" />
    <path d="M0,-60 L-50,20" stroke="#000000" stroke-width="0.5" stroke-opacity="0.1" />
    <path d="M0,-60 L50,20" stroke="#000000" stroke-width="0.5" stroke-opacity="0.1" />

  </g>
</svg>