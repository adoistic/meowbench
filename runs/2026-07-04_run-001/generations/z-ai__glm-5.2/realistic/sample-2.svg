      <path d="M312 330 Q210 322 130 325" stroke="#f0e8da" stroke-width="1" fill="none"/>
      <path d="M314 338 Q220 345 140 360" stroke="#f0e8da" stroke-width="1" fill="none"/>
      <path d="M350 322 Q440 305 510 295" stroke="#f0e8da" stroke-width="1" fill="none"/>
      <path d="M348 330 Q450 322 530 325" stroke="#f0e8da" stroke-width="1" fill="none"/>
      <path d="M346 338 Q440 345 520 360" stroke="#f0e8da" stroke-width="1" fill="none"/>
