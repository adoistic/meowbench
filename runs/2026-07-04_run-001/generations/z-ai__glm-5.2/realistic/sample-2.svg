<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#e8e4dd"/>
      <stop offset="100%" stop-color="#bdb6a8"/>
    </radialGradient>
    <linearGradient id="furBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4a2a"/>
      <stop offset="45%" stop-color="#5c3318"/>
      <stop offset="100%" stop-color="#2e1a0c"/>
    </linearGradient>
    <linearGradient id="furLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9a6438"/>
      <stop offset="60%" stop-color="#6e3f20"/>
      <stop offset="100%" stop-color="#3d2110"/>
    </linearGradient>
    <linearGradient id="furFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5733"/>
      <stop offset="100%" stop-color="#4a2812"/>
    </linearGradient>
    <radialGradient id="eyeG" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f5d96a"/>
      <stop offset="55%" stop-color="#c89a2e"/>
      <stop offset="100%" stop-color="#5a3c10"/>
    </radialGradient>
    <radialGradient id="earInner" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#d98a8a"/>
      <stop offset="100%" stop-color="#7a3535"/>
    </radialGradient>
    <radialGradient id="noseG" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#e8a8b0"/>
      <stop offset="100%" stop-color="#8a3a4a"/>
    </radialGradient>
    <radialGradient id="shadowG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1208" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#1a1208" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1208" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
    <symbol id="whisker" viewBox="0 0 100 4">
      <path d="M0 2 Q60 1 100 2" stroke="#f0e8da" stroke-width="0.8" fill="none" opacity="0.85"/>
    </symbol>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
